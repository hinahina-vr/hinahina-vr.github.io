    <text x="156" y="950" fill="rgba(255,255,255,0.54)" font-size="24" font-family="'Trebuchet MS', 'Yu Gothic', sans-serif">マイコンをほとんど触ったことのない人間が、いきなり回路設計までまとめて面倒を見てもらおうとしている。今日はそんな無茶な始まり方をした。PC と AI が間に入れば、そのまま物の側まで一気に行けるのではないか、という雑な期待が先に立つ。ソフトウェアの側に長くいると、画面の向こうにあるものも、つい同じ手触りで扱える気がしてしまう。 だが、そこで急に現実が割り込んでくる。電子工作には物理の限界がある。基板の向こうにはちゃんと力学と電磁気学が待</text>
