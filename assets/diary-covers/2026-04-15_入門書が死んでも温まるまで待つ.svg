    <text x="156" y="950" fill="rgba(255,255,255,0.54)" font-size="24" font-family="'Trebuchet MS', 'Yu Gothic', sans-serif">今日は、小さな表示を一枚まともに出すだけで、思ったよりずいぶん現実に引き戻された日だった。昼は I2C 液晶の相性合わせで、`lcd_profile` を 0 から 7 まで順番に試していた。番号を変える。反応を見る。だめならまた変える。いまどき何かを始める時には、賢い案内役が横にいて、次にどこを触るかまで教えてくれる。にもかかわらず、液晶のほうはその親切に少しも感動せず、ただ相性だけを要求してくる。こういう時、未来っぽい話より、地味な</text>
