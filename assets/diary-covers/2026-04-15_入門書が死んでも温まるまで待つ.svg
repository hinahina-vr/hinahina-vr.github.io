<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">入門書が死んでも温まるまで待つ</title>
  <desc id="desc">今日は、小さな表示を一枚まともに出すだけで、思ったよりずいぶん現実に引き戻された日だった。昼は I2C 液晶の相性合わせで、`lcd_profile` を 0 から 7 まで順番に試していた。番号を変える。反応を見る。だめならまた変える。いまどき何かを始める時には、賢い案内役が横にいて、次にどこを触るかまで教えてくれる。にもかかわらず、液晶のほうはその親切に少しも感動せず、ただ相性だけを要求してくる。こういう時、未来っぽい話より、地味な</desc>
