      <stop offset="100%" stop-color="#1c4772" />
    </linearGradient>
    <radialGradient id="glowA" cx="26%" cy="26%" r="54%">
      <stop offset="0%" stop-color="#8fe7ff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#8fe7ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="28%" r="48%">
