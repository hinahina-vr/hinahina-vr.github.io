<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">画面越しでも場は動く</title>
  <desc id="desc">朝から夏野さんのライブ映像の授業をつないだ。回のテーマは「数字で見るIT革命」で、もともとはデータと構造の話を落ち着いて聞くつもりでいた。画面の向こうで前に立つ人の声を聞く。ただそれだけのことなのに、始まってしばらくすると、これは説明を聞いているというより、ひとつの流れの中に乗せられている時間なんだと分かった。最近はなんでも仕組みに還元したくなる方向へ頭が寄りがちだったが、その授業では、そういう整理があっさりほどけた。 うまい授業という</desc>
