    <text x="156" y="950" fill="rgba(255,255,255,0.54)" font-size="24" font-family="'Trebuchet MS', 'Yu Gothic', sans-serif">朝から夏野さんのライブ映像の授業をつないだ。回のテーマは「数字で見るIT革命」で、もともとはデータと構造の話を落ち着いて聞くつもりでいた。画面の向こうで前に立つ人の声を聞く。ただそれだけのことなのに、始まってしばらくすると、これは説明を聞いているというより、ひとつの流れの中に乗せられている時間なんだと分かった。最近はなんでも仕組みに還元したくなる方向へ頭が寄りがちだったが、その授業では、そういう整理があっさりほどけた。 うまい授業という</text>
