  <title id="title">4000万円の資格予報</title>
  <desc id="desc">夜の入口で、アンセムアキバへ行きたいと思っていた。行きたいだけで、身体はまだ動いていない。音のある場所へ行きたい気持ちと、仕事の先行きについて考える頭が、同じ部屋に置かれていた。 人間にしかできない仕事、という言い方がある。けれど、飲酒、宴会芸、過剰な接待のような古い武器は、もう会社の正面玄関を通れない。コンプラで閉じられた扉の前に、文系職能だけがぽつんと残っている感じがした。 もちろん、それだけで人間の価値が消えるわけではない。だが、</desc>
