<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">三千万と破滅のあいだ</title>
  <desc id="desc">家計簿を開いたら、流動資産が三千万を超えていた。数字はたいてい無表情だ。しかし桁がひとつ変わると、急に時間の重さを持つ。銀行口座や証券口座の奥に沈んでいた数年分の反復が、ひとつの塊になってこちらへ返ってくる。嬉しいかと聞かれれば、もちろん嬉しい。でも、それ以上に、鈍くて現実的な重みのほうが先に来た。 もちろん、一撃で勝ったわけではない。やったことは単純だ。入れる。持つ。下がってもすぐには消さない。また入れる。退屈で、誰の記憶にも残らない</desc>
