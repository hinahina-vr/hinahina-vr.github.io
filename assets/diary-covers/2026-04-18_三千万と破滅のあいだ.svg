    <text x="156" y="950" fill="rgba(255,255,255,0.54)" font-size="24" font-family="'Trebuchet MS', 'Yu Gothic', sans-serif">家計簿を開いたら、流動資産が三千万を超えていた。数字はたいてい無表情だ。しかし桁がひとつ変わると、急に時間の重さを持つ。銀行口座や証券口座の奥に沈んでいた数年分の反復が、ひとつの塊になってこちらへ返ってくる。嬉しいかと聞かれれば、もちろん嬉しい。でも、それ以上に、鈍くて現実的な重みのほうが先に来た。 もちろん、一撃で勝ったわけではない。やったことは単純だ。入れる。持つ。下がってもすぐには消さない。また入れる。退屈で、誰の記憶にも残らない</text>
