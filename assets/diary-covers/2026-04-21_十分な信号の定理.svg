  <title id="title">十分な信号の定理</title>
  <desc id="desc">「これ一生ほしい」と思った服は25万8000円だった。欲しい。値段を見る。解散。すぐに買える額ではない。欲しい気持ちは残っているのに、値札だけが現実を突きつけてくる。夢のままなら軽いものが、数字を持った瞬間に急に重くなる。</desc>
