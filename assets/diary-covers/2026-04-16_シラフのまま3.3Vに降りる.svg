<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">シラフのまま3.3Vに降りる</title>
  <desc id="desc">酔いを測る装置のことを考えているのに、自分はまだしらふのままだった。そこがまず少しおかしい。早く DEISUI になりたい、みたいな言葉だけは威勢がいいのに、机の上で進んでいるのは、あくまでその手前の段取りだった。人間は気分から先に飛びたがるが、装置のほうはそんな願いを一度も聞かず、入口に留まったままでいる。 その入口で一日を支配したのが、5V を 3.3V に落とすという、あまりにも基本的な仕事だった。やることは単純だ。高すぎるものを</desc>
