    <text x="156" y="950" fill="rgba(255,255,255,0.54)" font-size="24" font-family="'Trebuchet MS', 'Yu Gothic', sans-serif">藤沢駅に降りると、海の近くの街特有の湿り気がある。そこからサンダースネイクへ向かうだけで、日常の回路が少し太くなる。ライブハウスという場所は、入口をくぐる前から身体に低音を予告してくる。 カナイをやっている、という言葉には現場の匂いがある。説明より先に、そこに人がいて、音があり、照明がある。ステージは理屈ではなく、床の振動から始まる。 その場に、Spout、DirectX、GLSL のことを考えながら立つ。技術語は冷たいが、現場へ持ち込</text>
