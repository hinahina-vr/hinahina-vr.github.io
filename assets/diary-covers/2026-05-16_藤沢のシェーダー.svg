<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">藤沢のシェーダー</title>
  <desc id="desc">藤沢駅に降りると、海の近くの街特有の湿り気がある。そこからサンダースネイクへ向かうだけで、日常の回路が少し太くなる。ライブハウスという場所は、入口をくぐる前から身体に低音を予告してくる。 カナイをやっている、という言葉には現場の匂いがある。説明より先に、そこに人がいて、音があり、照明がある。ステージは理屈ではなく、床の振動から始まる。 その場に、Spout、DirectX、GLSL のことを考えながら立つ。技術語は冷たいが、現場へ持ち込</desc>
