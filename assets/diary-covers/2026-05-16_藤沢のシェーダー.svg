      <stop offset="100%" stop-color="#ffd1a0" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowC" cx="50%" cy="100%" r="56%">
      <stop offset="0%" stop-color="#fff0b2" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#fff0b2" stop-opacity="0" />
    </radialGradient>
  </defs>
