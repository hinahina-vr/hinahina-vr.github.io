      <stop offset="100%" stop-color="#ffc785" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowC" cx="50%" cy="100%" r="56%">
      <stop offset="0%" stop-color="#fff0b0" stop-opacity="0.18" />
