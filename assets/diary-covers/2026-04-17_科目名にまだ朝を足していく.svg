<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">科目名にまだ朝を足していく</title>
  <desc id="desc">乾いた講義名が並んでいるだけの一覧に、ひとつずつ夢の入口を付けていく夜だった。情報セキュリティも、データサイエンスも、法学も、心理学も、ただの科目名のままでは机の上に平たく並ぶだけだ。そこへ、どんな場所を通って、どんな気分で入口へ立たせるのかを足していくと、授業は急に、人が入っていける幅を持ちはじめる。 面白かったのは、その作業が明らかに量産でもあったことだ。ファイルは次々に増えるし、一覧は長くなる。いったん手つきが決まれば、次の授業へ</desc>
