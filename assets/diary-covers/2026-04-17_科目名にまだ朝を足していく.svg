    <text x="156" y="950" fill="rgba(255,255,255,0.54)" font-size="24" font-family="'Trebuchet MS', 'Yu Gothic', sans-serif">乾いた講義名が並んでいるだけの一覧に、ひとつずつ夢の入口を付けていく夜だった。情報セキュリティも、データサイエンスも、法学も、心理学も、ただの科目名のままでは机の上に平たく並ぶだけだ。そこへ、どんな場所を通って、どんな気分で入口へ立たせるのかを足していくと、授業は急に、人が入っていける幅を持ちはじめる。 面白かったのは、その作業が明らかに量産でもあったことだ。ファイルは次々に増えるし、一覧は長くなる。いったん手つきが決まれば、次の授業へ</text>
