// === Block Noise Glitch ===
const cvs=document.getElementById('static-canvas');
const sctx=cvs.getContext('2d');
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
resizeCvs();window.addEventListener('resize',resizeCvs);
let glitchPhase=0,staticRAF=null,blockCount=0;
function drawBlockNoise(){
 const w=cvs.width,hh=cvs.height;
 if(glitchPhase>=1){
  const count=glitchPhase===2?200:blockCount;
  for(let i=0;i<count;i++){

    const bw=Math.random()*60+10;
    const bh=Math.random()*30+5;
   const bx=Math.random()*(w-bw),by=Math.random()*(hh-bh);
   const img=sctx.createImageData(Math.ceil(bw),Math.ceil(bh));
   const d=img.data;
   const a=(glitchPhase===2?240:180)+Math.random()*15;
   for(let j=0;j<d.length;j+=4){const v=Math.random()*255|0;d[j]=v;d[j+1]=v;d[j+2]=v;d[j+3]=a}

 }
 if(glitchPhase>0)staticRAF=requestAnimationFrame(drawBlockNoise);
}

// === White Particles ===
const pc=document.getElementById('particle-canvas');
const px=pc.getContext('2d');
let particlesActive=false;
function resizePc(){pc.width=window.innerWidth;pc.height=window.innerHeight}
resizePc();window.addEventListener('resize',resizePc);
const pts=[];const PT_COUNT=160;
function initParticles(){
 pts.length=0;spawnTimer=0;
}
let spawnTimer=0;
function drawParticles(){
 if(!particlesActive)return;
 const sw=pc.width,sh=pc.height;
 // Gradually spawn particles
 spawnTimer++;
 if(spawnTimer%12===0&&pts.length<PT_COUNT){
  pts.push({x:Math.random()*sw,y:sh+10,vx:(Math.random()-.5)*0.4,vy:-0.2-Math.random()*0.5,wobbleAmp:Math.random()*80+30,wobbleFreq:Math.random()*0.003+0.001,wobblePhase:Math.random()*Math.PI*2,size:Math.random()*4+2,baseAlpha:Math.random()*0.4+0.1,age:0});
 }
 px.fillStyle='#1e1e1e';px.fillRect(0,0,sw,sh);
 for(const p of pts){
  p.age++;
  const wobbleX=Math.sin(p.age*p.wobbleFreq+p.wobblePhase)*p.wobbleAmp*0.01;
  p.x+=p.vx+wobbleX;p.y+=p.vy;
  const breathe=Math.sin(p.age*0.008)*0.5+0.5;
  const alpha=p.baseAlpha*(0.5+breathe*0.5);
  if(p.y<-20){p.y=sh+10;p.x=Math.random()*sw}
  if(p.x<-30)p.x=sw+20;if(p.x>sw+30)p.x=-20;
  const g=px.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
  g.addColorStop(0,`rgba(255,255,255,${alpha})`);
  g.addColorStop(0.5,`rgba(255,255,255,${alpha*0.4})`);
  g.addColorStop(1,'rgba(255,255,255,0)');
  px.fillStyle=g;px.beginPath();px.arc(p.x,p.y,p.size*3,0,Math.PI*2);px.fill();
 }
 requestAnimationFrame(drawParticles);
}

const kStreams=[];const kStars=[];const kNebula=[];const kPillars=[];
function initKongou(){
 kStreams.length=0;kStars.length=0;kNebula.length=0;kPillars.length=0;
 const w=pc.width,h=pc.height;
 // Energy streams - flowing sine wave trails
 for(let i=0;i<8;i++){
  kStreams.push({
   y:Math.random()*h,baseX:Math.random()*w,
   amp:Math.random()*120+60,freq:Math.random()*0.008+0.003,
   speed:Math.random()*2+1.5,phase:Math.random()*Math.PI*2,
   width:Math.random()*3+1,
   hue:Math.floor(Math.random()*60+240),
   len:Math.floor(Math.random()*80+60),
   trail:[],
  });
 }
 // Rushing stars
 for(let i=0;i<120;i++){
  kStars.push({
   x:Math.random()*w,y:Math.random()*h,
   vx:(Math.random()-0.3)*3,vy:(Math.random()-0.5)*1.5,
   size:Math.random()*2.5+0.5,
   brightness:Math.random(),
   phase:Math.random()*Math.PI*2,
   speed:Math.random()*3+1,
  });
 }
 // Nebula clouds - large glowing masses
 for(let i=0;i<6;i++){
  kNebula.push({
   x:Math.random()*w,y:Math.random()*h,
   r:Math.random()*200+100,
   dx:(Math.random()-0.5)*0.4,dy:(Math.random()-0.5)*0.3,
   phase:Math.random()*Math.PI*2,
   hue:Math.floor(Math.random()*80+220),
   sat:Math.floor(Math.random()*40+60),
  });
 }
 // Light pillars - vertical energy columns
 for(let i=0;i<4;i++){
  kPillars.push({
   x:Math.random()*w,
   width:Math.random()*60+20,
   phase:Math.random()*Math.PI*2,
   speed:Math.random()*0.02+0.01,
   hue:Math.floor(Math.random()*40+260),
   drift:(Math.random()-0.5)*2.0+((Math.random()>0.5)?0.5:-0.5),
  });
 }
}
function drawKongou(){
 if(!kongouActive)return;
 const w=pc.width,h=pc.height;
 const t=Date.now()*0.001;
 // Semi-transparent clear for motion trails
 px.fillStyle='rgba(10,10,46,0.15)';
 px.fillRect(0,0,w,h);
 // 1. Nebula clouds
 for(const n of kNebula){
  n.x+=n.dx;n.y+=n.dy;
  if(n.x<-200)n.x=w+200;if(n.x>w+200)n.x=-200;
  if(n.y<-200)n.y=h+200;if(n.y>h+200)n.y=-200;
  const pulse=Math.sin(t*1.5+n.phase)*0.4+0.6;
  const g=px.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*pulse);
  g.addColorStop(0,'hsla('+n.hue+','+n.sat+'%,50%,'+(0.15*pulse)+')');
  g.addColorStop(0.4,'hsla('+n.hue+','+n.sat+'%,30%,'+(0.08*pulse)+')');
  g.addColorStop(1,'hsla('+n.hue+','+n.sat+'%,10%,0)');
  px.beginPath();px.arc(n.x,n.y,n.r*pulse,0,Math.PI*2);
  px.fillStyle=g;px.fill();
 }
 // 2. Light pillars
 for(const p of kPillars){
  p.x+=p.drift+Math.sin(t*0.8+p.phase)*1.5;
  if(p.x<-100)p.x=w+100;if(p.x>w+100)p.x=-100;
  const intensity=Math.sin(t*p.speed*50+p.phase)*0.5+0.5;
  const g=px.createLinearGradient(p.x-p.width/2,0,p.x+p.width/2,0);
  g.addColorStop(0,'hsla('+p.hue+',70%,60%,0)');
  g.addColorStop(0.5,'hsla('+p.hue+',70%,60%,'+(0.12*intensity)+')');
  g.addColorStop(1,'hsla('+p.hue+',70%,60%,0)');
  px.fillStyle=g;px.fillRect(p.x-p.width,0,p.width*2,h);
 }
 // 3. Energy streams
 for(const s of kStreams){
  const cx=s.baseX+Math.sin(t*0.5+s.phase)*100;
  s.trail.push({x:cx+Math.sin(t*s.freq*100+s.phase)*s.amp,y:s.y});
  s.y-=s.speed;
  if(s.y<-20){s.y=h+20;s.trail.length=0;}
  if(s.trail.length>s.len)s.trail.shift();
  if(s.trail.length>2){
   px.beginPath();
   px.moveTo(s.trail[0].x,s.trail[0].y);
   for(let i=1;i<s.trail.length;i++){
    const p=s.trail[i],pp=s.trail[i-1];
    px.quadraticCurveTo(pp.x,pp.y,(pp.x+p.x)/2,(pp.y+p.y)/2);
   }
   px.strokeStyle='hsla('+s.hue+',80%,70%,0.6)';
   px.lineWidth=s.width;
   px.shadowColor='hsla('+s.hue+',90%,60%,0.8)';
   px.shadowBlur=15;
   px.stroke();
   px.shadowBlur=0;
  }
 }
 // 4. Rushing stars
 for(const s of kStars){
  s.x+=s.vx;s.y+=s.vy;
  if(s.x<0)s.x=w;if(s.x>w)s.x=0;
  if(s.y<0)s.y=h;if(s.y>h)s.y=0;
  const flicker=Math.sin(t*s.speed*3+s.phase)*0.3+0.7;
  const a=s.brightness*flicker;
  px.beginPath();
  px.arc(s.x,s.y,s.size*flicker,0,Math.PI*2);
  px.fillStyle='rgba(200,180,255,'+(a*0.8)+')';
  px.fill();
  // Glow
  if(s.size>1.5){
   px.beginPath();
   px.arc(s.x,s.y,s.size*3*flicker,0,Math.PI*2);
   px.fillStyle='rgba(160,140,220,'+(a*0.15)+')';
   px.fill();
  }
 }
 requestAnimationFrame(drawKongou);
}

// === Typewriter with ■ cursor ===
let playing=true;
const nameEl=document.getElementById('ename'),srcEl=document.getElementById('esrc'),msgEl=document.getElementById('emsg');
const delay=ms=>new Promise(r=>setTimeout(r,ms));

async function typewrite(text){
 const lines=text.split('\n');
 let html='';
 let ci=0;
 for(let li=0;li<lines.length;li++){
  if(li>0)html+='<br>';
  for(const ch of lines[li]){
   html+=`<span class="tch" data-i="${ci}">${ch}</span>`;
   ci++;
  }
 }
 msgEl.innerHTML=html;
 const spans=msgEl.querySelectorAll('.tch');
 spans.forEach(s=>s.style.color='transparent');
 for(let i=0;i<spans.length;i++){
  spans[i].style.color='';
  if(i>0)spans[i-1].classList.remove('cursor-at');
  spans[i].classList.add('cursor-at');
  await delay(50);
 }
}

function removeCursor(){
 const c=msgEl.querySelector('.cursor-at');if(c)c.classList.remove('cursor-at');
}

let currentChar=null;let charDisplayCount=0;
async function play(){
  const s=[...C].sort(()=>Math.random()-.5);
  const retEl=document.getElementById('ret');
  for(const c of s){
   if(!playing)return;
   currentChar=c;
   charDisplayCount++;
   const nrvnEl=document.getElementById('nrvn');
   if(charDisplayCount>=3&&nrvnEl){nrvnEl.classList.add('vis');nrvnEl.style.pointerEvents='auto';}
   nameEl.textContent=c.n;
   srcEl.textContent=c.s;
   msgEl.innerHTML='';
   retEl.classList.remove('vis');retEl.style.pointerEvents='none';
   nameEl.classList.add('vis');srcEl.classList.add('vis');
   await delay(800);
   await typewrite(c.m);
   retEl.classList.add('vis');retEl.style.pointerEvents='auto';
   for(let i=0;i<60;i++){if(!playing)return;await delay(100)}
   removeCursor();
   retEl.classList.remove('vis');
   nameEl.classList.remove('vis');srcEl.classList.remove('vis');
   msgEl.style.opacity='0';
   await delay(1200);
   msgEl.innerHTML='';msgEl.style.opacity='1';
  }
  if(playing)play();
 }

// === Nehan: 涅槃 – surrender to the void ===
async function nehan(){
 playing=false;
 removeCursor();
 const retEl=document.getElementById('ret');
 const nrvnEl=document.getElementById('nrvn');
 retEl.classList.remove('vis');retEl.style.pointerEvents='none';
 nrvnEl.classList.remove('vis');nrvnEl.style.pointerEvents='none';

 // Slow fade to darkness
 msgEl.style.transition='opacity 3s ease';
 nameEl.style.transition='opacity 3s ease';
 srcEl.style.transition='opacity 3s ease';
 msgEl.style.opacity='0';
 nameEl.style.opacity='0';
 srcEl.style.opacity='0';
 await delay(2000);

 // Stop particles, darken everything
 particlesActive=false;
 px.clearRect(0,0,pc.width,pc.height);

 // Fade book to pure black
 const book=document.getElementById('book');
 book.style.transition='background 4s ease';
 book.style.background='#000';
 await delay(4000);

 // Brief moment of absolute nothing
 await delay(3000);

 // Mitra speaks from the void
 nameEl.textContent='ミトラ・マイトレーヤ';
 srcEl.textContent='ワディーゲストハウス';
 nameEl.style.transition='opacity 2s ease';
 srcEl.style.transition='opacity 2s ease';
 nameEl.style.opacity='';srcEl.style.opacity='';
 nameEl.classList.add('vis');srcEl.classList.add('vis');
 msgEl.style.transition='';msgEl.style.opacity='1';
 await delay(1000);
 await typewrite('汝は我……我は汝……');
 await delay(2000);
 removeCursor();
 msgEl.style.opacity='0';
 await delay(1000);
 msgEl.innerHTML='';msgEl.style.opacity='1';
 await typewrite('汝は斃れた。\nそして、立つことを拒んだ。\n\n此処は虚無の底──\n音も光も、意味すら届かぬ場所。\n\n……眠れ。永く。');
 await delay(6000);
 removeCursor();

 // Final fade
 msgEl.style.transition='opacity 4s ease';
 nameEl.style.transition='opacity 4s ease';
 srcEl.style.transition='opacity 4s ease';
 msgEl.style.opacity='0';
 nameEl.style.opacity='0';
 srcEl.style.opacity='0';
 await delay(5000);

 // Redirect to diary (even the void has an exit)
 location.href='diary.html';
}
