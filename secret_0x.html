<style>

// Hex dump
let h="";for(let i=0;i<6000;i++)h+=Math.random().toString(16).substr(2,1).toUpperCase();
document.getElementById('hx').textContent=h;
let pct=0;const pctEl=document.getElementById('pct');
const pi=setInterval(()=>{pct+=Math.floor(Math.random()*8)+1;if(pct>100)pct=100;pctEl.textContent=pct;if(pct>=100)clearInterval(pi)},200);

// === Block Noise Glitch (rectangular blocks over BSOD) ===
const cvs=document.getElementById('static-canvas');
const sctx=cvs.getContext('2d');
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
resizeCvs();window.addEventListener('resize',resizeCvs);
let glitchPhase=0,staticRAF=null,blockCount=0;

function drawBlockNoise(){
 const w=cvs.width,hh=cvs.height;
 if(glitchPhase===1){
  // Draw random rectangular blocks of noise (not lines)
  for(let i=0;i<blockCount;i++){
   const bw=Math.random()*200+30;
   const bh=Math.random()*100+15;
   const bx=Math.random()*(w-bw);
   const by=Math.random()*(hh-bh);
   const img=sctx.createImageData(Math.ceil(bw),Math.ceil(bh));
   const d=img.data;
   for(let j=0;j<d.length;j+=4){
    const v=Math.random()*255|0;
    d[j]=v;d[j+1]=v;d[j+2]=v;d[j+3]=180+Math.random()*75;
   }
   sctx.putImageData(img,bx,by);
  }
 } else if(glitchPhase===2){
  const img=sctx.createImageData(w,hh);const d=img.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255}
  sctx.putImageData(img,0,0);
 }
 if(glitchPhase>0)staticRAF=requestAnimationFrame(drawBlockNoise);
}

// === Abstract Sumi-ink Particles (snow/ash floating) ===
const pc=document.getElementById('particle-canvas');
const px=pc.getContext('2d');
let particlesActive=false;
function resizePc(){pc.width=window.innerWidth;pc.height=window.innerHeight}
resizePc();window.addEventListener('resize',resizePc);

const pts=[];
const PT_COUNT=160;

function initParticles(){
 const sw=pc.width,sh=pc.height;
 for(let i=0;i<PT_COUNT;i++){
  pts.push({
   x:Math.random()*sw,
   y:Math.random()*sh,
   vx:(Math.random()-.5)*0.4,
   vy:-0.2-Math.random()*0.5,
   wobbleAmp:Math.random()*80+30,
   wobbleFreq:Math.random()*0.003+0.001,
   wobblePhase:Math.random()*Math.PI*2,
   size:Math.random()*4+2,
   baseAlpha:Math.random()*0.4+0.1,
   age:Math.random()*1000
  });
 }
}

function drawParticles(){
 if(!particlesActive)return;
 const sw=pc.width,sh=pc.height;
 const t=Date.now();

 // Clear with background
 px.fillStyle='#1e1e1e';
 px.fillRect(0,0,sw,sh);

 for(const p of pts){
  p.age++;
  // Organic wandering path via sine wobble
  const wobbleX=Math.sin(p.age*p.wobbleFreq+p.wobblePhase)*p.wobbleAmp*0.01;
  p.x+=p.vx+wobbleX;
  p.y+=p.vy;

  // Breathing opacity
  const breathe=Math.sin(p.age*0.008)*0.5+0.5;
  const alpha=p.baseAlpha*(0.5+breathe*0.5);

  // Reset if out of bounds
  if(p.y<-20){
   p.y=sh+10;
   p.x=Math.random()*sw;
  }
  if(p.x<-30)p.x=sw+20;
  if(p.x>sw+30)p.x=-20;

  // Draw particle (soft circle, no hard edge)
  const g=px.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
  g.addColorStop(0,`rgba(255,255,255,${alpha})`);
  g.addColorStop(0.5,`rgba(255,255,255,${alpha*0.4})`);
  g.addColorStop(1,'rgba(255,255,255,0)');
  px.fillStyle=g;
  px.beginPath();
  px.arc(p.x,p.y,p.size*3,0,Math.PI*2);
  px.fill();
 }

 requestAnimationFrame(drawParticles);
}

// === Messages (typewriter) ===
let playing=true;
const nameEl=document.getElementById('ename'),msgEl=document.getElementById('emsg');
const w=ms=>new Promise(r=>setTimeout(r,ms));
async function typewrite(text){
 msgEl.innerHTML='';
 msgEl.classList.add('vis');
 const chars=text.replace(/\n/g,'\x00').split('');
 for(const ch of chars){
  if(!playing)return;
  if(ch==='\x00'){msgEl.innerHTML+='<br>'}
  else{msgEl.innerHTML+=ch}
  await w(50);
 }
}
async function play(){
 const s=[...C].sort(()=>Math.random()-.5);
 for(const c of s){
  if(!playing)return;
  nameEl.textContent='─── '+c.n+' ───';
  msgEl.innerHTML='';
  nameEl.classList.add('vis');await w(800);
  await typewrite(c.m);
  for(let i=0;i<30;i++){if(!playing)return;await w(100)}
  nameEl.classList.remove('vis');msgEl.classList.remove('vis');
  for(let i=0;i<12;i++){if(!playing)return;await w(100)}
 }
 if(playing)play();
}

// === Transition: BSOD → Block Noise (geometric ×2) → Puchun → Message ===
setTimeout(()=>{
 glitchPhase=1;blockCount=1;drawBlockNoise();
 // Geometric progression: ×2 every 120ms → 1,2,4,8,16,32,64
 const accel=setInterval(()=>{
  blockCount=Math.min(blockCount*2,80);
 },120);
 // Full static after 900ms
 setTimeout(()=>{glitchPhase=2;clearInterval(accel)},900);
 // Puchun after 1200ms
 setTimeout(()=>{
  const b=document.getElementById('book');
  b.style.opacity='1';b.style.pointerEvents='auto';
  document.getElementById('bsod-wrap').classList.add('puchun');
  setTimeout(()=>{
   cancelAnimationFrame(staticRAF);glitchPhase=0;
   document.getElementById('bsod-wrap').style.display='none';
   initParticles();particlesActive=true;drawParticles();
   play();
  },700);
  setTimeout(()=>document.getElementById('ret').classList.add('vis'),8000);
 },1200);
},1500);

// === Gedatsu ===
function gedatsu(){
 playing=false;particlesActive=false;
 const ml=document.getElementById('mitra');ml.style.opacity='1';ml.style.pointerEvents='auto';
 setTimeout(()=>document.getElementById('m0').classList.add('vis'),1000);
 setTimeout(()=>document.getElementById('m1').classList.add('vis'),3000);
 setTimeout(()=>document.getElementById('m2').classList.add('vis'),6000);
 setTimeout(()=>{document.getElementById('wo').style.opacity='1'},12000);
 setTimeout(()=>{location.href='diary.html'},14000);
}
</script></body></html>
