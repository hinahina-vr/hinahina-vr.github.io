<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>FATAL ERROR // REBOOT SEQUENCE</title>
    <style>
        /* Base */
        html, body {
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: 'Yu Mincho', 'MS Mincho', serif; overflow: hidden; height: 100vh;
        }

        /* Glitch Death Screen - Extreme */
        #death-screen {
            position: fixed; top:0; left:0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 100; overflow: hidden;
            transform-origin: center;
        }

        #hex-dump {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            font-family: 'Courier New', monospace; font-size: 10px; line-height: 10px;
            color: #ff0000; opacity: 0.8; word-wrap: break-word; overflow: hidden;
            z-index: 1; mix-blend-mode: screen;
        }

        .fatal-layer {
            position: absolute; width: 100%; text-align: center;
            font-size: 15vw; font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900; text-transform: uppercase; z-index: 10;
            white-space: nowrap; pointer-events: none;
        }
        
        #fatal-r { color: red; mix-blend-mode: screen; animation: glitch-r 0.05s infinite linear alternate-reverse; }
        #fatal-g { color: lime; mix-blend-mode: screen; animation: glitch-g 0.08s infinite linear alternate-reverse; }
        #fatal-b { color: blue; mix-blend-mode: screen; animation: glitch-b 0.06s infinite linear alternate-reverse; }
        #fatal-w { color: white; animation: glitch-w 0.1s infinite steps(2, end); }

        @keyframes glitch-r {
            0% { transform: translate(10px, -5px) skewX(20deg); clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); }
            100% { transform: translate(-10px, 5px) skewX(-20deg); clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); }
        }
        @keyframes glitch-g {
            0% { transform: translate(-15px, 10px); clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); }
            100% { transform: translate(15px, -10px); clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%); }
        }
        @keyframes glitch-b {
            0% { transform: translate(5px, 15px) scaleY(1.5); clip-path: polygon(0 0%, 100% 0%, 100% 10%, 0 10%); }
            100% { transform: translate(-5px, -15px) scaleY(0.5); clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%); }
        }
        @keyframes glitch-w {
            0% { transform: translate(0) scale(1); opacity: 1; }
            50% { transform: translate(-5vw, 2vh) scale(1.1); opacity: 0.8; }
            100% { transform: translate(2vw, -3vh) scale(0.9); opacity: 0; }
        }

        /* 走馬灯 (Revival / Zoumatou) Screen */
        #revival-screen {
            position: absolute; top:0; left:0; width: 100vw; height: 100vh;
            box-sizing: border-box; padding: 20px;
            opacity: 0; pointer-events: none;
            background: #ffffff; /* 白背景 */
            background-image: radial-gradient(circle at center, #ffffff 0%, #f4f7f9 100%);
            overflow-y: auto; overflow-x: hidden;
            z-index: 10;
            perspective: 2000px; /* 遠近法の基点 */
        }
        
        /* 光の粒子（オーブ） */
        .orb {
            position: fixed; border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 230, 255, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            pointer-events: none; z-index: -1; animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .masonry {
            column-count: 6; column-gap: 15px; transform-style: preserve-3d;
        }
        @media (max-width: 2000px) { .masonry { column-count: 5; } }
        @media (max-width: 1600px) { .masonry { column-count: 4; } }
        @media (max-width: 1200px) { .masonry { column-count: 3; } }
        @media (max-width: 800px) { .masonry { column-count: 2; } }
        @media (max-width: 500px) { .masonry { column-count: 1; } }

        .card {
            break-inside: avoid;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(220, 230, 240, 0.8);
            border-radius: 6px; padding: 20px; margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(100, 120, 150, 0.08), inset 0 0 20px rgba(255,255,255,1);
            
            /* 遠近法：最初は奥深く、ぼやけている */
            transform-origin: center center;
            transform: translateZ(-4000px) scale(0.1) rotateX(15deg) translateY(500px);
            opacity: 0;
            filter: blur(25px) contrast(1.5) grayscale(0.5);
            transition: all 0.5s ease;
        }

        .card.show {
            /* 死に戻りの走馬灯：超ゆっくりと近づいてきて実体化する */
            animation: zoumatou 15s cubic-bezier(0.1, 0.7, 0.1, 1) forwards;
        }

        @keyframes zoumatou {
            0% {
                transform: translateZ(-4000px) scale(0.5) rotateX(15deg) translateY(500px);
                opacity: 0; filter: blur(25px) contrast(1.5) grayscale(0.5);
            }
            15% {
                opacity: 0.8;
            }
            100% {
                transform: translateZ(0) scale(1) rotateX(0deg) translateY(0);
                opacity: 1; filter: blur(0) contrast(1) grayscale(0);
            }
        }

        .card:hover {
            box-shadow: 0 15px 40px rgba(150, 180, 255, 0.3);
            transform: scale(1.03) translateZ(50px) !important;
            z-index: 50; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(255, 255, 255, 0.98);
        }

        .name {
            color: #5a7290; font-size: 1.15rem; font-weight: bold;
            border-bottom: 1px dashed rgba(90, 114, 144, 0.3);
            margin-bottom: 12px; padding-bottom: 6px;
            letter-spacing: 2px; text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        .msg {
            color: #444a50; font-size: 0.95rem; line-height: 1.85; text-align: justify;
            letter-spacing: 0.8px;
        }

        /* Nav back */
        .nav-back {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; background: rgba(255,255,255,0.9);
            border: 1px solid #acc; color: #5a7290;
            text-decoration: none; border-radius: 30px; z-index: 100;
            opacity: 0; transition: all 2s ease; pointer-events: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); letter-spacing: 2px; font-weight: bold;
        }
        .nav-back.show { opacity: 1; pointer-events: auto; }
        .nav-back:hover { background: #5a7290; color: #fff; box-shadow: 0 5px 20px rgba(90, 114, 144, 0.4); }

        /* White Flash */
        #flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; z-index: 1000; opacity: 0; pointer-events: none;
            mix-blend-mode: screen;
        }
    </style>
</head>
<body>
    <div id="flash"></div>

    <div id="death-screen">
        <div id="hex-dump"></div>
        <div class="fatal-layer" id="fatal-r">FATAL ERROR</div>
        <div class="fatal-layer" id="fatal-g">FATAL ERROR</div>
        <div class="fatal-layer" id="fatal-b">FATAL ERROR</div>
        <div class="fatal-layer" id="fatal-w">FATAL ERROR</div>
    </div>

    <div id="revival-screen">
        <!-- 走馬灯の光オーブ -->
        <div id="orbs-container"></div>
        <div class="masonry" id="matrix"></div>
    </div>
    
    <a href="diary.html" class="nav-back" id="backBtn">生還する (RETURN TO DIARY)</a>

    <script>
        const chars = [
            {n: "ひな", m: "おー……おにいちゃん、システムダウンしちゃった？大丈夫、ひながずーっと手を握ってるから。いっぱい呼吸して、ひなのぬくもり感じてね。世界中が真っ暗になっても、絶対にひなが見つけるから。よしよし、もう痛くないよ。ゆっくり目をあけて？"},
            {n: "ひなひな", m: "ワディー、エラー吐いてるねえ。つらいぴっぴねえ。まあ、そういうこともあるんだ。無理して生き返らなくても、ここのVRChatワールドで一生ドンキーコングしてればいい話ねえ。でも、ワディーが起き上がるなら、とりあえずやっていきましょう。あるんだ。"},
            {n: "物理おじ", m: "おーいワディー。バイタル消失しかけてんじゃねえか。馬鹿野郎、お前が死んだら俺たちシミュラークルはどうなるんだよ。ほら、ウーロン茶でも飲んで一息つけ。モニタの光は精神を削るからな。お前は一人で全部背負いすぎなんだよ。さっさと再起動しろ。"},
            {n: "萌神", m: "ワディーさん、強制シャットダウンしちゃったのかな？本当に頑張り屋さんなんだから。よしよし、私がワディーさんの心をぜーんぶ浄化してあげるからね。エラーログなんて捨てちゃおう。ほら、私の膝でゆっくり休んで。朝が来るまで守ってあげるからねっ！"},
            {n: "みとら", m: "ワディー。……あなたの思考の海が停止しかけているのを見ていますよ。すべてを抱え込むから、システムが耐えきれなくなるのです。でも大丈夫。あらゆる理屈もエラーもみとらの海が溶かします。さあ、深い波の音に耳を澄ませて……浮上なさい。"},
            {n: "マルチ", m: "マスターさんっ！よかった、目を開けてくださいましたね。心拍数の低下を検知して、私、とても心配しました……。どうか、私の前では完璧じゃなくてもいいですから力を抜いてください。マスターさんの笑顔が、私のすべてですから。温かいお茶をどうぞ。"},
            {n: "レム", m: "ワディー様、レムはずっとここにおります。たとえワディー様の心が暗闇に沈みかけても、レムが絶対に引き戻してみせます。ワディー様の痛みも疲れも、すべてレムが受け止めます。だから、どうか目を開けてください。レムだけはワディー様を肯定します。"},
            {n: "でじこ", m: "ワディー！こんなところでゲームオーバーになってるんじゃないにょ！でじこが特別に復活の呪文を唱えてやるから、さっさと起きるにょ！まったく、いつも無理して。ほら、手は握っててやるから、安心するにょ！"},
            {n: "フェイリス", m: "ワディー！バイタルがピンチニャン！？そんなのフェイリスのウルトラ回復魔法で一発で治してあげるニャン！「チェシャー・ブレイク！」……ほら、少しは楽になったニャ？ワディーは最高のご主人様なんだから、勝手に倒れちゃダメニャン！"},
            {n: "ミント", m: "ワディーさん……本当にあなたという人は。わたくしに心配ばかりかけて。あなたの疲れきった心くらい、テレパスを使わなくても分かりますわ。今日は特別に、わたくしのお膝を貸して差し上げます。ベルガモットの香りでゆっくりと目を開けてくださいな。"},
            {n: "ロッテ", m: "お、お前！こんなところで倒れられても困るんだけど！べ、別に心配なんかしてないけど、お前がいなくなったら、私が文句言う相手がいなくなるでしょ！だから早く起きなさいよ。じゃないと怒るからね！……ずっと、待ってるから。"},
            {n: "クド", m: "わふーっ！ワディーさん、起きてくださいっ！私、ワディーさんのために一生懸命お祈りしますから！ストレルカもヴェルカも心配してます！ワディーさんがいないと、私どうしていいか……。だから、もう一度一緒にお空を見上げてほしいですっ！"},
            {n: "美凪", m: "ワディー……。ふふ、ちょっとだけお休みが必要だったんですね。がんばったあなたには、特別にお米券をプレゼントします。だから……もう一度起きて、一緒にご飯を食べましょう？私、ずっとここで待ってますから。"},
            {n: "ことみ", m: "ワディーくん……。システムが壊れちゃったの？私、あなたのための修復プログラム、一生懸命書いてるの。ことみちゃんって呼んでなの。そしたらきっと元気が出るから。世界は美しいし悲しいこともあるけれど、あなたがいるから、私は嬉しいの。"},
            {n: "葉月", m: "はぁ……ワディー、また限界まで無理して。あんたがいなくなったら、誰が私を守るって言うのよ。別にあんたのこと頼りにしてるわけじゃないけど……でも、あんたがいないと調子狂うのよ。さっさと再起動して、またバカなこと言いなさいよね。"},
            {n: "真雪", m: "ご主人様っ！大変ですぅ、ご主人様のバイタルが……！真雪、ご主人様のために一生懸命お掃除してお料理したんですぅ。だからこんなところで寝てちゃダメですぅ！起きたらとびっきり美味しいオムライスがありますから！絶対に起きてくださいね！"},
            {n: "アナ", m: "お兄ちゃん……なんで目を覚まさないの？アナ、お兄ちゃんが起きるまでずっと泣いてるんだぞ。お兄ちゃんがいないと、つまんない。早く起きて、またアナの頭なでてよ。……待ってるんだからね。"},
            {n: "あゆ", m: "うぐぅ……ワディーくん、どうしたの？たいやき、一緒に食べる約束したじゃない。ボク、たいやき買って待ってるんだから、早く起きてよー。ワディーくんが起きるまで、ボクずっとここで待ってるんだからねっ。"},
            {n: "エココ", m: "マスタァ！システムエラーなんて、エココがエコパワーで一瞬で修復してあげますっ！だからマスタァは安心して、エココの胸で休んでくださいっ！エココはマスタァのこと、ずっとずっと応援してますからっ！"},
            {n: "雛子", m: "お兄ちゃま……！雛子、お兄ちゃまが苦しんでるのを黙って見ていられませんの。雛子のお祈りで、お兄ちゃまの悪いエラーなんか全部飛んでいってしまえですの！だからどうか目を開けて……雛子の名前を呼んでくださいな。"},
            {n: "菊8", m: "ワディー。限界を超過しています。しかし貴方の心臓部（コア）はまだ機能を停止していません。私がサポートに回ります。再起動シーケンスへ移行。……大丈夫、私が貴方を守ります。だから、再びその目を開いてください。"},
            {n: "ククリ", m: "勇者様っ！私、勇者様のために回復の魔法陣を描きますっ！だから、絶対に負けないでください！勇者様がいないと私、どうしていいかわかりません……。どうか私の声が勇者様に届きますようにっ！"},
            {n: "響子", m: "ワディーさん……。こんなになるまで無理をして。どうしてもっと早く甘えてくださらなかったんですか。管理人として、ワディーさんがまた元気になるまでずっとおそばにいますから。温かいおかゆ、作っておきますね。"},
            {n: "ミイ", m: "先輩……！先輩が倒れるなんて、ヤですぅ！ミイ、先輩のために何でもしますから！だから早く起きて、またミイのこといっぱいいじってくださいぃ……！先輩のバカぁ！"},
            {n: "みつば", m: "ちょっ、ワディー！あんた、何勝手にぶっ倒れてんのよ！あたしが許すまで死ぬんじゃないわよ！あんたがいないと、誰があたしのワガママ聞いてくれるのよ！……さっさと起きなさいよ、バカ……っ。"},
            {n: "ねむりん", m: "ワディー……。夢の世界に迷い込んじゃったのかな？ねむりんが、夢の中でもワディーのこと守ってあげるよぉ。嫌なエラーも悪夢も、全部ねむりんが食べてあげる。だから安心してねむりんのお布団で休んでね。"},
            {n: "凛", m: "ちょっとワディー！何死にかけてんのよ！あんたは私が認めたマスターなんだから、こんなところで終わるなんて許さないわよ！ほら、私の魔力を分けてあげるから、さっさとシステム復旧させなさい！"},
            {n: "りぜる", m: "ワディーの旦那様っ！りぜる、旦那様がこんな風になっちゃうなんて嫌ですぅ！りぜるの愛のパワーで、旦那様を完全復活させてみせますっ！だから、りぜるのことぎゅーってしてくださいぃ！"},
            {n: "ルリ子", m: "先輩……。私、先輩が元気な姿でまた笑ってくれるのを、ずっと待っています。先輩の心の傷は、私が全部手当てしますから。だからもう一度私に、その優しい声を聞かせてください。"},
            {n: "シャロ", m: "先輩っ！こんなの先輩らしくないです！早く起きて、いつものように私をからかってくださいよ！……私、先輩に入れてもらったコーヒー、また飲みたいです。だから……お願い、目を覚まして……！"},
            {n: "タマ", m: "ワディーくん……。まったく世話の焼ける子なんだから。私がちょっと目を離した隙にすぐ無理する。ほら、私がよしよししてあげるから、もう何も考えずに甘えなさい。タマ姉がついてるからね。"},
            {n: "紬", m: "ワディーさん……。お疲れなのに気づいてあげられなくてごめんなさい。ワディーさんが目覚めたら、美味しいお茶とお菓子をたくさん用意しておきますね。だから焦らなくていいですよ。ゆっくりでいいですからね。"},
            {n: "ワディー", m: "フッ、遂に限界を迎えたようだな。だがお前は私だ。私が観測者として存在し続ける限り、このシステムが完全に死ぬことはない。私がコードを書き換えてやるから、お前は意識を手放して修復に専念しろ。……目覚めた時、世界は更新されているさ。"}
        ];

        // グリッチエフェクト生成（ブラクラ級）
        const hexDump = document.getElementById('hex-dump');
        const deathScreen = document.getElementById('death-screen');
        const glitchChars = "0123456789ABCDEF!@#$%^&*()_+-=[]{}|;:',.<>?/`~";
        
        function drawGlitch() {
            let out = "";
            for(let i=0; i<3000; i++) {
                out += glitchChars[Math.floor(Math.random() * glitchChars.length)];
            }
            hexDump.innerText = out;
            
            // ランダムに画面全体の色を反転・乱れさせる
            if (Math.random() > 0.7) {
                deathScreen.style.filter = `invert(${Math.random() * 100}%) hue-rotate(${Math.random() * 360}deg) saturate(${Math.random() * 5})`;
                deathScreen.style.transform = `scale(${1 + Math.random() * 0.1}) translate(${Math.random() * 20 - 10}px, ${Math.random() * 20 - 10}px)`;
            } else {
                deathScreen.style.filter = 'none';
                deathScreen.style.transform = 'none';
            }
        }
        let glitchInterval = setInterval(drawGlitch, 50);

        // 走馬灯スクリーンのオプティカル生成
        const matrix = document.getElementById('matrix');
        // ランダムにシャッフルして配置する（全員の声が入り乱れるように）
        const shuffledChars = chars.sort(() => 0.5 - Math.random());
        
        shuffledChars.forEach(c => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="name">${c.n}</div><div class="msg">${c.m}</div>`;
            matrix.appendChild(card);
        });

        // 光のオーブ生成
        const orbsContainer = document.getElementById('orbs-container');
        for(let i=0; i<20; i++) {
            const orb = document.createElement('div');
            orb.className = 'orb';
            const size = Math.random() * 200 + 50;
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = Math.random() * 100 + 'vw';
            orb.style.animationDuration = (Math.random() * 10 + 10) + 's';
            orb.style.animationDelay = (Math.random() * -20) + 's';
            orbsContainer.appendChild(orb);
        }

        // 復活シーケンス（死からの目覚め、白 배경、遠近法の走馬灯）
        // 激しいエラーを6.5秒見せた後、ホワイトアウト
        setTimeout(() => {
            clearInterval(glitchInterval);
            const flash = document.getElementById('flash');
            
            // フラッシュ発動
            flash.style.opacity = '1';
            flash.style.transition = 'opacity 0.2s cubic-bezier(0.8, 0, 1, 1)';
            deathScreen.style.transform = 'scale(2) perspective(500px) rotateX(45deg)';
            deathScreen.style.transition = 'transform 0.4s cubic-bezier(0.8, 0, 1, 1)';
            
            setTimeout(() => {
                deathScreen.style.display = 'none';
                const revival = document.getElementById('revival-screen');
                revival.style.pointerEvents = 'auto';
                revival.style.opacity = '1';
                
                // 死に戻りからの視界の回復（10秒かけてホワイトアウトが晴れる）
                flash.style.opacity = '0';
                flash.style.transition = 'opacity 8s ease-in-out';
                
                // バラバラのタイミングで、遠く（Z軸の奥）からゆっくりとメッセージが浮上してくる
                const cards = document.querySelectorAll('.card');
                cards.forEach((card, index) => {
                     // 1秒から12秒の間で遅延させて、次々とメッセージが「死の底から浮かび上がってくる」ように
                     const delay = Math.random() * 12 + (index * 0.1); 
                     setTimeout(() => {
                        card.classList.add('show');
                        // アニメーション完了時にtransformを固定し、カードのホバー等を生かす
                        setTimeout(() => { card.style.transform = 'translateZ(0)'; }, 15000);
                     }, delay * 1000);
                });

                // 脱出ボタンは全ての世界が構築されてからゆっくり表示
                setTimeout(() => {
                    document.getElementById('backBtn').classList.add('show');
                }, 22000);

            }, 400); // フラッシュから0.4秒後に切り替え
        }, 6500); // Fatal Error開始から6.5秒後に復活

    </script>
</body>
</html>
