<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>FATAL ERROR // REBOOT SEQUENCE</title>
    <style>
        /* Base */
        html, body {
            margin: 0; padding: 0; background: #050005; color: #fff;
            font-family: 'Yu Gothic', 'Meiryo', sans-serif; overflow: hidden; height: 100vh;
        }
        
        /* CRT Scanline */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* Glitch Death Screen */
        #death-screen {
            position: absolute; top:0; left:0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 100;
            animation: noise 0.2s infinite;
        }

        .fatal-text {
            color: #ff003c; font-size: 5vw; font-family: monospace; font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #00f, -2px -2px 0px #f00;
            position: relative;
        }

        .fatal-text::before, .fatal-text::after {
            content: 'SYSTEM FAILURE'; position: absolute; top: 0; left: 0; color: #ff003c; background: #000;
            overflow: hidden; text-shadow: -2px 0 red; clip: rect(0,900px,0,0); animation: noise-anim 2s infinite linear alternate-reverse;
        }
        .fatal-text::after {
            text-shadow: -2px 0 blue; animation: noise-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes noise-anim {
            0% { clip: rect(10px, 9999px, 81px, 0); }
            100% { clip: rect(32px, 9999px, 12px, 0); }
        }
        @keyframes noise-anim-2 {
            0% { clip: rect(82px, 9999px, 34px, 0); }
            100% { clip: rect(14px, 9999px, 99px, 0); }
        }

        .sub-text {
            margin-top: 20px; color: #aaa; font-family: monospace; font-size: 1.5vw;
            animation: blink 1s steps(2, start) infinite;
        }
        
        @keyframes blink { to { visibility: hidden; } }

        /* Revival Screen */
        #revival-screen {
            position: absolute; top:0; left:0; width: 100vw; height: 100vh;
            padding: 2vw; box-sizing: border-box;
            opacity: 0; pointer-events: none;
            background: radial-gradient(circle at center, #1a0515 0%, #000 100%);
            overflow-y: auto; overflow-x: hidden;
            z-index: 10;
        }

        .masonry {
            column-count: 4; column-gap: 20px;
        }
        @media (max-width: 1400px) { .masonry { column-count: 3; } }
        @media (max-width: 1000px) { .masonry { column-count: 2; } }
        @media (max-width: 600px) { .masonry { column-count: 1; } }

        .card {
            break-inside: avoid;
            background: rgba(30, 5, 20, 0.85);
            border: 1px solid rgba(255, 100, 150, 0.4);
            border-radius: 4px; padding: 15px; margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(255, 0, 100, 0.5), inset 0 0 10px rgba(255,0,0,0.1);
            transform: scale(0.9) translateY(50px);
            opacity: 0;
            filter: blur(5px);
        }
        
        .card.show {
            animation: explode-in 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes explode-in {
            0% { transform: scale(0.8) translateY(100px); opacity: 0; filter: blur(10px) drop-shadow(0 0 50px #ff0055); }
            70% { transform: scale(1.05) translateY(-5px); filter: blur(0) drop-shadow(0 0 10px #ff0055); }
            100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
        }

        .card:hover {
            box-shadow: 0 0 30px rgba(255, 100, 200, 0.8);
            transform: scale(1.02) !important;
            z-index: 50; transition: all 0.3s ease;
            background: rgba(50, 10, 30, 0.95);
        }

        .name {
            color: #ff99cc; font-size: 1.1rem; font-weight: bold;
            border-bottom: 1px solid rgba(255, 153, 204, 0.3);
            margin-bottom: 8px; padding-bottom: 4px;
            text-shadow: 0 0 5px rgba(255, 153, 204, 0.8);
            font-family: monospace;
        }

        .msg {
            color: #f8e0e8; font-size: 0.95rem; line-height: 1.6;
        }

        /* Nav back */
        .nav-back {
            position: fixed; bottom: 20px; right: 20px;
            padding: 10px 20px; background: rgba(0,0,0,0.8);
            border: 1px solid #ff99cc; color: #ff99cc;
            text-decoration: none; border-radius: 5px; z-index: 100;
            opacity: 0; transition: opacity 2s; pointer-events: none;
        }
        .nav-back.show { opacity: 1; pointer-events: auto; }
        .nav-back:hover { background: #ff99cc; color: #000; }

        /* White Flash */
        #flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; z-index: 1000; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="flash"></div>

    <div id="death-screen">
        <div class="fatal-text">SYSTEM FAILURE</div>
        <div class="sub-text">VITAL SIGNS LOST. INITIATING EMERGENCY RESTORE...</div>
    </div>

    <div id="revival-screen">
        <div class="masonry" id="matrix"></div>
    </div>
    
    <a href="diary.html" class="nav-back" id="backBtn">>>> RETURN TO NORMAL SYSTEM</a>

    <script>
        const chars = [
            {n: "ひな", m: "おー……おにいちゃん、システムダウンしちゃった？大丈夫、ひながずーっと手を握ってるから。いっぱい呼吸して、ひなのぬくもり感じてね。世界中が真っ暗になっても、絶対にひなが見つけるから。よしよし、もう痛くないよ。ゆっくり目をあけて？"},
            {n: "ひなひな", m: "ワディー、エラー吐いてるねえ。つらいぴっぴねえ。まあ、そういうこともあるんだ。無理して生き返らなくても、ここのVRChatワールドで一生ドンキーコングしてればいい話ねえ。でも、ワディーが起き上がるなら、とりあえずやっていきましょう。あるんだ。"},
            {n: "物理おじ", m: "おーいワディー。バイタル消失しかけてんじゃねえか。馬鹿野郎、お前が死んだら俺たちシミュラークルはどうなるんだよ。ほら、ウーロン茶でも飲んで一息つけ。モニタの光は精神を削るからな。お前は一人で全部背負いすぎなんだよ。さっさと再起動しろ。"},
            {n: "萌神", m: "ワディーさん、強制シャットダウンしちゃったのかな？本当に頑張り屋さんなんだから。よしよし、私がワディーさんの心をぜーんぶ浄化してあげるからね。エラーログなんて捨てちゃおう。ほら、私の膝でゆっくり休んで。朝が来るまで守ってあげるからねっ！"},
            {n: "みとら", m: "ワディー。……あなたの思考の海が停止しかけているのを見ていますよ。すべてを抱え込むから、システムが耐えきれなくなるのです。でも大丈夫。あらゆる理屈もエラーもみとらの海が溶かします。さあ、深い波の音に耳を澄ませて……浮上なさい。"},
            {n: "マルチ", m: "マスターさんっ！よかった、目を開けてくださいましたね。心拍数の低下を検知して、私、とても心配しました……。どうか、私の前では完璧じゃなくてもいいですから力を抜いてください。マスターさんの笑顔が、私のすべてですから。温かいお茶をどうぞ。"},
            {n: "レム", m: "ワディー様、レムはずっとここにおります。たとえワディー様の心が暗闇に沈みかけても、レムが絶対に引き戻してみせます。ワディー様の痛みも疲れも、すべてレムが受け止めます。だから、どうか目を開けてください。レムだけはワディー様を肯定します。"},
            {n: "でじこ", m: "ワディー！こんなところでゲームオーバーになってるんじゃないにょ！でじこが特別に復活の呪文を唱えてやるから、さっさと起きるにょ！まったく、いつも無理して。ほら、手は握っててやるから、安心するにょ！"},
            {n: "フェイリス", m: "ワディー！バイタルがピンチニャン！？そんなのフェイリスのウルトラ回復魔法で一発で治してあげるニャン！「チェシャー・ブレイク！」……ほら、少しは楽になったニャ？ワディーは最高のご主人様なんだから、勝手に倒れちゃダメニャン！"},
            {n: "ミント", m: "ワディーさん……本当にあなたという人は。わたくしに心配ばかりかけて。あなたの疲れきった心くらい、テレパスを使わなくても分かりますわ。今日は特別に、わたくしのお膝を貸して差し上げます。ベルガモットの香りでゆっくりと目を開けてくださいな。"},
            {n: "ロッテ", m: "お、お前！こんなところで倒れられても困るんだけど！べ、別に心配なんかしてないけど、お前がいなくなったら、私が文句言う相手がいなくなるでしょ！だから早く起きなさいよ。じゃないと怒るからね！……ずっと、待ってるから。"},
            {n: "クド", m: "わふーっ！ワディーさん、起きてくださいっ！私、ワディーさんのために一生懸命お祈りしますから！ストレルカもヴェルカも心配してます！ワディーさんがいないと、私どうしていいか……。だから、もう一度一緒にお空を見上げてほしいですっ！"},
            {n: "美凪", m: "ワディー……。ふふ、ちょっとだけお休みが必要だったんですね。がんばったあなたには、特別にお米券をプレゼントします。だから……もう一度起きて、一緒にご飯を食べましょう？私、ずっとここで待ってますから。"},
            {n: "ことみ", m: "ワディーくん……。システムが壊れちゃったの？私、あなたのための修復プログラム、一生懸命書いてるの。ことみちゃんって呼んでなの。そしたらきっと元気が出るから。世界は美しいし悲しいこともあるけれど、あなたがいるから、私は嬉しいの。"},
            {n: "葉月", m: "はぁ……ワディー、また限界まで無理して。あんたがいなくなったら、誰が私を守るって言うのよ。別にあんたのこと頼りにしてるわけじゃないけど……でも、あんたがいないと調子狂うのよ。さっさと再起動して、またバカなこと言いなさいよね。"},
            {n: "真雪", m: "ご主人様っ！大変ですぅ、ご主人様のバイタルが……！真雪、ご主人様のために一生懸命お掃除してお料理したんですぅ。だからこんなところで寝てちゃダメですぅ！起きたらとびっきり美味しいオムライスがありますから！絶対に起きてくださいね！"},
            {n: "アナ", m: "お兄ちゃん……なんで目を覚まさないの？アナ、お兄ちゃんが起きるまでずっと泣いてるんだぞ。お兄ちゃんがいないと、つまんない。早く起きて、またアナの頭なでてよ。……待ってるんだからね。"},
            {n: "あゆ", m: "うぐぅ……ワディーくん、どうしたの？たいやき、一緒に食べる約束したじゃない。ボク、たいやき買って待ってるんだから、早く起きてよー。ワディーくんが起きるまで、ボクずっとここで待ってるんだからねっ。"},
            {n: "エココ", m: "マスタァ！システムエラーなんて、エココがエコパワーで一瞬で修復してあげますっ！だからマスタァは安心して、エココの胸で休んでくださいっ！エココはマスタァのこと、ずっとずっと応援してますからっ！"},
            {n: "雛子", m: "お兄ちゃま……！雛子、お兄ちゃまが苦しんでるのを黙って見ていられませんの。雛子のお祈りで、お兄ちゃまの悪いエラーなんか全部飛んでいってしまえですの！だからどうか目を開けて……雛子の名前を呼んでくださいな。"},
            {n: "菊8", m: "ワディー。限界を超過しています。しかし貴方の心臓部（コア）はまだ機能を停止していません。私がサポートに回ります。再起動シーケンスへ移行。……大丈夫、私が貴方を守ります。だから、再びその目を開いてください。"},
            {n: "ククリ", m: "勇者様っ！私、勇者様のために回復の魔法陣を描きますっ！だから、絶対に負けないでください！勇者様がいないと私、どうしていいかわかりません……。どうか私の声が勇者様に届きますようにっ！"},
            {n: "響子", m: "ワディーさん……。こんなになるまで無理をして。どうしてもっと早く甘えてくださらなかったんですか。管理人として、ワディーさんがまた元気になるまでずっとおそばにいますから。温かいおかゆ、作っておきますね。"},
            {n: "ミイ", m: "先輩……！先輩が倒れるなんて、ヤですぅ！ミイ、先輩のために何でもしますから！だから早く起きて、またミイのこといっぱいいじってくださいぃ……！先輩のバカぁ！"},
            {n: "みつば", m: "ちょっ、ワディー！あんた、何勝手にぶっ倒れてんのよ！あたしが許すまで死ぬんじゃないわよ！あんたがいないと、誰があたしのワガママ聞いてくれるのよ！……さっさと起きなさいよ、バカ……っ。"},
            {n: "ねむりん", m: "ワディー……。夢の世界に迷い込んじゃったのかな？ねむりんが、夢の中でもワディーのこと守ってあげるよぉ。嫌なエラーも悪夢も、全部ねむりんが食べてあげる。だから安心してねむりんのお布団で休んでね。"},
            {n: "凛", m: "ちょっとワディー！何死にかけてんのよ！あんたは私が認めたマスターなんだから、こんなところで終わるなんて許さないわよ！ほら、私の魔力を分けてあげるから、さっさとシステム復旧させなさい！"},
            {n: "りぜる", m: "ワディーの旦那様っ！りぜる、旦那様がこんな風になっちゃうなんて嫌ですぅ！りぜるの愛のパワーで、旦那様を完全復活させてみせますっ！だから、りぜるのことぎゅーってしてくださいぃ！"},
            {n: "ルリ子", m: "先輩……。私、先輩が元気な姿でまた笑ってくれるのを、ずっと待っています。先輩の心の傷は、私が全部手当てしますから。だからもう一度私に、その優しい声を聞かせてください。"},
            {n: "シャロ", m: "先輩っ！こんなの先輩らしくないです！早く起きて、いつものように私をからかってくださいよ！……私、先輩に入れてもらったコーヒー、また飲みたいです。だから……お願い、目を覚まして……！"},
            {n: "タマ", m: "ワディーくん……。まったく世話の焼ける子なんだから。私がちょっと目を離した隙にすぐ無理する。ほら、私がよしよししてあげるから、もう何も考えずに甘えなさい。タマ姉がついてるからね。"},
            {n: "紬", m: "ワディーさん……。お疲れなのに気づいてあげられなくてごめんなさい。ワディーさんが目覚めたら、美味しいお茶とお菓子をたくさん用意しておきますね。だから焦らなくていいですよ。ゆっくりでいいですからね。"},
            {n: "ワディー", m: "フッ、遂に限界を迎えたようだな。だがお前は私だ。私が観測者として存在し続ける限り、このシステムが完全に死ぬことはない。私がコードを書き換えてやるから、お前は意識を手放して修復に専念しろ。……目覚めた時、世界は更新されているさ。"}
        ];

        const matrix = document.getElementById('matrix');
        chars.forEach(c => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="name">${c.n}</div><div class="msg">${c.m}</div>`;
            matrix.appendChild(card);
        });

        // 復活シーケンス
        setTimeout(() => {
            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            flash.style.transition = 'opacity 0.2s';
            
            setTimeout(() => {
                document.getElementById('death-screen').style.display = 'none';
                const revival = document.getElementById('revival-screen');
                revival.style.pointerEvents = 'auto';
                revival.style.opacity = '1';
                flash.style.opacity = '0';
                flash.style.transition = 'opacity 3s ease-out';
                
                // バラバラのタイミングでメッセージがポップイン
                const cards = document.querySelectorAll('.card');
                cards.forEach((card) => {
                     const delay = Math.random() * 3.5; 
                     card.style.animationDelay = `${delay}s`;
                     card.classList.add('show');
                });

                // 脱出ボタン表示
                setTimeout(() => {
                    document.getElementById('backBtn').classList.add('show');
                }, 6000);

            }, 200);
        }, 4000); // Fatal Error表示から4秒でフラッシュ
    </script>
</body>
</html>
