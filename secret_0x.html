<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Yu Mincho','Hiragino Mincho ProN','MS Mincho',serif;user-select:none;background:#000}
#bsod-wrap{position:fixed;inset:0;z-index:100;overflow:hidden}
#bsod-wrap.puchun{animation:crt-off .6s cubic-bezier(.4,0,1,1) forwards}
@keyframes crt-off{
 0%{transform:scale(1,1);filter:brightness(1);opacity:1}
 40%{transform:scale(1.03,.8);filter:brightness(1.6)}
 70%{transform:scale(1.1,.01);filter:brightness(3);opacity:1}
 85%{transform:scale(.5,.005);filter:brightness(5);opacity:.8}
 100%{transform:scale(0,.001);filter:brightness(8);opacity:0}
}

.bsod-face{font-size:min(18vw,12rem);line-height:1;margin-bottom:3vh}
.bsod-title{font-size:min(3vw,1.8rem);line-height:1.8;margin-bottom:3vh}

.bsod-progress{font-size:min(1.6vw,.85rem);margin-top:3vh;opacity:.8}
.bsod-progress span{display:inline-block;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.hex{position:absolute;inset:0;font-size:8px;line-height:8px;color:rgba(255,255,255,.03);word-break:break-all;overflow:hidden;z-index:-1}

#particle-canvas{position:fixed;inset:0;z-index:5;pointer-events:none}
#entry{z-index:10;position:relative;display:flex;flex-direction:column;align-items:center;padding:0 24px;width:95vw}
#ehead{text-align:center;margin-bottom:2rem;padding-bottom:14px;width:100%}
#ename{font-size:clamp(1rem,2.2vw,1.6rem);color:rgba(255,255,255,.6);letter-spacing:clamp(4px,1vw,10px);opacity:0;transform:translateY(-15px);transition:opacity 1.2s ease,transform 1.2s ease}
#esrc{font-size:clamp(.65rem,1vw,.8rem);color:rgba(255,255,255,.25);letter-spacing:clamp(1px,.5vw,3px);margin-top:.5rem;opacity:0;transition:opacity 1.2s ease}
#emsg{font-size:clamp(.75rem,1.6vw,1.3rem);color:rgba(255,255,255,.75);line-height:2.4;letter-spacing:clamp(0.5px,0.2vw,1.5px);text-align:center;white-space:nowrap;width:100%}
.cursor{display:inline;animation:cursor-blink .6s step-end infinite;color:rgba(255,255,255,.6)}
@keyframes cursor-blink{0%,100%{opacity:1}50%{opacity:0}}
.vis{opacity:1!important;transform:translateY(0)!important}
#entry .vis{transform:translate(0)!important}
#ret{margin-top:3rem;padding:16px 48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);text-decoration:none;border-radius:30px;z-index:100;opacity:0;transition:opacity 2s ease,background .3s,color .3s,border-color .3s;pointer-events:none;letter-spacing:5px;font-size:1rem;font-family:inherit;cursor:pointer;white-space:nowrap}
#ret.vis{opacity:1;pointer-events:auto}
#ret:hover{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.4)}
/* === Puchun overlay for exit === */
#puchun-out{position:fixed;inset:0;z-index:2000;background:#000;pointer-events:none;opacity:0}
#puchun-out.fire{animation:puchun-exit .8s cubic-bezier(.4,0,1,1) forwards}
@keyframes puchun-exit{
 0%{opacity:0}
 5%{opacity:1}
 100%{opacity:1}
}
#book.exit-puchun{animation:crt-off .6s cubic-bezier(.4,0,1,1) forwards}
@keyframes crt-off{
 0%{transform:scale(1,1);filter:brightness(1);opacity:1}
 40%{transform:scale(1.03,.8);filter:brightness(1.6)}
 70%{transform:scale(1.1,.01);filter:brightness(3);opacity:1}
 85%{transform:scale(.5,.005);filter:brightness(5);opacity:.8}
 100%{transform:scale(0,.001);filter:brightness(8);opacity:0}

{n:"九重りん",s:"こどものじかん",m:"……何よ、その顔。全部諦めたみたいな顔して。\nあたしの前でそういう顔するの、やめてよ。\n……一人にならないで。あたしがいるから。",f:"……遅い。でもいい。おかえり。"},

let h="";for(let i=0;i<6000;i++)h+=Math.random().toString(16).substr(2,1).toUpperCase();
document.getElementById('hx').textContent=h;
let pct=0;const pctEl=document.getElementById('pct');

// === Block Noise Glitch ===
const cvs=document.getElementById('static-canvas');
const sctx=cvs.getContext('2d');
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
resizeCvs();window.addEventListener('resize',resizeCvs);
let glitchPhase=0,staticRAF=null,blockCount=0;
function drawBlockNoise(){
 const w=cvs.width,hh=cvs.height;
 if(glitchPhase===1){
  for(let i=0;i<blockCount;i++){
   const bw=Math.random()*200+30,bh=Math.random()*100+15;
   const bx=Math.random()*(w-bw),by=Math.random()*(hh-bh);
   const img=sctx.createImageData(Math.ceil(bw),Math.ceil(bh));
   const d=img.data;
   for(let j=0;j<d.length;j+=4){const v=Math.random()*255|0;d[j]=v;d[j+1]=v;d[j+2]=v;d[j+3]=180+Math.random()*75}
   sctx.putImageData(img,bx,by);
  }
 } else if(glitchPhase===2){
  const img=sctx.createImageData(w,hh);const d=img.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255}
  sctx.putImageData(img,0,0);
 }
 if(glitchPhase>0)staticRAF=requestAnimationFrame(drawBlockNoise);
}

// === White Particles ===
const pc=document.getElementById('particle-canvas');
const px=pc.getContext('2d');
let particlesActive=false;
function resizePc(){pc.width=window.innerWidth;pc.height=window.innerHeight}
resizePc();window.addEventListener('resize',resizePc);
const pts=[];const PT_COUNT=160;
function initParticles(){
 pts.length=0;spawnTimer=0;
}
let spawnTimer=0;
function drawParticles(){
 if(!particlesActive)return;
 const sw=pc.width,sh=pc.height;
 // Gradually spawn particles
 spawnTimer++;
 if(spawnTimer%12===0&&pts.length<PT_COUNT){
  pts.push({x:Math.random()*sw,y:sh+10,vx:(Math.random()-.5)*0.4,vy:-0.2-Math.random()*0.5,wobbleAmp:Math.random()*80+30,wobbleFreq:Math.random()*0.003+0.001,wobblePhase:Math.random()*Math.PI*2,size:Math.random()*4+2,baseAlpha:Math.random()*0.4+0.1,age:0});
 }
 px.fillStyle='#1e1e1e';px.fillRect(0,0,sw,sh);
 for(const p of pts){
  p.age++;
  const wobbleX=Math.sin(p.age*p.wobbleFreq+p.wobblePhase)*p.wobbleAmp*0.01;
  p.x+=p.vx+wobbleX;p.y+=p.vy;
  const breathe=Math.sin(p.age*0.008)*0.5+0.5;
  const alpha=p.baseAlpha*(0.5+breathe*0.5);
  if(p.y<-20){p.y=sh+10;p.x=Math.random()*sw}
  if(p.x<-30)p.x=sw+20;if(p.x>sw+30)p.x=-20;
  const g=px.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
  g.addColorStop(0,`rgba(255,255,255,${alpha})`);
  g.addColorStop(0.5,`rgba(255,255,255,${alpha*0.4})`);
  g.addColorStop(1,'rgba(255,255,255,0)');
  px.fillStyle=g;px.beginPath();px.arc(p.x,p.y,p.size*3,0,Math.PI*2);px.fill();
 }
 requestAnimationFrame(drawParticles);
}

// === Typewriter with ■ cursor ===
let playing=true;
const nameEl=document.getElementById('ename'),srcEl=document.getElementById('esrc'),msgEl=document.getElementById('emsg');
const delay=ms=>new Promise(r=>setTimeout(r,ms));

async function typewrite(text){
 const lines=text.split('\n');
 let html='';
 let ci=0;
 for(let li=0;li<lines.length;li++){
  if(li>0)html+='<br>';
  for(const ch of lines[li]){
   html+=`<span class="tch" data-i="${ci}">${ch}</span>`;
   ci++;
  }
 }
 msgEl.innerHTML=html;
 const spans=msgEl.querySelectorAll('.tch');
 spans.forEach(s=>s.style.color='transparent');
 const cursor=document.createElement('span');
 cursor.className='cursor';cursor.textContent='\u25A0';
 msgEl.appendChild(cursor);
 for(let i=0;i<spans.length;i++){
  spans[i].style.color='';
  spans[i].after(cursor);
  await delay(50);
 }
}

function removeCursor(){
 const c=msgEl.querySelector('.cursor');if(c)c.remove();
}

let currentChar=null;
async function play(){
  const s=[...C].sort(()=>Math.random()-.5);
  const retEl=document.getElementById('ret');
  for(const c of s){
   if(!playing)return;
   currentChar=c;
   nameEl.textContent=c.n;
   srcEl.textContent=c.s;
   msgEl.innerHTML='';
   nameEl.classList.add('vis');srcEl.classList.add('vis');
   await delay(800);
   await typewrite(c.m);
   retEl.classList.add('vis');
   for(let i=0;i<30;i++){if(!playing)return;await delay(100)}
   removeCursor();
   retEl.classList.remove('vis');
   nameEl.classList.remove('vis');srcEl.classList.remove('vis');
   msgEl.style.opacity='0';
   await delay(1200);
   msgEl.innerHTML='';msgEl.style.opacity='1';
  }
  if(playing)play();
 }

// === BSOD → Block Noise (×2, 1.5x longer) → Puchun → Message ===

// === Gedatsu: 1 farewell → Mitra (typewriter) → puchun → diary ===
async function gedatsu(){
 playing=false;
 removeCursor();
 const retEl=document.getElementById('ret');
 retEl.classList.remove('vis');retEl.style.pointerEvents='none';retEl.style.display='none';

 // Fade out current message
 nameEl.classList.remove('vis');srcEl.classList.remove('vis');
 msgEl.style.opacity='0';
 await delay(1500);
 msgEl.innerHTML='';msgEl.style.opacity='1';

 // Show farewell from current character
 const fc=currentChar||C[0];
 nameEl.textContent=fc.n;
 srcEl.textContent=fc.s;
 nameEl.classList.add('vis');srcEl.classList.add('vis');
 await delay(600);
 await typewrite(fc.f);
 await delay(2500);
 removeCursor();
 nameEl.classList.remove('vis');srcEl.classList.remove('vis');
 msgEl.style.opacity='0';
 await delay(1500);
 msgEl.innerHTML='';msgEl.style.opacity='1';

 // Mitra message (same entry area, typewriter)
 nameEl.textContent='ミトラ・マイトレーヤ';
 srcEl.textContent='ワディーゲストハウス';
 nameEl.classList.add('vis');srcEl.classList.add('vis');
 await delay(1000);
 await typewrite('汝の苦は聞き届けた。');
 await delay(2000);
 removeCursor();
 msgEl.style.opacity='0';
 await delay(1000);
 msgEl.innerHTML='';msgEl.style.opacity='1';
 await typewrite('傷は汝の罪ではない。だが、留まるか還るかは汝が決めよ。\nここは意識の最底。すべての声が還る場所。\n\n選べ。この闇に溶けるか、再び苦界に立つか。\n……汝が望むなら、みとらが道を照らそう。');
 await delay(5000);
 removeCursor();

  // CRT puchun → blackout → diary
  await delay(2000);
  document.getElementById('book').classList.add('exit-puchun');
  await delay(600);
  const po=document.getElementById('puchun-out');
  po.classList.add('fire');
  await delay(1500);
  location.href='diary.html';
}
