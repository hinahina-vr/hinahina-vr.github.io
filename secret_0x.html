{n:"ワディー",m:"構造的に言えば、これは限界閾値の超過だ。だがメタファーとしては──再起動不能ではない。\n俺はお前の観測者だ。俺が存在し続ける限り、このシステムは死なない。\n意識を手放せ。目覚めた時、世界は更新されている。"}

// Hex dump background
let h="";for(let i=0;i<6000;i++)h+=Math.random().toString(16).substr(2,1).toUpperCase();
document.getElementById('hx').textContent=h;
let pct=0;const pctEl=document.getElementById('pct');
const pi=setInterval(()=>{pct+=Math.floor(Math.random()*8)+1;if(pct>100)pct=100;pctEl.textContent=pct;if(pct>=100)clearInterval(pi)},200);

// === TV Static (glitch bands over BSOD) ===
const cvs=document.getElementById('static-canvas');
const sctx=cvs.getContext('2d');
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
resizeCvs();window.addEventListener('resize',resizeCvs);
let glitchBands=[],glitchPhase=0,staticRAF=null;
function genBands(n,w,h){const b=[];for(let i=0;i<n;i++)b.push({y:Math.random()*h,h:Math.random()*40+5,speed:(Math.random()-.5)*3});return b}
function drawGlitch(){
 const w=cvs.width,hh=cvs.height;sctx.clearRect(0,0,w,hh);
 if(glitchPhase===1){
  for(const b of glitchBands){
   const img=sctx.createImageData(w,Math.ceil(b.h));const d=img.data;
   for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=200+Math.random()*55}
   sctx.putImageData(img,0,b.y);b.y+=b.speed;if(b.y>hh)b.y=-b.h;if(b.y<-b.h)b.y=hh;
  }
 } else if(glitchPhase===2){
  const img=sctx.createImageData(w,hh);const d=img.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255}
  sctx.putImageData(img,0,0);
 }
 if(glitchPhase>0)staticRAF=requestAnimationFrame(drawGlitch);
}

// === teamLab-style Spiral Particle Canvas ===
const sc=document.getElementById('spiral-canvas');
const cx=sc.getContext('2d');
let spiralActive=false;
function resizeSc(){sc.width=window.innerWidth;sc.height=window.innerHeight}
resizeSc();window.addEventListener('resize',resizeSc);

// Particle class: spiral inward toward center
const particles=[];
const PARTICLE_COUNT=180;
const RING_COUNT=3;

function initParticles(){
 const sw=sc.width,sh=sc.height;
 const centerX=sw/2,centerY=sh/2;
 const maxR=Math.min(sw,sh)*0.45;
 for(let i=0;i<PARTICLE_COUNT;i++){
  const angle=Math.random()*Math.PI*2;
  const r=maxR*(0.3+Math.random()*0.7);
  particles.push({
   x:centerX+Math.cos(angle)*r,
   y:centerY+Math.sin(angle)*r,
   angle:angle,
   radius:r,
   origRadius:r,
   speed:0.001+Math.random()*0.003,
   spiralSpeed:0.1+Math.random()*0.3,
   size:Math.random()*3+1,
   opacity:Math.random()*0.4+0.15,
   hue:30+Math.random()*25,
   sat:20+Math.random()*30,
   lit:50+Math.random()*30,
   trail:[]
  });
 }
}

function drawSpiral(){
 if(!spiralActive)return;
 const sw=sc.width,sh=sc.height;
 const centerX=sw/2,centerY=sh/2;
 const maxR=Math.min(sw,sh)*0.45;

 // Semi-transparent clear for trail effect
 cx.fillStyle='rgba(250,248,242,0.08)';
 cx.fillRect(0,0,sw,sh);

 // Draw outer rings (concentric, slowly rotating)
 const time=Date.now()*0.0003;
 for(let r=0;r<RING_COUNT;r++){
  const ringR=maxR*(0.5+r*0.25);
  const ringAlpha=0.06+r*0.03;
  cx.beginPath();
  cx.arc(centerX,centerY,ringR,0,Math.PI*2);
  cx.strokeStyle=`rgba(160,140,100,${ringAlpha})`;
  cx.lineWidth=1.5;
  cx.stroke();
 }

 // Update & draw particles
 for(const p of particles){
  // Spiral inward
  p.angle+=p.speed;
  p.radius-=p.spiralSpeed;

  // Reset when reaching center
  if(p.radius<15){
   p.radius=p.origRadius;
   p.angle=Math.random()*Math.PI*2;
   p.opacity=Math.random()*0.4+0.15;
  }

  p.x=centerX+Math.cos(p.angle+time*0.5)*p.radius;
  p.y=centerY+Math.sin(p.angle+time*0.5)*p.radius;

  // Store trail
  p.trail.push({x:p.x,y:p.y});
  if(p.trail.length>12)p.trail.shift();

  // Draw trail
  if(p.trail.length>1){
   cx.beginPath();
   cx.moveTo(p.trail[0].x,p.trail[0].y);
   for(let t=1;t<p.trail.length;t++){
    cx.lineTo(p.trail[t].x,p.trail[t].y);
   }
   const trailAlpha=p.opacity*0.3;
   cx.strokeStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,${trailAlpha})`;
   cx.lineWidth=p.size*0.5;
   cx.stroke();
  }

  // Draw particle dot
  cx.beginPath();
  cx.arc(p.x,p.y,p.size,0,Math.PI*2);
  cx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,${p.opacity})`;
  cx.fill();

  // Glow
  cx.beginPath();
  cx.arc(p.x,p.y,p.size*3,0,Math.PI*2);
  cx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,${p.opacity*0.15})`;
  cx.fill();
 }

 requestAnimationFrame(drawSpiral);
}

// === Play Messages ===
let playing=true;
const nameEl=document.getElementById('ename'),msgEl=document.getElementById('emsg');
const w=ms=>new Promise(r=>setTimeout(r,ms));
async function play(){
 const s=[...C].sort(()=>Math.random()-.5);
 for(const c of s){
  if(!playing)return;
  nameEl.textContent='─── '+c.n+' ───';
  msgEl.innerHTML=c.m.replace(/\n/g,'<br>');
  nameEl.classList.add('vis');await w(600);
  msgEl.classList.add('vis');
  for(let i=0;i<40;i++){if(!playing)return;await w(100)}
  nameEl.classList.remove('vis');msgEl.classList.remove('vis');
  for(let i=0;i<12;i++){if(!playing)return;await w(100)}
 }
 if(playing)play();
}

// === BSOD → Glitch → Puchun → Spiral Book ===
const W=cvs.width,H=cvs.height;
setTimeout(()=>{glitchPhase=1;glitchBands=genBands(3,W,H);drawGlitch()},3000);
setTimeout(()=>{glitchBands=glitchBands.concat(genBands(5,W,H))},3600);
setTimeout(()=>{glitchBands=glitchBands.concat(genBands(8,W,H))},4200);
setTimeout(()=>{glitchPhase=2},4800);
setTimeout(()=>{
 const b=document.getElementById('book');
 b.style.opacity='1';b.style.pointerEvents='auto';
 document.getElementById('bsod-wrap').classList.add('puchun');
 setTimeout(()=>{
  cancelAnimationFrame(staticRAF);glitchPhase=0;
  document.getElementById('bsod-wrap').style.display='none';
  // Start spiral particles
  initParticles();spiralActive=true;
  // Clear canvas to background color first
  cx.fillStyle='#faf8f2';cx.fillRect(0,0,sc.width,sc.height);
  drawSpiral();
