  - ooku: dejiko
    ooku_label: でじこ（秋葉原の記憶）
    axis: 厳格と誇り
    roju: rosanjin
    roju_label: 北大路魯山人（審美眼）

  - ooku: hinata
    ooku_label: ひなた（最初の窓）
