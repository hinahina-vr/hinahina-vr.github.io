<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ビジュアルノベル | ワディーゲストハウス</title>
    <meta
      name="description"
      content="シナリオJSONを読み込む静的ビジュアルノベルランタイム。ユーザーアップロードのVRMと静的音声に対応。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=DotGothic16&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body {
        font-family: "Zen Maru Gothic", sans-serif;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        background:
          radial-gradient(circle at top, rgba(88, 65, 160, 0.32), transparent 30%),
          linear-gradient(180deg, #110818 0%, #050309 52%, #110818 100%);
        color: #ece7ff;
      }
      button, input { font: inherit; }
      [hidden] { display: none !important; }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #030205;
        color: rgba(255, 255, 255, 0.62);
        font-size: clamp(14px, 1.2vw, 22px);
        letter-spacing: 0.2em;
        transition: opacity 0.8s ease;
      }
      #loading.fade-out { opacity: 0; pointer-events: none; }

      #particle-canvas,
      #avatar-stage {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #particle-canvas { z-index: 0; }
      .pc98-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: none;
        background:
          linear-gradient(180deg, rgba(10, 10, 10, 0.95), rgba(0, 0, 0, 1)),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.02) 0,
            rgba(255, 255, 255, 0.02) 2px,
            transparent 2px,
            transparent 4px
          );
      }
      .pc98-frame {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: none;
        pointer-events: none;
        border: clamp(6px, 0.6vw, 12px) solid;
        border-image:
          linear-gradient(
            180deg,
            #a8a8a8 0%,
            #d0d0d0 15%,
            #888 30%,
            #b0b0b0 50%,
            #707070 70%,
            #909090 85%,
            #686868 100%
          )
          1;
      }

      #avatar-stage-shell {
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        opacity: 0.12;
        transition: opacity 0.25s ease;
      }
      #avatar-stage-shell.is-visible { opacity: 1; }
      #avatar-stage-shell.is-disabled { display: none; }
      #avatar-stage {
        z-index: 0;
        background:
          radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.14), transparent 28%),
          linear-gradient(180deg, transparent 0%, rgba(2, 1, 4, 0.22) 70%, rgba(2, 1, 4, 0.52) 100%);
      }
      #avatar-stage-placeholder {
        position: absolute;
        right: clamp(18px, 2vw, 36px);
        bottom: clamp(130px, 18vh, 220px);
        max-width: min(44vw, 420px);
        padding: 10px 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(8, 6, 16, 0.6);
        color: rgba(255, 255, 255, 0.55);
        font-size: clamp(11px, 0.85vw, 14px);
        letter-spacing: 0.1em;
        backdrop-filter: blur(8px);
      }
      #avatar-stage-shell.is-visible #avatar-stage-placeholder {
        opacity: 0;
      }
      body:not(.runtime-started) #avatar-stage-shell {
        opacity: 0;
      }
      body:not(.runtime-started) #chapter-display,
      body:not(.runtime-started) #expression-tag,
      body:not(.runtime-started) #mini-model-summary,
      body:not(.runtime-started) #settings-btn,
      body:not(.runtime-started) #voice-toggle {
        display: none;
      }

      #title-screen,
      #end-screen,
      #chapter-overlay,
      #choice-container,
      #settings-modal {
        position: fixed;
        inset: 0;
      }

      #title-screen {
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        transition: opacity 0.8s ease;
      }
      #title-screen.fade-out { opacity: 0; pointer-events: none; }
      .title-card {
        width: min(720px, 100%);
        padding: clamp(24px, 4vw, 48px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(18, 12, 32, 0.88), rgba(8, 6, 16, 0.92)),
          radial-gradient(circle at top, rgba(186, 145, 255, 0.14), transparent 32%);
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        text-align: center;
      }
      #title-screen h1 {
        font-size: clamp(1.8rem, 4vw, 3.4rem);
        letter-spacing: 0.25em;
        color: #dac7ff;
        text-shadow: 0 0 24px rgba(167, 118, 255, 0.28);
      }
      #title-screen .subtitle {
        margin-top: 10px;
        font-size: clamp(12px, 1vw, 18px);
        letter-spacing: 0.14em;
        opacity: 0.68;
      }
      .title-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px 14px;
        margin-top: 22px;
      }
      .title-chip {
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        font-size: clamp(11px, 0.9vw, 14px);
        letter-spacing: 0.08em;
      }
      .title-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: clamp(24px, 3vw, 36px);
      }
      #title-screen .start-btn,
      .utility-btn,
      .settings-btn,
      #settings-close {
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease, border-color 0.2s ease;
      }
      #title-screen .start-btn,
      .utility-btn,
      .settings-btn,
      #settings-close {
        padding: 12px 18px;
        border-radius: 14px;
        border: 1px solid rgba(196, 163, 255, 0.24);
        background: linear-gradient(180deg, rgba(26, 17, 46, 0.88), rgba(11, 8, 22, 0.9));
        color: #efe7ff;
        letter-spacing: 0.12em;
      }
      #title-screen .start-btn:hover,
      .utility-btn:hover,
      .settings-btn:hover,
      #settings-close:hover {
        opacity: 1;
        transform: translateY(-1px);
        border-color: rgba(220, 194, 255, 0.42);
      }
      #title-screen .start-btn {
        min-width: 220px;
        font-size: clamp(15px, 1.1vw, 20px);
      }
      #runtime-warning {
        margin-top: 16px;
        color: #ffd7a6;
        font-size: clamp(11px, 0.9vw, 14px);
        letter-spacing: 0.1em;
      }

      #hud {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        flex-direction: column;
        justify-content: flex-end;
        padding: clamp(12px, 2vw, 38px);
      }
      #name-plate {
        display: inline-block;
        margin-bottom: 0;
        padding: clamp(6px, 0.5vw, 12px) clamp(14px, 1.3vw, 24px);
        border-radius: 12px 12px 0 0;
        font-size: clamp(22px, 2vw, 38px);
        font-weight: 700;
        letter-spacing: 0.12em;
        background: linear-gradient(135deg, rgba(45, 24, 82, 0.74), rgba(24, 12, 40, 0.56));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: none;
        backdrop-filter: blur(12px);
      }
      #text-window {
        padding: clamp(18px, 1.8vw, 34px) clamp(20px, 2vw, 38px);
        min-height: clamp(130px, 16vh, 240px);
        max-height: 42vh;
        overflow-y: auto;
        border-radius: 0 16px 16px 16px;
        line-height: 2;
        font-size: clamp(24px, 2.35vw, 44px);
        letter-spacing: 0.04em;
        background:
          linear-gradient(180deg, rgba(12, 7, 30, 0.82), rgba(5, 3, 15, 0.88)),
          radial-gradient(circle at top, rgba(126, 88, 188, 0.08), transparent 32%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(18px);
      }
      #text-content {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #continue-indicator {
        padding: 10px 0 4px;
        text-align: center;
        color: rgba(255, 255, 255, 0.44);
        font-size: clamp(12px, 1vw, 16px);
        letter-spacing: 0.15em;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #continue-indicator.visible { opacity: 0.8; }
      .cursor { display: inline-block; animation: blink-cursor 0.8s steps(2) infinite; }
      @keyframes blink-cursor { 0% { opacity: 1; } 50% { opacity: 0; } }

      #choice-container {
        z-index: 35;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(12px, 1.5vw, 22px);
        padding: 20px;
        background: rgba(0, 0, 0, 0.62);
        backdrop-filter: blur(8px);
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #choice-container.visible { opacity: 1; }
      .choice-btn {
        min-width: min(560px, 86vw);
        padding: clamp(14px, 1.5vw, 22px) clamp(28px, 4vw, 64px);
        border-radius: 14px;
        border: 1px solid rgba(196, 163, 255, 0.3);
        background: linear-gradient(135deg, rgba(38, 22, 72, 0.84), rgba(17, 10, 34, 0.92));
        color: #eadfff;
        font-size: clamp(18px, 2vw, 34px);
        letter-spacing: 0.13em;
      }
      .choice-btn:hover {
        transform: scale(1.02);
        border-color: rgba(231, 214, 255, 0.46);
      }

      #chapter-display,
      #expression-tag,
      #mini-model-summary,
      #settings-btn,
      #voice-toggle,
      #mode-toggle,
      #back-btn {
        position: fixed;
        z-index: 20;
      }
      #chapter-display {
        top: clamp(14px, 1.8vw, 28px);
        right: clamp(18px, 2vw, 36px);
        max-width: min(42vw, 420px);
        text-align: right;
        color: rgba(255, 255, 255, 0.62);
        font-size: clamp(12px, 1vw, 18px);
        letter-spacing: 0.12em;
      }
      #expression-tag {
        top: clamp(42px, 4vw, 68px);
        right: clamp(18px, 2vw, 36px);
        max-width: min(38vw, 360px);
        text-align: right;
        color: rgba(255, 255, 255, 0.46);
        font-size: clamp(11px, 0.85vw, 15px);
        font-style: italic;
      }
      #mini-model-summary {
        right: clamp(18px, 2vw, 36px);
        bottom: clamp(28px, 3vh, 42px);
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(8, 6, 16, 0.64);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.68);
        font-size: clamp(11px, 0.85vw, 14px);
        letter-spacing: 0.1em;
        backdrop-filter: blur(8px);
      }
      #settings-btn,
      #voice-toggle {
        top: clamp(92px, 8vw, 124px);
      }
      #settings-btn { right: clamp(18px, 2vw, 36px); }
      #voice-toggle { right: clamp(146px, 12vw, 188px); }
      .utility-btn {
        padding: 10px 14px;
        font-size: clamp(11px, 0.9vw, 14px);
      }
      #mode-toggle {
        top: clamp(14px, 1.8vw, 28px);
        left: clamp(18px, 2vw, 36px);
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.78);
        font-size: clamp(22px, 1.8vw, 32px);
      }
      #back-btn {
        top: clamp(18px, 2vw, 32px);
        left: clamp(54px, 4.5vw, 84px);
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.58);
        text-decoration: none;
        font-size: clamp(12px, 1vw, 18px);
        letter-spacing: 0.1em;
      }
      #progress-bar {
        position: fixed;
        left: 0;
        bottom: 0;
        z-index: 30;
        width: 0;
        height: 3px;
        background: linear-gradient(90deg, #8f6ae4, #f0d4ff);
        transition: width 0.3s ease;
      }

      #chapter-overlay,
      #end-screen {
        z-index: 40;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.9);
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      #chapter-overlay.visible,
      #end-screen.visible { opacity: 1; }
      #chapter-overlay h2,
      #end-screen h2 {
        font-size: clamp(1.4rem, 3vw, 3rem);
        letter-spacing: 0.22em;
        color: #d9cbff;
      }
      #end-subtitle {
        margin-top: 12px;
        opacity: 0.6;
        letter-spacing: 0.1em;
      }
      .back-link {
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
      }

      #settings-modal {
        z-index: 60;
      }
      #settings-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
      }
      #settings-dialog {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(960px, calc(100vw - 28px));
        max-height: min(88vh, 920px);
        transform: translate(-50%, -46%);
        overflow: hidden;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background:
          linear-gradient(180deg, rgba(18, 12, 32, 0.96), rgba(8, 6, 16, 0.98)),
          radial-gradient(circle at top, rgba(186, 145, 255, 0.14), transparent 32%);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
        opacity: 0;
        transition: opacity 0.16s ease, transform 0.16s ease;
      }
      #settings-modal.visible #settings-dialog {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
      #settings-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 22px 24px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      #settings-header h2 {
        font-size: clamp(1rem, 1.5vw, 1.4rem);
        letter-spacing: 0.14em;
      }
      #settings-meta {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.68);
        font-size: clamp(11px, 0.9vw, 14px);
        letter-spacing: 0.08em;
      }
      #settings-warning-list {
        margin-top: 12px;
        padding-left: 18px;
        color: #ffd7a6;
        font-size: clamp(11px, 0.85vw, 13px);
      }
      #settings-list {
        max-height: calc(88vh - 150px);
        padding: 18px 24px 24px;
        overflow: auto;
      }
      .settings-row {
        padding: 16px 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }
      .settings-row + .settings-row,
      .settings-fallback-actions {
        margin-top: 12px;
      }
      .settings-row-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: baseline;
      }
      .settings-row-title {
        font-weight: 700;
        letter-spacing: 0.08em;
      }
      .settings-row-status {
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
      }
      .settings-row-status.has-model { color: #cfe7c6; }
      .settings-row-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }
      .settings-btn {
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 13px;
        letter-spacing: 0.06em;
      }
      .settings-btn.secondary {
        background: rgba(255, 255, 255, 0.04);
      }
      .settings-btn:disabled {
        opacity: 0.45;
        cursor: default;
        transform: none;
      }
      .settings-inline-field {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
        letter-spacing: 0.06em;
      }
      .settings-inline-field input {
        width: 78px;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(5, 5, 10, 0.6);
        color: inherit;
      }
      .settings-fallback-actions {
        display: flex;
        justify-content: flex-end;
      }

      .text-fade-out { animation: fadeOut 0.25s ease forwards; }
      .text-fade-in { animation: fadeIn 0.4s ease forwards; }
      @keyframes fadeOut {
        to { opacity: 0; transform: translateY(-4px); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      body.mode-classic {
        font-family: "DotGothic16", "MS Gothic", monospace;
        background: #000;
        color: #fff;
        image-rendering: pixelated;
      }
      body.mode-classic::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 3px,
            rgba(0, 0, 0, 0.14) 3px,
            rgba(0, 0, 0, 0.14) 4px
          );
      }
      .mode-classic #title-screen h1,
      .mode-classic #chapter-overlay h2,
      .mode-classic #end-screen h2,
      .mode-classic #name-plate,
      .mode-classic #text-window,
      .mode-classic #chapter-display,
      .mode-classic #expression-tag,
      .mode-classic #back-btn,
      .mode-classic .title-chip,
      .mode-classic .choice-btn,
      .mode-classic #settings-dialog,
      .mode-classic #settings-close,
      .mode-classic .settings-btn,
      .mode-classic .utility-btn {
        font-family: "DotGothic16", "MS Gothic", monospace;
      }
      .mode-classic #particle-canvas { display: none; }
      .mode-classic .pc98-bg { display: block; }
      .mode-classic #name-plate {
        background: transparent;
        border: none;
        border-radius: 0;
        padding: 6px 0;
        margin-bottom: 4px;
      }
      .mode-classic #text-window,
      .mode-classic .choice-btn,
      .mode-classic .title-card,
      .mode-classic #settings-dialog,
      .mode-classic .utility-btn,
      .mode-classic #title-screen .start-btn,
      .mode-classic .settings-btn,
      .mode-classic #settings-close {
        border-radius: 0;
        background: #000;
        border: 2px solid #9a9a9a;
        box-shadow: none;
      }
      .mode-classic #text-window {
        backdrop-filter: none;
      }
      .mode-classic #avatar-stage-shell { opacity: 0.8; }
      .mode-classic #avatar-stage-placeholder,
      .mode-classic #mini-model-summary {
        border-radius: 0;
        background: rgba(0, 0, 0, 0.86);
        border: 2px solid #7f7f7f;
      }
      .mode-classic #mode-toggle,
      .mode-classic #back-btn,
      .mode-classic #chapter-display,
      .mode-classic #expression-tag {
        color: #d0d0d0;
      }

      @media (max-width: 960px) {
        #settings-btn,
        #voice-toggle {
          top: auto;
          bottom: 86px;
        }
        #voice-toggle { right: 18px; }
        #settings-btn { right: 126px; }
        #mini-model-summary {
          left: 18px;
          right: auto;
          bottom: 86px;
        }
        #avatar-stage-placeholder {
          right: 18px;
          bottom: 170px;
        }
      }

      @media (orientation: portrait) {
        #hud { padding: 10px; }
        #text-window {
          min-height: 110px;
          max-height: 46vh;
          font-size: clamp(14px, 4vw, 22px);
        }
        #name-plate { font-size: clamp(14px, 4vw, 22px); }
        .choice-btn { min-width: 88vw; font-size: clamp(14px, 3.8vw, 20px); }
        #settings-dialog {
          width: calc(100vw - 16px);
        }
        #settings-list {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body class="mode-immersive">
    <div id="loading">Now Loading...</div>
    <canvas id="particle-canvas"></canvas>
    <div class="pc98-bg"></div>

    <div id="avatar-stage-shell" aria-hidden="true">
      <canvas id="avatar-stage"></canvas>
      <div id="avatar-stage-placeholder">モデル未設定</div>
    </div>

    <div id="title-screen">
      <section class="title-card">
        <h1>ビジュアルノベル</h1>
        <p class="subtitle">─ シナリオを読み込み中 ─</p>
        <p class="subtitle">群像哲学ノベル</p>

        <div class="title-meta">
          <p class="title-chip" id="title-model-summary">モデル設定済み 0 / 0</p>
        </div>

        <div class="title-actions">
          <button class="start-btn" id="start-btn" type="button">▶ はじめる</button>
          <button class="utility-btn" id="title-settings-btn" type="button">モデル設定</button>
          <button class="utility-btn" id="title-voice-toggle" type="button">🔊 音声ON</button>
        </div>

        <p id="runtime-warning" hidden></p>
      </section>
    </div>

    <div id="chapter-overlay"><h2 id="chapter-title"></h2></div>

    <div id="end-screen">
      <h2 id="end-title">— F I N —</h2>
      <p id="end-subtitle">COMPの画面は、閉じていない。</p>
