<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A.D.M.S. | ワディーゲストハウス</title>
    <meta name="description" content="Auto Diverge Mapping System ─ 分岐と再合流を可視化する夢の地図。" />
    <script>
      (function () {
        var KEY = "waddy-display-mode";
        var DEFAULT_MODE = "classic";
        var FORCE_IMMERSIVE = /\/dream-select(?:\.html)?\/?$/i.test(window.location.pathname);
        var params = new URLSearchParams(window.location.search);
        var queryMode = params.get("mode");
        var mode = FORCE_IMMERSIVE ? "immersive" : (queryMode === "immersive" || queryMode === "classic" ? queryMode : null);

        if (!mode && !FORCE_IMMERSIVE) {
          try {
            var storedMode = window.localStorage.getItem(KEY);
            mode = storedMode === "immersive" || storedMode === "classic" ? storedMode : DEFAULT_MODE;
          } catch (error) {
            mode = DEFAULT_MODE;
          }
        } else if (!FORCE_IMMERSIVE) {
          try {
            window.localStorage.setItem(KEY, mode);
          } catch (error) {
            // Ignore storage failures and continue with query mode.
          }
        }

        document.documentElement.dataset.siteMode = mode;
        window.__waddyInitialSiteMode = mode;
        window.__waddyDreamSelectForceImmersive = FORCE_IMMERSIVE;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-1: #020410;
        --bg-2: #0a0e24;
        --bg-3: #1a1530;
        --panel: rgba(9, 12, 26, 0.72);
        --panel-border: rgba(255, 255, 255, 0.10);
        --text: #edf1ff;
        --muted: rgba(238, 242, 255, 0.58);
        --kenkai: #efc05c;
        --kenkai-glow: rgba(240, 193, 93, 0.32);
        --kenkai-soft: rgba(240, 193, 93, 0.08);
        --genkai: #6ec4ff;
        --genkai-glow: rgba(110, 196, 255, 0.30);
        --genkai-soft: rgba(110, 196, 255, 0.08);
        --rejoin: #f0a4d6;
        --rejoin-glow: rgba(240, 164, 214, 0.30);
        --node-width: 220px;
        --node-height: 96px;
        --card-glass: rgba(12, 14, 32, 0.52);
        --card-glass-border: rgba(255, 255, 255, 0.10);
        --card-blur: blur(12px);
        --header-border: rgba(255, 255, 255, 0.07);
        --header-top-bg: rgba(14, 16, 36, 0.32);
        --header-bottom-bg: rgba(6, 8, 18, 0.42);
        --header-accent: rgba(126, 88, 188, 0.08);
        --header-shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
        --header-blur: blur(8px);
        --graph-shell-top-bg: rgba(8, 10, 22, 0.76);
        --graph-shell-bottom-bg: rgba(4, 5, 12, 0.92);
        --transition-smooth: cubic-bezier(0.22, 0.61, 0.36, 1);
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        position: relative;
        overflow: hidden;
        font-family: "Zen Maru Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(ellipse 80% 50% at 50% 0%, rgba(126, 88, 188, 0.22), transparent),
          radial-gradient(ellipse 60% 40% at 15% 20%, rgba(60, 112, 180, 0.12), transparent),
          radial-gradient(ellipse 40% 60% at 85% 70%, rgba(90, 50, 140, 0.10), transparent),
          linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 42%, var(--bg-1) 100%);
      }

      body.mode-classic {
        font-family: "DotGothic16", "MS Gothic", monospace;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 72px 72px, 100% 3px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.6), transparent 88%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 100% 100% at 50% 100%, rgba(6, 4, 18, 0.6), transparent 70%);
      }

      #particle-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      body.mode-classic #particle-canvas {
        display: none;
      }

      #mode-toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 9px 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        background: rgba(10, 12, 28, 0.68);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.82);
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.18em;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.22);
        transition: border-color 0.2s ease, background 0.2s ease;
      }

      #mode-toggle[disabled] {
        opacity: 0.84;
        cursor: default;
      }

      .date-nav-arrow {
        position: fixed;
        top: 50%;
        z-index: 3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 64px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        background: rgba(10, 12, 28, 0.52);
        color: rgba(255, 255, 255, 0.72);
        text-decoration: none;
        font-size: 20px;
        line-height: 1;
        transform: translateY(-50%);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.20);
        transition:
          color 200ms var(--transition-smooth),
          border-color 200ms ease,
          background 200ms ease,
          box-shadow 200ms ease,
          transform 200ms var(--transition-smooth);
      }

      .date-nav-arrow:hover,
      .date-nav-arrow:focus-visible {
        color: rgba(255, 255, 255, 0.96);
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(14, 16, 34, 0.72);
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.28);
      }

      .date-nav-arrow.prev:hover {
        transform: translateY(-50%) translateX(-2px);
      }

      .date-nav-arrow.next:hover {
        transform: translateY(-50%) translateX(2px);
      }

      .date-nav-arrow[hidden] {
        display: none;
      }

      .date-nav-arrow.prev {
        left: 12px;
      }

      .date-nav-arrow.next {
        right: 12px;
      }

      .page-shell {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        height: 100vh;
        height: 100dvh;
        padding: 20px 18px 22px;
      }

      .header {
        display: grid;
        grid-template-columns: max-content 1fr;
        justify-items: start;
        align-items: start;
        width: 100%;
        margin: 0;
        min-height: 88px;
        padding: 10px 16px 10px 14px;
        border: 1px solid var(--header-border);
        border-radius: 18px;
        background:
          linear-gradient(180deg, var(--header-top-bg), var(--header-bottom-bg)),
          radial-gradient(ellipse 80% 100% at 0% 0%, var(--header-accent), transparent);
        box-shadow: var(--header-shadow);
        backdrop-filter: var(--header-blur);
        -webkit-backdrop-filter: var(--header-blur);
      }

      .header-copy {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        justify-self: start;
        width: fit-content;
        max-width: min(520px, 100%);
      }

      .date-label {
        margin: 0 0 2px;
        color: rgba(255, 255, 255, 0.52);
        font-size: clamp(9px, 0.68vw, 11px);
        letter-spacing: 0.28em;
      }

      h1 {
        margin: 0 0 3px;
        font-size: clamp(0.96rem, 1.55vw, 1.35rem);
        letter-spacing: 0.32em;
        color: #d4c4ff;
        text-shadow:
          0 0 32px rgba(164, 120, 255, 0.28),
          0 0 8px rgba(164, 120, 255, 0.12),
          0 1px 2px rgba(0, 0, 0, 0.5);
      }

      .subtitle,
      .map-title {
        margin: 0;
        line-height: 1.2;
        white-space: nowrap;
      }

      .subtitle {
        font-size: clamp(9px, 0.62vw, 10px);
        color: rgba(255, 255, 255, 0.62);
      }

      .map-title {
        font-size: clamp(9px, 0.62vw, 10px);
        color: rgba(255, 255, 255, 0.82);
        letter-spacing: 0.08em;
      }

      .map-status {
        margin: 8px 0 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(9, 12, 26, 0.66);
        color: rgba(255, 255, 255, 0.86);
        font-size: clamp(9px, 0.66vw, 11px);
        letter-spacing: 0.08em;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .map-status::before {
        content: "NOW";
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 38px;
        min-height: 20px;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.96);
        font-size: 9px;
        letter-spacing: 0.16em;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 9px;
        letter-spacing: 0.10em;
      }

      .legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
      }

      .legend-swatch.kenkai {
        background: radial-gradient(circle at 30% 30%, rgba(255, 220, 120, 1), rgba(200, 150, 50, 0.9));
        box-shadow: 0 0 10px var(--kenkai-glow);
      }

      .legend-swatch.genkai {
        background: radial-gradient(circle at 30% 30%, rgba(150, 216, 255, 1), rgba(60, 130, 200, 0.9));
        box-shadow: 0 0 10px var(--genkai-glow);
      }

      .legend-swatch.rejoin {
        background: radial-gradient(circle at 30% 30%, rgba(248, 180, 224, 1), rgba(180, 80, 150, 0.9));
        box-shadow: 0 0 10px var(--rejoin-glow);
      }

      .legend-swatch.ending {
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(160, 162, 190, 0.9));
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.08);
      }

      .graph-shell {
        position: relative;
        width: 100%;
        margin: 0;
        flex: 1;
        min-height: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        overflow: auto;
      }

      .graph-shell[data-layout-mode="desktop-horizontal"] {
        overflow-x: auto;
        overflow-y: auto;
      }

      .graph-shell[data-layout-mode="mobile-vertical"] {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .graph-stage {
        position: relative;
        min-width: 100%;
        min-height: 100%;
      }

      .graph-zoom {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
      }

      #graph-edges,
      #graph-edge-labels,
      #graph-nodes {
        position: absolute;
        inset: 0;
      }

      #graph-edges {
        overflow: visible;
        z-index: 0;
      }

      #graph-edge-labels {
        z-index: 3;
        pointer-events: none;
      }

      #graph-nodes {
        z-index: 2;
      }

      .graph-edge {
        fill: none;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.04));
        opacity: 0.72;
        transition: opacity 0.3s ease;
      }

      .graph-edge[data-edge-style="kenkai"] {
        stroke: var(--kenkai);
        filter: drop-shadow(0 0 6px var(--kenkai-glow));
      }

      .graph-edge[data-edge-style="genkai"] {
        stroke: var(--genkai);
        filter: drop-shadow(0 0 6px var(--genkai-glow));
      }

      .graph-edge[data-edge-style="rejoin"] {
        stroke: var(--rejoin);
        stroke-dasharray: 8 6;
        filter: drop-shadow(0 0 8px var(--rejoin-glow));
      }

      .edge-label {
        position: absolute;
        transform: translate(-50%, -50%);
        padding: 4px 12px;
        border-radius: 999px;
        background: rgba(10, 12, 28, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        color: rgba(255, 255, 255, 0.62);
        font-size: 9px;
        line-height: 1.3;
        letter-spacing: 0.12em;
        white-space: nowrap;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      }

      .scenario-card {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--node-width);
        min-height: var(--node-height);
        padding: 8px 12px;
        border-radius: 14px;
        border: 1px solid var(--card-glass-border);
        background: var(--card-glass);
        backdrop-filter: var(--card-blur);
        -webkit-backdrop-filter: var(--card-blur);
        color: var(--text);
        text-decoration: none;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        overflow: hidden;
        transition:
          transform 0.38s var(--transition-smooth),
          border-color 0.38s ease,
          box-shadow 0.45s ease,
          background 0.38s ease,
          opacity 0.38s ease;
      }

      /* Jewel shine sweep — diagonal light band */
      .scenario-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -120%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          105deg,
          transparent 20%,
          rgba(255, 255, 255, 0.06) 35%,
          rgba(255, 255, 255, 0.18) 48%,
          rgba(255, 255, 255, 0.28) 50%,
          rgba(255, 255, 255, 0.18) 52%,
          rgba(255, 255, 255, 0.06) 65%,
          transparent 80%
        );
        pointer-events: none;
        z-index: 1;
        transition: left 0.65s var(--transition-smooth), opacity 0.45s ease;
        opacity: 0;
      }

      .scenario-card:hover::before {
        left: 160%;
        opacity: 1;
      }

      /* Jewel mouse-position glow overlay */
      .scenario-card .card-jewel-glow {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        pointer-events: none;
        z-index: 1;
        opacity: 0;
        transition: opacity 0.35s ease;
        background: radial-gradient(
          circle 120px at var(--glow-x, 50%) var(--glow-y, 50%),
          rgba(255, 255, 255, 0.14),
          rgba(255, 255, 255, 0.04) 40%,
          transparent 70%
        );
      }

      .scenario-card:hover .card-jewel-glow {
        opacity: 1;
      }

      /* Border flash on hover */
      .scenario-card:hover {
        transform: translateY(-3px) scale(1.02);
        border-color: rgba(255, 255, 255, 0.32);
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.26),
          0 0 28px rgba(255, 255, 255, 0.08),
          0 0 2px 1px rgba(255, 255, 255, 0.10),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .scenario-card[data-graph-visited="false"] {
        opacity: 0.62;
        filter: saturate(0.7) brightness(0.82);
      }

      .scenario-card[data-graph-visited="true"] {
        opacity: 1;
        filter: none;
        border-width: 1.5px;
      }

      .scenario-card[data-graph-realm="kenkai"] {
        border-color: rgba(240, 193, 93, 0.28);
        background:
          linear-gradient(180deg, rgba(240, 193, 93, 0.06), rgba(12, 14, 32, 0.52));
      }

      .scenario-card[data-graph-realm="kenkai"][data-graph-visited="true"] {
        border-color: rgba(255, 216, 110, 0.72);
        background:
          linear-gradient(180deg, rgba(255, 219, 118, 0.16), rgba(60, 40, 10, 0.18)),
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255, 234, 170, 0.10), transparent);
        box-shadow:
          0 0 28px rgba(240, 193, 93, 0.22),
          0 4px 24px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 240, 189, 0.18),
          inset 0 0 0 1px rgba(255, 240, 189, 0.08);
      }

      .scenario-card[data-graph-realm="kenkai"]:hover {
        border-color: rgba(255, 228, 140, 0.82);
        box-shadow:
          0 0 36px rgba(240, 193, 93, 0.38),
          0 0 12px rgba(255, 232, 176, 0.22),
          0 8px 36px rgba(0, 0, 0, 0.22),
          0 0 2px 1px rgba(255, 228, 140, 0.14),
          inset 0 1px 0 rgba(255, 240, 189, 0.22);
      }

      .scenario-card[data-graph-realm="genkai"] {
        border-color: rgba(110, 196, 255, 0.28);
        background:
          linear-gradient(180deg, rgba(110, 196, 255, 0.06), rgba(12, 14, 32, 0.52));
      }

      .scenario-card[data-graph-realm="genkai"][data-graph-visited="true"] {
        border-color: rgba(160, 220, 255, 0.72);
        background:
          linear-gradient(180deg, rgba(110, 196, 255, 0.16), rgba(8, 30, 56, 0.18)),
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200, 236, 255, 0.10), transparent);
        box-shadow:
          0 0 28px rgba(110, 196, 255, 0.22),
          0 4px 24px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(210, 240, 255, 0.16),
          inset 0 0 0 1px rgba(210, 240, 255, 0.06);
      }

      .scenario-card[data-graph-realm="genkai"]:hover {
        border-color: rgba(150, 218, 255, 0.82);
        box-shadow:
          0 0 36px rgba(110, 196, 255, 0.38),
          0 0 12px rgba(186, 231, 255, 0.22),
          0 8px 36px rgba(0, 0, 0, 0.22),
          0 0 2px 1px rgba(150, 218, 255, 0.14),
          inset 0 1px 0 rgba(210, 240, 255, 0.22);
      }

      .scenario-card[data-graph-kind="rejoin"],
      .scenario-card[data-graph-kind="root"] {
        border-width: 1.5px;
      }

      .scenario-card[data-graph-kind="rejoin"] {
        box-shadow:
          0 0 20px var(--rejoin-glow),
          0 4px 24px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(240, 164, 214, 0.10);
      }

      .scenario-card[data-graph-kind="root"] .card-root-pulse {
        position: absolute;
        inset: -6px;
        border-radius: 20px;
        border: 1px solid rgba(240, 164, 214, 0.18);
        pointer-events: none;
        animation: root-pulse 4s ease-in-out infinite;
      }

      @keyframes root-pulse {
        0%, 100% {
          opacity: 0.4;
          transform: scale(1);
        }
        50% {
          opacity: 0.12;
          transform: scale(1.03);
        }
      }

      .card-copy {
        min-width: 0;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .card-heading {
        display: block;
        width: 100%;
      }

      .card-title {
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.06em;
        line-height: 1.22;
        text-align: center;
        text-shadow:
          0 0 12px rgba(0, 0, 0, 0.6),
          0 1px 2px rgba(0, 0, 0, 0.6);
        overflow-wrap: anywhere;
        word-break: keep-all;
      }

      .scenario-card[data-graph-realm="kenkai"] .card-title {
        color: #f2d48a;
        opacity: 0.82;
      }

      .scenario-card[data-graph-realm="kenkai"][data-graph-visited="true"] .card-title {
        color: #fff3c4;
        opacity: 1;
        text-shadow:
          0 0 18px rgba(255, 221, 132, 0.22),
          0 0 4px rgba(255, 221, 132, 0.08),
          0 1px 2px rgba(0, 0, 0, 0.6);
      }

      .scenario-card[data-graph-realm="genkai"] .card-title {
        color: #92d2ff;
        opacity: 0.82;
      }

      .scenario-card[data-graph-realm="genkai"][data-graph-visited="true"] .card-title {
        color: #ddf2ff;
        opacity: 1;
        text-shadow:
          0 0 18px rgba(170, 225, 255, 0.20),
          0 0 4px rgba(170, 225, 255, 0.08),
          0 1px 2px rgba(0, 0, 0, 0.6);
      }

      .scenario-card[data-popup-open="true"] {
        border-color: rgba(255, 255, 255, 0.34);
        box-shadow:
          0 26px 56px rgba(0, 0, 0, 0.32),
          0 0 32px rgba(255, 255, 255, 0.12);
      }

      .scenario-card[data-graph-current="true"] {
        z-index: 5;
        opacity: 1;
        transform: translateY(-4px) scale(1.04);
        border-color: rgba(255, 255, 255, 0.9);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.2),
          0 0 42px rgba(255, 255, 255, 0.16),

    <script>
      (function () {
        var toggle = document.getElementById("mode-toggle");
        var forceImmersive = Boolean(window.__waddyDreamSelectForceImmersive);
        if (toggle && forceImmersive) {
          toggle.textContent = "◆ IMMERSIVE";
          toggle.disabled = true;

      (function () {
        var canvas = document.getElementById("particle-canvas");
        var ctx = canvas.getContext("2d");
        var bgColor = { h: 270, s: 40, l: 8 };
        var bgClearColor = "rgba(12,5,24,0.15)";
        var streams = [];
        var stars = [];
        var nebulae = [];
        var pillars = [];
        var animId = 0;

        function initCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        function initParticles() {
          var i = 0;
          var w = canvas.width;
          var h = canvas.height;
          streams = [];
          stars = [];
          nebulae = [];
          pillars = [];

          for (i = 0; i < 6; i += 1) {
            streams.push({
              y: Math.random() * h,
              baseX: Math.random() * w,
              amp: Math.random() * 120 + 60,
              freq: Math.random() * 0.008 + 0.003,
              speed: Math.random() * 1.5 + 1,
              phase: Math.random() * Math.PI * 2,
              width: Math.random() * 2.5 + 0.8,
              hue: Math.floor(Math.random() * 60 + bgColor.h - 30),
              len: Math.floor(Math.random() * 80 + 60),
              trail: [],
            });
          }

          for (i = 0; i < 80; i += 1) {
            stars.push({
              x: Math.random() * w,
              y: Math.random() * h,
              vx: (Math.random() - 0.3) * 2,
              vy: (Math.random() - 0.5) * 1,
              size: Math.random() * 2 + 0.4,
              brightness: Math.random(),
              phase: Math.random() * Math.PI * 2,
              speed: Math.random() * 2.5 + 0.8,
            });
          }

          for (i = 0; i < 5; i += 1) {
            nebulae.push({
              x: Math.random() * w,
              y: Math.random() * h,
              r: Math.random() * 180 + 80,
              dx: (Math.random() - 0.5) * 0.3,
              dy: (Math.random() - 0.5) * 0.2,
              phase: Math.random() * Math.PI * 2,
              hue: Math.floor(Math.random() * 80 + bgColor.h - 40),
              sat: Math.floor(Math.random() * 40 + 50),
            });
          }

          for (i = 0; i < 3; i += 1) {
            pillars.push({
              x: Math.random() * w,
              width: Math.random() * 50 + 15,
              phase: Math.random() * Math.PI * 2,
              speed: Math.random() * 0.02 + 0.01,
              hue: Math.floor(Math.random() * 40 + bgColor.h - 20),
              drift: (Math.random() - 0.5) * 1.5 + (Math.random() > 0.5 ? 0.4 : -0.4),
            });
          }
        }

        function draw() {
          var w = canvas.width;
          var h = canvas.height;
          var time = Date.now() * 0.001;
          var i = 0;

          ctx.fillStyle = bgClearColor;
          ctx.fillRect(0, 0, w, h);

          for (i = 0; i < nebulae.length; i += 1) {
            var nebula = nebulae[i];
            nebula.x += nebula.dx;
            nebula.y += nebula.dy;
            if (nebula.x < -200) nebula.x = w + 200;
            if (nebula.x > w + 200) nebula.x = -200;
            if (nebula.y < -200) nebula.y = h + 200;
            if (nebula.y > h + 200) nebula.y = -200;
            var pulse = Math.sin(time * 1.5 + nebula.phase) * 0.4 + 0.6;
            var nebulaGradient = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.r * pulse);
            nebulaGradient.addColorStop(0, "hsla(" + nebula.hue + "," + nebula.sat + "%,40%," + 0.12 * pulse + ")");
            nebulaGradient.addColorStop(0.4, "hsla(" + nebula.hue + "," + nebula.sat + "%,25%," + 0.06 * pulse + ")");
            nebulaGradient.addColorStop(1, "hsla(" + nebula.hue + "," + nebula.sat + "%,10%,0)");
            ctx.beginPath();
            ctx.arc(nebula.x, nebula.y, nebula.r * pulse, 0, Math.PI * 2);
            ctx.fillStyle = nebulaGradient;
            ctx.fill();
          }

          for (i = 0; i < pillars.length; i += 1) {
            var pillar = pillars[i];
            pillar.x += pillar.drift + Math.sin(time * 0.8 + pillar.phase) * 1.2;
            if (pillar.x < -100) pillar.x = w + 100;
            if (pillar.x > w + 100) pillar.x = -100;
            var intensity = Math.sin(time * pillar.speed * 50 + pillar.phase) * 0.5 + 0.5;
            var pillarGradient = ctx.createLinearGradient(pillar.x - pillar.width / 2, 0, pillar.x + pillar.width / 2, 0);
            pillarGradient.addColorStop(0, "hsla(" + pillar.hue + ",60%,50%,0)");
            pillarGradient.addColorStop(0.5, "hsla(" + pillar.hue + ",60%,50%," + 0.08 * intensity + ")");
            pillarGradient.addColorStop(1, "hsla(" + pillar.hue + ",60%,50%,0)");
            ctx.fillStyle = pillarGradient;
            ctx.fillRect(pillar.x - pillar.width, 0, pillar.width * 2, h);
          }

          for (i = 0; i < streams.length; i += 1) {
            var stream = streams[i];
            var cx = stream.baseX + Math.sin(time * 0.5 + stream.phase) * 100;
            stream.trail.push({
              x: cx + Math.sin(time * stream.freq * 100 + stream.phase) * stream.amp,
              y: stream.y,
            });
            stream.y -= stream.speed;
            if (stream.y < -20) {
              stream.y = h + 20;
              stream.trail.length = 0;
            }
            if (stream.trail.length > stream.len) {
              stream.trail.shift();
            }
            if (stream.trail.length > 2) {
              ctx.beginPath();
              ctx.moveTo(stream.trail[0].x, stream.trail[0].y);
              for (var j = 1; j < stream.trail.length; j += 1) {
                var point = stream.trail[j];
                var prev = stream.trail[j - 1];
                ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + point.x) / 2, (prev.y + point.y) / 2);
              }
              ctx.strokeStyle = "hsla(" + stream.hue + ",70%,60%,0.5)";
              ctx.lineWidth = stream.width;
              ctx.shadowColor = "hsla(" + stream.hue + ",80%,50%,0.6)";
              ctx.shadowBlur = 12;
              ctx.stroke();
              ctx.shadowBlur = 0;
            }
          }

          for (i = 0; i < stars.length; i += 1) {
            var star = stars[i];
            star.x += star.vx;
            star.y += star.vy;
            if (star.x < 0) star.x = w;
            if (star.x > w) star.x = 0;
            if (star.y < 0) star.y = h;
            if (star.y > h) star.y = 0;
            var flicker = Math.sin(time * star.speed * 3 + star.phase) * 0.3 + 0.7;
            var alpha = star.brightness * flicker;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size * flicker, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(180,170,220," + alpha * 0.7 + ")";
            ctx.fill();
            if (star.size > 1.5) {
              ctx.beginPath();
              ctx.arc(star.x, star.y, star.size * 3 * flicker, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(140,130,200," + alpha * 0.12 + ")";
              ctx.fill();
            }
          }

          animId = requestAnimationFrame(draw);
        }

        initCanvas();
        initParticles();
        draw();

        window.addEventListener("resize", function () {
          initCanvas();
          initParticles();
        });

        window.addEventListener("beforeunload", function () {
          cancelAnimationFrame(animId);
        });
      })();

        function updateDateNavigation(date) {
          var index = AVAILABLE_ADMS_DATES.indexOf(date);
          var previousDate = index > 0 ? AVAILABLE_ADMS_DATES[index - 1] : null;
          var nextDate = index >= 0 && index < AVAILABLE_ADMS_DATES.length - 1 ? AVAILABLE_ADMS_DATES[index + 1] : null;
          setDateNavLink(prevDateNav, previousDate, "A.D.M.S.");
          setDateNavLink(nextDateNav, nextDate, "A.D.M.S.");
        }

        function resolveLayoutMode() {
          var hasTouch = typeof navigator.maxTouchPoints === "number" && navigator.maxTouchPoints > 0;
          var coarsePointer = pointerQuery.matches || anyPointerQuery.matches;
          var portrait = orientationQuery.matches;
          return hasTouch && coarsePointer && portrait ? "mobile-vertical" : "desktop-horizontal";
        }

        function applyLayoutMode(mode) {
          document.body.dataset.graphLayout = mode;
          graphShell.dataset.layoutMode = mode;
          graphStage.dataset.layoutMode = mode;
        }

        function addMediaListener(query, listener) {
          if (typeof query.addEventListener === "function") {
            query.addEventListener("change", listener);
            return function () {
              query.removeEventListener("change", listener);
            };
          }
          if (typeof query.addListener === "function") {
            query.addListener(listener);
            return function () {
              query.removeListener(listener);
            };
          }
          return function () {};
        }

        function canHoverDetails() {
          return hoverQuery.matches;
        }

        function buildScenarioVisitKey(scenarioName, entryLabel) {
          if (!scenarioName) {
            return "";
          }
          return scenarioName + "::" + (entryLabel || DREAM_ROOT_ENTRY_KEY);
        }

        function loadVisitedScenarioKeys() {
          try {
            var raw = window.localStorage.getItem(DREAM_VISITED_STORAGE_KEY);
            if (!raw) {
              return new Set();
            }
            var parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
              return new Set();
            }
            return new Set(Object.keys(parsed));
          } catch (error) {
            return new Set();
          }
        }

        function refreshVisitedScenarioKeys() {
          visitedScenarioKeys = loadVisitedScenarioKeys();
        }

        function isNodeVisited(node) {
          return visitedScenarioKeys.has(buildScenarioVisitKey(node.scenario, node.entry || null));
        }

        function clearPopupCloseTimer() {
          if (popupCloseTimer) {
            window.clearTimeout(popupCloseTimer);
            popupCloseTimer = 0;
          }
        }

        function buildPopupModel(node) {
          return {
            title: node.title || "",
            kicker: [node.icon || "•", REALM_LABELS[node.realm] || node.realm || "", KIND_LABELS[node.kind] || node.kind || ""]
              .filter(Boolean)
              .join(" "),
            summary: node.summary || "この世界線の記録です。",
            meta: node.scenario + (node.entry ? " / " + node.entry : ""),
            href: buildScenarioUrl(node.scenario, node.entry),
          };
        }

        function fillPopup(model) {
          popupKicker.textContent = model.kicker;
          popupTitle.textContent = model.title;
          popupSummary.textContent = model.summary;
          popupMeta.textContent = model.meta;
          popupLink.href = model.href;
        }

        function placeHoverPopup(card) {
          var cardRect = card.getBoundingClientRect();
          var popupRect = popup.getBoundingClientRect();
          var margin = 12;
          var left = cardRect.right + 14;
          var top = cardRect.top + Math.max(-6, (cardRect.height - popupRect.height) / 2);

          if (left + popupRect.width > window.innerWidth - margin) {
            left = cardRect.left - popupRect.width - 14;
          }

          if (left < margin) {
            left = Math.max(margin, window.innerWidth - popupRect.width - margin);
            top = Math.min(window.innerHeight - popupRect.height - margin, cardRect.bottom + 10);
          }

          top = Math.max(margin, Math.min(top, window.innerHeight - popupRect.height - margin));
          popup.style.left = left + "px";
          popup.style.top = top + "px";
          popup.style.right = "auto";
          popup.style.bottom = "auto";
        }

        function placePopup() {
          if (!activePopupCard || !activePopupModel) {
            return;
          }
          if (canHoverDetails()) {
            placeHoverPopup(activePopupCard);
          } else {
            popup.style.left = "";
            popup.style.top = "";
            popup.style.right = "";
            popup.style.bottom = "";
          }
        }

        function closePopup(options) {
          var opts = options || {};
          clearPopupCloseTimer();
          if (activePopupCard) {
            activePopupCard.removeAttribute("data-popup-open");
          }
          if (popupLayer.hidden) {
            activePopupCard = null;
            activePopupModel = null;
            return;
          }

          popupLayer.hidden = true;
          popup.hidden = true;
          popupLayer.dataset.open = "false";
          popupLayer.dataset.mode = "";
          popupLayer.setAttribute("aria-hidden", "true");
          popup.removeAttribute("role");
          popup.removeAttribute("aria-modal");
          popup.style.left = "";
          popup.style.top = "";
          popup.style.right = "";
          popup.style.bottom = "";

          var cardToFocus = activePopupCard;
          activePopupCard = null;
          activePopupModel = null;

          if (opts.restoreFocus && cardToFocus) {
            cardToFocus.focus({ preventScroll: true });
          }
        }

        function schedulePopupClose() {
          if (!canHoverDetails()) {
            return;
          }
          clearPopupCloseTimer();
          popupCloseTimer = window.setTimeout(function () {
            closePopup();
          }, 120);
        }

        function openPopup(card, model, options) {
          var opts = options || {};
          clearPopupCloseTimer();
          if (activePopupCard && activePopupCard !== card) {
            activePopupCard.removeAttribute("data-popup-open");
          }

          activePopupCard = card;
          activePopupModel = model;
          card.dataset.popupOpen = "true";
          fillPopup(model);

          popupLayer.hidden = false;
          popup.hidden = false;
          popupLayer.dataset.open = "true";
          popupLayer.dataset.mode = canHoverDetails() ? "hover" : "touch";
          popupLayer.setAttribute("aria-hidden", "false");

          if (canHoverDetails()) {
            popup.setAttribute("role", "tooltip");
            popup.removeAttribute("aria-modal");
          } else {
            popup.setAttribute("role", "dialog");
            popup.setAttribute("aria-modal", "true");
          }

          placePopup();

          if (opts.focusCta && !canHoverDetails()) {
            window.requestAnimationFrame(function () {
              popupLink.focus({ preventScroll: true });
            });
          }
        }

        function buildScenarioUrl(scenarioName, entryLabel) {
          var url = new URL("./galge-scenario.html", window.location.href);
          url.searchParams.set("scenario", scenarioName);
          if (entryLabel) {
            url.searchParams.set("entry", entryLabel);
          }
          url.searchParams.set("mode", "immersive");
          return url.pathname + url.search;
        }

        async function fetchGraph(date) {
          var response = await fetch("./scenarios/adms/" + date + ".json");
          if (!response.ok) {
            throw new Error("graph not found");
          }
          return response.json();
        }

        function showEmpty(message) {
          closePopup();
          graphStage.hidden = true;
          graphEmpty.hidden = false;
          graphEmpty.textContent = message;
          updateDateNavigation(resolveDate());
          mapTitle.textContent = "観測されていません";
          if (mapStatus) {
            mapStatus.hidden = true;
            mapStatus.textContent = "";
            mapStatus.removeAttribute("title");
          }
        }

        function getDesktopNodeRect(node) {
          return {
            x: DESKTOP_GRID.padX + node.layer * DESKTOP_GRID.layerGap,
            y: DESKTOP_GRID.padY + node.lane * DESKTOP_GRID.laneGap,
            width: DESKTOP_GRID.nodeWidth,
            height: DESKTOP_GRID.nodeHeight,
          };
        }

        function createNodeElement(node, rect, isCurrent) {
          var popupModel = buildPopupModel(node);
          var visited = isNodeVisited(node);
          var card = document.createElement("a");
          card.className = "scenario-card";
          card.href = buildScenarioUrl(node.scenario, node.entry);
          card.style.left = rect.x + "px";
          card.style.top = rect.y + "px";
          card.style.width = rect.width + "px";
          card.style.minHeight = rect.height + "px";
          card.dataset.graphNodeId = node.id;
          card.dataset.graphRealm = node.realm;
          card.dataset.graphKind = node.kind;
          card.dataset.graphLayer = String(node.layer);
          card.dataset.graphLane = String(node.lane);
          card.dataset.graphVisited = visited ? "true" : "false";
          card.dataset.graphCurrent = isCurrent ? "true" : "false";
          if (isCurrent) {
            card.setAttribute("aria-current", "page");
          }
          card.setAttribute(
            "aria-label",
            [node.title, REALM_LABELS[node.realm] || node.realm, KIND_LABELS[node.kind] || node.kind]
              .filter(Boolean)
              .join(" / ")
          );

          // Jewel glow overlay (mouse-position tracking)
          var jewelGlow = document.createElement("div");
          jewelGlow.className = "card-jewel-glow";
          card.appendChild(jewelGlow);

          // Root pulse ring (replaces ::after which is now used for shine)
          if (node.kind === "root") {
            var rootPulse = document.createElement("div");
            rootPulse.className = "card-root-pulse";
            card.appendChild(rootPulse);
          }

          var copy = document.createElement("div");
          copy.className = "card-copy";

          var heading = document.createElement("div");
          heading.className = "card-heading";

          var title = document.createElement("div");
          title.className = "card-title";
          title.textContent = node.title;

          heading.appendChild(title);
          copy.appendChild(heading);
          card.appendChild(copy);

          // Mouse-position jewel glow tracking
          card.addEventListener("mousemove", function (event) {
            var rect = card.getBoundingClientRect();
            var x = ((event.clientX - rect.left) / rect.width * 100);
            var y = ((event.clientY - rect.top) / rect.height * 100);
            card.style.setProperty("--glow-x", x + "%");
            card.style.setProperty("--glow-y", y + "%");
          });

          card.addEventListener("mouseenter", function () {
            if (canHoverDetails()) {
              openPopup(card, popupModel);
            }
          });
          card.addEventListener("mouseleave", function () {
            schedulePopupClose();
            // Reset glow to center for smooth fade-out
            card.style.setProperty("--glow-x", "50%");
            card.style.setProperty("--glow-y", "50%");
          });
          card.addEventListener("focus", function () {
            openPopup(card, popupModel);
          });
          card.addEventListener("blur", function () {
            schedulePopupClose();
          });
          card.addEventListener("click", function (event) {
            if (!canHoverDetails()) {
              event.preventDefault();
              openPopup(card, popupModel, { focusCta: true });
            }
          });

          return card;
        }

        function findFocusNode(nodes, focus) {
          if (!focus) {
            return null;
          }
          for (var i = 0; i < nodes.length; i += 1) {
            var node = nodes[i];
            if (node.scenario !== focus.scenario) {
              continue;
            }
            if ((node.entry || null) === focus.entry) {
              return node;
            }
          }
          return null;
        }

        function updateMapStatus(node, graph) {
          if (!mapStatus) {
            return;
          }
          if (!node) {
            mapStatus.hidden = true;
            mapStatus.textContent = "";
            mapStatus.removeAttribute("title");
            return;
          }
          mapStatus.hidden = false;
          mapStatus.textContent = "現在地: " + node.title;
          mapStatus.title = [graph && graph.title ? graph.title : "", node.summary || "", node.scenario, node.entry]
            .filter(Boolean)
            .join(" / ");
        }

        function buildEdgePathDesktop(fromRect, toRect) {
          var startX = fromRect.x + fromRect.width;
          var startY = fromRect.y + fromRect.height / 2;
          var endX = toRect.x;
          var endY = toRect.y + toRect.height / 2;
          var deltaX = Math.max(80, (endX - startX) * 0.34);
          var control1X = startX + deltaX;
          var control2X = endX - deltaX;
          var labelOffsetY = 26;
          return {
            d: "M " + startX + " " + startY + " C " + control1X + " " + startY + ", " + control2X + " " + endY + ", " + endX + " " + endY,
            labelX: (startX + endX) / 2,
            labelY: (startY + endY) / 2 - labelOffsetY,
          };
        }

        function buildEdgePathMobile(fromRect, toRect) {
          var startX = fromRect.x + fromRect.width / 2;
          var startY = fromRect.y + fromRect.height;
          var endX = toRect.x + toRect.width / 2;
          var endY = toRect.y;
          var direction = endY >= startY ? 1 : -1;
          var deltaY = Math.max(52, Math.abs(endY - startY) * 0.38);
          var control1Y = startY + deltaY * direction;
          var control2Y = endY - deltaY * direction;
          return {
            d: "M " + startX + " " + startY + " C " + startX + " " + control1Y + ", " + endX + " " + control2Y + ", " + endX + " " + endY,
            labelX: (startX + endX) / 2,
            labelY: (startY + endY) / 2,
          };
        }

        function appendEdgeMask(layout, sortedNodes) {
          var defs = document.createElementNS(SVG_NS, "defs");
          var mask = document.createElementNS(SVG_NS, "mask");
          var base = document.createElementNS(SVG_NS, "rect");
          var padding = 3;

          mask.setAttribute("id", EDGE_MASK_ID);
          mask.setAttribute("maskUnits", "userSpaceOnUse");
          mask.setAttribute("maskContentUnits", "userSpaceOnUse");
          mask.setAttribute("x", "0");
          mask.setAttribute("y", "0");
          mask.setAttribute("width", String(layout.baseStageWidth));
          mask.setAttribute("height", String(layout.baseStageHeight));

          base.setAttribute("x", "0");
          base.setAttribute("y", "0");
          base.setAttribute("width", String(layout.baseStageWidth));
          base.setAttribute("height", String(layout.baseStageHeight));
          base.setAttribute("fill", "white");
          mask.appendChild(base);

          sortedNodes.forEach(function (node) {
            var rect = layout.rectMap.get(node.id);
            if (!rect) {
              return;
            }
            var blocker = document.createElementNS(SVG_NS, "rect");
            blocker.setAttribute("x", String(rect.x - padding));
            blocker.setAttribute("y", String(rect.y - padding));
            blocker.setAttribute("width", String(rect.width + padding * 2));
            blocker.setAttribute("height", String(rect.height + padding * 2));
            blocker.setAttribute("rx", "18");
            blocker.setAttribute("ry", "18");
            blocker.setAttribute("fill", "black");
            blocker.dataset.maskNodeId = node.id;
            mask.appendChild(blocker);
          });

          defs.appendChild(mask);
          graphEdges.appendChild(defs);
        }

        function computeDesktopLayout(sortedNodes) {
          var rectMap = new Map();
          var maxLayer = sortedNodes.reduce(function (value, node) {
            return Math.max(value, node.layer);
          }, 0);
          var maxLane = sortedNodes.reduce(function (value, node) {
            return Math.max(value, node.lane);
          }, 0);
          var stageWidth = Math.max(graphShell.clientWidth || 0, DESKTOP_GRID.padX * 2 + maxLayer * DESKTOP_GRID.layerGap + DESKTOP_GRID.nodeWidth);
          var stageHeight = Math.max(graphShell.clientHeight || 0, DESKTOP_GRID.padY * 2 + maxLane * DESKTOP_GRID.laneGap + DESKTOP_GRID.nodeHeight);

          sortedNodes.forEach(function (node) {
            rectMap.set(node.id, getDesktopNodeRect(node));
          });

          return {
            mode: "desktop-horizontal",
            stageWidth: stageWidth,
            stageHeight: stageHeight,
            rectMap: rectMap,
            showEdgeLabels: true,
            buildEdgePath: buildEdgePathDesktop,
          };
        }

        function computeMobileLayout(sortedNodes) {
          var rectMap = new Map();
          var shellWidth = graphShell.clientWidth || window.innerWidth || 390;
          var usableWidth = Math.max(280, Math.floor(shellWidth - 8));
          var twoColumnWidth = Math.floor((usableWidth - MOBILE_GRID.padX * 2 - MOBILE_GRID.sideGapX) / 2);
          var nodeWidth = Math.max(MOBILE_GRID.minNodeWidth, Math.min(MOBILE_GRID.maxNodeWidth, twoColumnWidth));
          var leftX = MOBILE_GRID.padX;
          var rightX = usableWidth - MOBILE_GRID.padX - nodeWidth;
          var centerX = Math.max(MOBILE_GRID.padX, Math.round((usableWidth - nodeWidth) / 2));
          var layers = new Map();
          var orderedLayers = [];
          var cursorY = MOBILE_GRID.padY;
          var lastBottom = MOBILE_GRID.padY;

          sortedNodes.forEach(function (node) {
            if (!layers.has(node.layer)) {
              layers.set(node.layer, []);
              orderedLayers.push(node.layer);
            }
            layers.get(node.layer).push(node);
          });

          orderedLayers.sort(function (a, b) {
            return a - b;
          });

          orderedLayers.forEach(function (layer) {
            var layerNodes = layers.get(layer).slice().sort(function (a, b) {
              if (a.lane !== b.lane) return a.lane - b.lane;
              return a.id.localeCompare(b.id);
            });
            var mainNodes = [];
            var sideNodes = [];
            var bandTop = cursorY;
            var localCursorY = bandTop + MOBILE_GRID.bandPaddingTop;

            layerNodes.forEach(function (node) {
              if (node.kind === "side") {
                sideNodes.push(node);
              } else {
                mainNodes.push(node);
              }
            });

            mainNodes.forEach(function (node) {
              rectMap.set(node.id, {
                x: centerX,
                y: localCursorY,
                width: nodeWidth,
                height: MOBILE_GRID.nodeHeight,
              });
              localCursorY += MOBILE_GRID.nodeHeight + MOBILE_GRID.mainGap;
            });

            if (mainNodes.length > 0) {
              localCursorY -= MOBILE_GRID.mainGap;
            }

            lastBottom = localCursorY;

            if (sideNodes.length > 0) {
              var sideStartY = Math.max(localCursorY + MOBILE_GRID.sideGapY, bandTop + MOBILE_GRID.bandPaddingTop);
              sideNodes.forEach(function (node, index) {
                var column = index % 2;
                var row = Math.floor(index / 2);
                rectMap.set(node.id, {
                  x: column === 0 ? leftX : rightX,
                  y: sideStartY + row * (MOBILE_GRID.nodeHeight + MOBILE_GRID.sideGapY),
                  width: nodeWidth,
                  height: MOBILE_GRID.nodeHeight,
                });
              });
              lastBottom = sideStartY + Math.ceil(sideNodes.length / 2) * MOBILE_GRID.nodeHeight + Math.max(0, Math.ceil(sideNodes.length / 2) - 1) * MOBILE_GRID.sideGapY;
            }

            cursorY = lastBottom + MOBILE_GRID.bandPaddingBottom + MOBILE_GRID.bandGap;
          });

          return {
            mode: "mobile-vertical",
            stageWidth: usableWidth,
            stageHeight: Math.max(graphShell.clientHeight || 0, lastBottom + MOBILE_GRID.padY),
            rectMap: rectMap,
            showEdgeLabels: false,
            buildEdgePath: buildEdgePathMobile,
          };
        }

        function computeLayout(sortedNodes) {
          var mode = resolveLayoutMode();
          applyLayoutMode(mode);
          return finalizeLayout(mode === "mobile-vertical" ? computeMobileLayout(sortedNodes) : computeDesktopLayout(sortedNodes));
        }

        function finalizeLayout(layout) {
          var baseStageWidth = layout.stageWidth;
          var baseStageHeight = layout.stageHeight;
          var stageWidth = baseStageWidth;
          var stageHeight = baseStageHeight;
          var scale = 1;
          var offsetX = 0;
          var offsetY = 0;

          if (layout.mode === "desktop-horizontal" && canHoverDetails()) {
            var shellWidth = graphShell.clientWidth || baseStageWidth;
            var shellHeight = graphShell.clientHeight || baseStageHeight;
            if (baseStageWidth > shellWidth || baseStageHeight > shellHeight) {
              scale = Math.min(1, shellWidth / baseStageWidth, shellHeight / baseStageHeight);
            }

            if (scale < 1) {
              var scaledWidth = Math.max(1, Math.round(baseStageWidth * scale));
              var scaledHeight = Math.max(1, Math.round(baseStageHeight * scale));
              stageWidth = Math.max(shellWidth, scaledWidth);
              stageHeight = Math.max(shellHeight, scaledHeight);
              offsetX = Math.max(0, Math.round((stageWidth - scaledWidth) / 2));
              offsetY = Math.max(0, Math.round((stageHeight - scaledHeight) / 2));
            }
          }

          layout.baseStageWidth = baseStageWidth;
          layout.baseStageHeight = baseStageHeight;
          layout.stageWidth = stageWidth;
          layout.stageHeight = stageHeight;
          layout.scale = scale;
          layout.offsetX = offsetX;
          layout.offsetY = offsetY;
          return layout;
        }

        function scheduleRender() {
          if (!currentGraph || renderScheduled) {
            return;
          }
          closePopup();
          renderScheduled = true;
          window.requestAnimationFrame(function () {
            renderScheduled = false;
            if (currentGraph) {
              renderGraph(currentGraph);
            }
          });
        }

        function renderGraph(graph) {
          refreshVisitedScenarioKeys();
          var nodes = Array.isArray(graph.nodes) ? graph.nodes.slice() : [];
          var edges = Array.isArray(graph.edges) ? graph.edges.slice() : [];
          var focus = resolveFocusLocation();
          var focusNode = findFocusNode(nodes, focus);
          var sortedNodes = nodes.slice().sort(function (a, b) {
            if (a.layer !== b.layer) return a.layer - b.layer;
            return a.lane - b.lane;
          });

          dateLabel.textContent = graph.date || resolveDate() || "";
          updateDateNavigation(graph.date || resolveDate() || "");
          mapTitle.textContent = graph.title || "観測された地図";
          updateMapStatus(focusNode, graph);
          document.title = (graph.title || "A.D.M.S.") + " | ワディーゲストハウス";

          if (sortedNodes.length === 0) {
            showEmpty("この日の世界線は観測されていません。");
            return;
          }

          if (sortedNodes.length === 1) {
            window.location.replace(buildScenarioUrl(sortedNodes[0].scenario, sortedNodes[0].entry));
            return;
          }

          closePopup();
          currentGraph = graph;
          var nodeMap = new Map();
          for (var i = 0; i < sortedNodes.length; i += 1) {
            nodeMap.set(sortedNodes[i].id, sortedNodes[i]);
          }

          var layout = computeLayout(sortedNodes);

          graphStage.hidden = false;
          graphEmpty.hidden = true;
          graphStage.dataset.graphScale = String(layout.scale);
          graphStage.style.width = layout.stageWidth + "px";
          graphStage.style.height = layout.stageHeight + "px";
          graphZoom.style.width = layout.baseStageWidth + "px";
          graphZoom.style.height = layout.baseStageHeight + "px";
          graphZoom.style.left = layout.offsetX + "px";
          graphZoom.style.top = layout.offsetY + "px";
          graphZoom.style.transform = layout.scale === 1 ? "" : "scale(" + layout.scale + ")";
          graphEdges.setAttribute("viewBox", "0 0 " + layout.baseStageWidth + " " + layout.baseStageHeight);
          graphEdges.setAttribute("width", String(layout.baseStageWidth));
          graphEdges.setAttribute("height", String(layout.baseStageHeight));
          graphEdges.style.overflow = layout.mode === "mobile-vertical" ? "hidden" : "visible";
          graphEdges.innerHTML = "";
          graphEdgeLabels.innerHTML = "";
          graphNodes.innerHTML = "";
          appendEdgeMask(layout, sortedNodes);

          var focusCard = null;
          for (var j = 0; j < sortedNodes.length; j += 1) {
            var node = sortedNodes[j];
            var rect = layout.rectMap.get(node.id);
            var isCurrent = Boolean(focusNode && focusNode.id === node.id);
            var card = createNodeElement(node, rect, isCurrent);
            graphNodes.appendChild(card);
            if (isCurrent) {
              focusCard = card;
            }
          }

          for (var k = 0; k < edges.length; k += 1) {
            var edge = edges[k];
            var fromNode = nodeMap.get(edge.from);
            var toNode = nodeMap.get(edge.to);
            if (!fromNode || !toNode) {
              continue;
            }

            var pathInfo = layout.buildEdgePath(layout.rectMap.get(fromNode.id), layout.rectMap.get(toNode.id));
            var path = document.createElementNS(SVG_NS, "path");
            path.setAttribute("d", pathInfo.d);
            path.setAttribute("class", "graph-edge");
            path.setAttribute("mask", "url(#" + EDGE_MASK_ID + ")");
            path.dataset.edgeStyle = edge.style || "kenkai";
            graphEdges.appendChild(path);

            if (layout.showEdgeLabels && edge.choiceText) {
              var label = document.createElement("div");
              label.className = "edge-label";
              label.textContent = edge.choiceText;
              label.style.left = pathInfo.labelX + "px";
              label.style.top = pathInfo.labelY + "px";
              graphEdgeLabels.appendChild(label);
            }
          }

          if (focusCard) {
            window.requestAnimationFrame(function () {
              focusCard.scrollIntoView({
                block: "center",
                inline: "center",
                behavior: "auto",
              });
            });
          }
        }

        async function main() {
          var date = resolveDate();
          dateLabel.textContent = date || "";
          updateDateNavigation(date || "");
          mapTitle.textContent = "観測する日付を探索中";
          applyLayoutMode(resolveLayoutMode());

          if (!date) {
            showEmpty("日付が指定されていません。");
            return;
          }

          try {
            var graph = await fetchGraph(date);
            renderGraph(graph);
          } catch (error) {
            showEmpty("この日の世界線は観測されていません。");
          }
        }

        addMediaListener(orientationQuery, scheduleRender);
        addMediaListener(pointerQuery, scheduleRender);
        addMediaListener(anyPointerQuery, scheduleRender);
        addMediaListener(hoverQuery, scheduleRender);
        window.addEventListener("resize", scheduleRender);
        window.addEventListener("pageshow", function () {
          refreshVisitedScenarioKeys();
          if (currentGraph) {
            renderGraph(currentGraph);
          }
        });
        graphShell.addEventListener("scroll", function () {
          if (activePopupCard && activePopupModel && canHoverDetails()) {
            placePopup();
          }
        });
        popup.addEventListener("mouseenter", clearPopupCloseTimer);
        popup.addEventListener("mouseleave", schedulePopupClose);
        popup.addEventListener("focusin", clearPopupCloseTimer);
        popup.addEventListener("focusout", function (event) {
          if (event.relatedTarget && (popup.contains(event.relatedTarget) || (activePopupCard && activePopupCard.contains(event.relatedTarget)))) {
            return;
          }
          schedulePopupClose();
        });
        popupBackdrop.addEventListener("click", function () {
          closePopup({ restoreFocus: true });
        });
        popupClose.addEventListener("click", function () {
          closePopup({ restoreFocus: true });
        });
        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closePopup({ restoreFocus: true });
          }
        });

        main();
      })();
    </script>
  </body>
</html>
