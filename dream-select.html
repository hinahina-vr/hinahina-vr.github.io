<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A.D.M.S. | ワディーゲストハウス</title>
    <meta name="description" content="Auto Diverge Mapping System ─ 分岐と再合流を可視化する夢の地図。" />
    <script>
      (function () {
        var KEY = "waddy-display-mode";
        var DEFAULT_MODE = "classic";
        var FORCE_IMMERSIVE = /\/dream-select(?:\.html)?\/?$/i.test(window.location.pathname);
        var params = new URLSearchParams(window.location.search);
        var queryMode = params.get("mode");
        var mode = FORCE_IMMERSIVE ? "immersive" : (queryMode === "immersive" || queryMode === "classic" ? queryMode : null);

        if (!mode && !FORCE_IMMERSIVE) {
          try {
            var storedMode = window.localStorage.getItem(KEY);
            mode = storedMode === "immersive" || storedMode === "classic" ? storedMode : DEFAULT_MODE;
          } catch (error) {
            mode = DEFAULT_MODE;
          }
        } else if (!FORCE_IMMERSIVE) {
          try {
            window.localStorage.setItem(KEY, mode);
          } catch (error) {
            // Ignore storage failures and continue with query mode.
          }
        }

        document.documentElement.dataset.siteMode = mode;
        window.__waddyInitialSiteMode = mode;
        window.__waddyDreamSelectForceImmersive = FORCE_IMMERSIVE;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-1: #03050f;
        --bg-2: #0d1028;
        --bg-3: #1d1830;
        --panel: rgba(9, 12, 26, 0.72);
        --panel-border: rgba(255, 255, 255, 0.12);
        --text: #eef2ff;
        --muted: rgba(238, 242, 255, 0.62);
        --kenkai: #f0c15d;
        --kenkai-glow: rgba(240, 193, 93, 0.3);
        --genkai: #73c6ff;
        --genkai-glow: rgba(115, 198, 255, 0.28);
        --rejoin: #f3a9d9;
        --rejoin-glow: rgba(243, 169, 217, 0.28);
        --node-width: 220px;
        --node-height: 96px;
        --header-border: rgba(255, 255, 255, 0.08);
        --header-top-bg: rgba(14, 16, 34, 0.28);
        --header-bottom-bg: rgba(7, 8, 18, 0.36);
        --header-accent: rgba(126, 88, 188, 0.06);
        --header-shadow: 0 18px 36px rgba(0, 0, 0, 0.2);
        --header-blur: blur(4px);
        --graph-shell-top-bg: rgba(8, 10, 22, 0.76);
        --graph-shell-bottom-bg: rgba(4, 5, 12, 0.92);
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        position: relative;
        overflow: hidden;
        font-family: "Zen Maru Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(126, 88, 188, 0.3), transparent 24%),
          radial-gradient(circle at 20% 20%, rgba(60, 112, 180, 0.16), transparent 28%),
          linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 38%, var(--bg-1) 100%);
      }

      body.mode-classic {
        font-family: "DotGothic16", "MS Gothic", monospace;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 80px 80px, 100% 4px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 92%);
      }

      #particle-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      body.mode-classic #particle-canvas {
        display: none;
      }

      #mode-toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(9, 12, 26, 0.74);
        color: rgba(255, 255, 255, 0.9);
        font: inherit;
        letter-spacing: 0.16em;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }

      #mode-toggle[disabled] {
        opacity: 0.84;
        cursor: default;
      }

      .page-shell {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        height: 100vh;
        height: 100dvh;
        padding: 20px 18px 22px;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(320px, 520px) 1fr;
        align-items: start;
        width: 100%;
        margin: 0;
        min-height: 88px;
        padding: 8px 14px 8px 10px;
        border: 1px solid var(--header-border);
        border-radius: 16px;
        background:
          linear-gradient(180deg, var(--header-top-bg), var(--header-bottom-bg)),
          radial-gradient(circle at top left, var(--header-accent), transparent 56%);
        box-shadow: var(--header-shadow);
        backdrop-filter: var(--header-blur);
      }

      .header-copy {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        max-width: 520px;
      }

      .date-label {
        margin: 0 0 2px;
        color: rgba(255, 255, 255, 0.52);
        font-size: clamp(9px, 0.68vw, 11px);
        letter-spacing: 0.28em;
      }

      h1 {
        margin: 0 0 2px;
        font-size: clamp(0.96rem, 1.55vw, 1.35rem);
        letter-spacing: 0.28em;
        color: #d8c8ff;
        text-shadow:
          0 0 24px rgba(164, 120, 255, 0.22),
          0 1px 2px rgba(0, 0, 0, 0.46);
      }

      .subtitle,
      .map-title {
        margin: 0;
        line-height: 1.2;
        white-space: nowrap;
      }

      .subtitle {
        font-size: clamp(9px, 0.62vw, 10px);
        color: rgba(255, 255, 255, 0.62);
      }

      .map-title {
        font-size: clamp(9px, 0.62vw, 10px);
        color: rgba(255, 255, 255, 0.82);
        letter-spacing: 0.08em;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 8px;
        margin-top: 3px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 8px;
        letter-spacing: 0.08em;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.12);
      }

      .legend-swatch.kenkai {
        background: linear-gradient(135deg, rgba(240, 193, 93, 0.95), rgba(135, 94, 32, 0.88));
      }

      .legend-swatch.genkai {
        background: linear-gradient(135deg, rgba(115, 198, 255, 0.96), rgba(33, 87, 153, 0.88));
      }

      .legend-swatch.rejoin {
        background: linear-gradient(135deg, rgba(243, 169, 217, 0.96), rgba(135, 64, 120, 0.88));
      }

      .legend-swatch.ending {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(161, 164, 192, 0.88));
      }

      .graph-shell {
        position: relative;
        width: 100%;
        margin: 0;
        flex: 1;
        min-height: 0;
        border: 1px solid var(--panel-border);
        border-radius: 30px;
        background:
          linear-gradient(180deg, var(--graph-shell-top-bg), var(--graph-shell-bottom-bg)),
          radial-gradient(circle at 15% 10%, rgba(49, 111, 173, 0.08), transparent 26%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 28px 72px rgba(0, 0, 0, 0.28);
        overflow: auto;
      }

      .graph-shell[data-layout-mode="desktop-horizontal"] {
        overflow-x: auto;
        overflow-y: auto;
      }

      .graph-shell[data-layout-mode="mobile-vertical"] {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .graph-shell::before {
        content: "";
        position: sticky;
        top: 0;
        display: block;
        width: 100%;
        height: 1px;
        z-index: 2;
      }

      .graph-stage {
        position: relative;
        min-width: 100%;
        min-height: 100%;
      }

      #graph-edges,
      #graph-edge-labels,
      #graph-nodes {
        position: absolute;
        inset: 0;
      }

      #graph-edges {
        overflow: visible;
        z-index: 0;
      }

      #graph-edge-labels {
        z-index: 1;
        pointer-events: none;
      }

      #graph-nodes {
        z-index: 2;
      }

      .graph-edge {
        fill: none;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.06));
      }

      .graph-edge[data-edge-style="kenkai"] {
        stroke: var(--kenkai);
      }

      .graph-edge[data-edge-style="genkai"] {
        stroke: var(--genkai);
      }

      .graph-edge[data-edge-style="rejoin"] {
        stroke: var(--rejoin);
        stroke-dasharray: 10 8;
      }

      .edge-label {
        position: absolute;
        transform: translate(-50%, -50%);
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(8, 10, 24, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.68);
        font-size: 10px;
        line-height: 1.3;
        letter-spacing: 0.08em;
        white-space: nowrap;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
      }

      .scenario-card {
        position: absolute;
        display: flex;
        align-items: center;
        gap: 12px;
        width: var(--node-width);
        min-height: var(--node-height);
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background:
          linear-gradient(180deg, rgba(20, 22, 44, 0.94), rgba(10, 12, 28, 0.96)),
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 48%);
        color: var(--text);
        text-decoration: none;
        box-shadow:
          0 20px 48px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        transition:
          transform 0.22s ease,
          border-color 0.22s ease,
          box-shadow 0.22s ease,
          background 0.22s ease;
      }

      .scenario-card:hover {
        transform: translateY(-4px) translateX(4px);
        border-color: rgba(255, 255, 255, 0.28);
        box-shadow:
          0 26px 56px rgba(0, 0, 0, 0.28),
          0 0 30px rgba(255, 255, 255, 0.08);
      }

      .scenario-card[data-graph-realm="kenkai"] {
        background:
          linear-gradient(180deg, rgba(44, 33, 10, 0.94), rgba(22, 18, 7, 0.96)),
          radial-gradient(circle at top, rgba(240, 193, 93, 0.12), transparent 48%);
        border-color: rgba(240, 193, 93, 0.2);
      }

      .scenario-card[data-graph-realm="kenkai"]:hover {
        border-color: rgba(240, 193, 93, 0.48);
        box-shadow:
          0 26px 56px rgba(0, 0, 0, 0.28),
          0 0 34px var(--kenkai-glow);
      }

      .scenario-card[data-graph-realm="genkai"] {
        background:
          linear-gradient(180deg, rgba(10, 20, 44, 0.94), rgba(6, 10, 24, 0.96)),
          radial-gradient(circle at top, rgba(115, 198, 255, 0.12), transparent 48%);
        border-color: rgba(115, 198, 255, 0.22);
      }

      .scenario-card[data-graph-realm="genkai"]:hover {
        border-color: rgba(115, 198, 255, 0.48);
        box-shadow:
          0 26px 56px rgba(0, 0, 0, 0.28),
          0 0 34px var(--genkai-glow);
      }

      .scenario-card[data-graph-kind="rejoin"],
      .scenario-card[data-graph-kind="root"] {
        border-width: 2px;
      }

      .scenario-card[data-graph-kind="rejoin"] {
        box-shadow:
          0 20px 48px rgba(0, 0, 0, 0.24),
          0 0 18px var(--rejoin-glow),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .scenario-card[data-graph-kind="ending"] {
        background:
          linear-gradient(180deg, rgba(31, 33, 48, 0.95), rgba(10, 11, 20, 0.98)),
          radial-gradient(circle at top, rgba(255, 255, 255, 0.12), transparent 52%);
      }

      .scenario-card[data-graph-kind="root"]::after {
        content: "";
        position: absolute;
        inset: -8px;
        border-radius: 24px;
        border: 1px solid rgba(243, 169, 217, 0.22);
        pointer-events: none;
        animation: root-pulse 3s ease-in-out infinite;
      }

      @keyframes root-pulse {
        0%, 100% {
          opacity: 0.45;
          transform: scale(1);
        }
        50% {
          opacity: 0.14;
          transform: scale(1.04);
        }
      }

      .card-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 20px;
        flex-shrink: 0;
      }

      .card-copy {
        min-width: 0;
        flex: 1;
      }

      .card-heading {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.07em;
        line-height: 1.35;
      }

      .card-kind {
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        font-size: 9px;
        letter-spacing: 0.14em;
        color: rgba(255, 255, 255, 0.72);
        white-space: nowrap;
      }

      .scenario-card[data-graph-realm="kenkai"] .card-title {
        color: #f8d98d;
      }

      .scenario-card[data-graph-realm="genkai"] .card-title {
        color: #98d6ff;
      }

      .card-summary {
        color: rgba(255, 255, 255, 0.66);
        font-size: 11px;
        line-height: 1.55;
        letter-spacing: 0.04em;
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .card-meta {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.48);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .no-dreams {
        margin: 0;
        padding: 56px 24px;
        color: rgba(255, 255, 255, 0.62);
        text-align: center;
        font-size: 15px;
        letter-spacing: 0.1em;
      }

      .back-link {
        align-self: center;
        color: rgba(255, 255, 255, 0.56);
        text-decoration: none;
        letter-spacing: 0.12em;
      }

      .back-link:hover {
        color: rgba(255, 255, 255, 0.84);
      }

      body[data-graph-layout="mobile-vertical"] {
        --header-top-bg: rgba(14, 16, 34, 0.34);
        --header-bottom-bg: rgba(7, 8, 18, 0.44);
        --header-blur: none;
        --graph-shell-top-bg: rgba(8, 10, 22, 0.8);
      }

      body[data-graph-layout="mobile-vertical"] .page-shell {
        padding: 14px 12px 18px;
        gap: 10px;
      }

      body[data-graph-layout="mobile-vertical"] .header {
        grid-template-columns: 1fr;
        min-height: auto;
        padding: 10px 12px 10px;
        border-radius: 14px;
        backdrop-filter: none;
      }

      body[data-graph-layout="mobile-vertical"] .header-copy {
        max-width: none;
      }

      body[data-graph-layout="mobile-vertical"] .subtitle,
      body[data-graph-layout="mobile-vertical"] .map-title {
        white-space: normal;
      }

      body[data-graph-layout="mobile-vertical"] .graph-shell {
        border-radius: 22px;
      }

      body[data-graph-layout="mobile-vertical"] .graph-stage {
        overflow: hidden;
      }

      body[data-graph-layout="mobile-vertical"] .edge-label {
        display: none;
      }

      body[data-graph-layout="mobile-vertical"] #mode-toggle {
        top: 12px;
        right: 12px;
        padding: 8px 10px;
        font-size: 11px;
      }
    </style>
  </head>
  <body class="mode-immersive">
    <script>
      document.body.classList.remove("mode-immersive", "mode-classic");
      document.body.classList.add("mode-" + (window.__waddyInitialSiteMode || "immersive"));
    </script>
    <button id="mode-toggle" type="button" aria-label="表示モード切替" title="表示モード切替">◆ IMMERSIVE</button>
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <main class="page-shell">
      <header class="header">
        <div class="header-copy">
          <p class="date-label" id="date-label"></p>
          <h1>A.D.M.S.</h1>
          <p class="subtitle">Auto Diverge Mapping System ─ 分岐と再合流を可視化する夢の地図</p>
          <p class="map-title" id="map-title">観測中…</p>
          <div class="legend">
            <span class="legend-item"><span class="legend-swatch kenkai"></span>顕界ルート</span>
            <span class="legend-item"><span class="legend-swatch genkai"></span>幻界サブ</span>
            <span class="legend-item"><span class="legend-swatch rejoin"></span>再合流</span>
            <span class="legend-item"><span class="legend-swatch ending"></span>終点</span>
          </div>
        </div>
      </header>

      <section class="graph-shell" id="graph-shell">
        <div class="graph-stage" id="graph-stage" hidden>
          <svg id="graph-edges" aria-hidden="true"></svg>
          <div id="graph-edge-labels" aria-hidden="true"></div>
          <div id="graph-nodes"></div>
        </div>
        <p class="no-dreams" id="graph-empty" hidden></p>
      </section>

      <a class="back-link" href="./diary.html">◁ 日記に戻る</a>
    </main>

    <script>
      (function () {
        var toggle = document.getElementById("mode-toggle");
        var forceImmersive = Boolean(window.__waddyDreamSelectForceImmersive);
        if (toggle && forceImmersive) {
          toggle.textContent = "◆ IMMERSIVE";
          toggle.disabled = true;
        }
      })();

      (function () {
        var canvas = document.getElementById("particle-canvas");
        var ctx = canvas.getContext("2d");
        var bgColor = { h: 270, s: 40, l: 8 };
        var bgClearColor = "rgba(12,5,24,0.15)";
        var streams = [];
        var stars = [];
        var nebulae = [];
        var pillars = [];
        var animId = 0;

        function initCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        function initParticles() {
          var i = 0;
          var w = canvas.width;
          var h = canvas.height;
          streams = [];
          stars = [];
          nebulae = [];
          pillars = [];

          for (i = 0; i < 6; i += 1) {
            streams.push({
              y: Math.random() * h,
              baseX: Math.random() * w,
              amp: Math.random() * 120 + 60,
              freq: Math.random() * 0.008 + 0.003,
              speed: Math.random() * 1.5 + 1,
              phase: Math.random() * Math.PI * 2,
              width: Math.random() * 2.5 + 0.8,
              hue: Math.floor(Math.random() * 60 + bgColor.h - 30),
              len: Math.floor(Math.random() * 80 + 60),
              trail: [],
            });
          }

          for (i = 0; i < 80; i += 1) {
            stars.push({
              x: Math.random() * w,
              y: Math.random() * h,
              vx: (Math.random() - 0.3) * 2,
              vy: (Math.random() - 0.5) * 1,
              size: Math.random() * 2 + 0.4,
              brightness: Math.random(),
              phase: Math.random() * Math.PI * 2,
              speed: Math.random() * 2.5 + 0.8,
            });
          }

          for (i = 0; i < 5; i += 1) {
            nebulae.push({
              x: Math.random() * w,
              y: Math.random() * h,
              r: Math.random() * 180 + 80,
              dx: (Math.random() - 0.5) * 0.3,
              dy: (Math.random() - 0.5) * 0.2,
              phase: Math.random() * Math.PI * 2,
              hue: Math.floor(Math.random() * 80 + bgColor.h - 40),
              sat: Math.floor(Math.random() * 40 + 50),
            });
          }

          for (i = 0; i < 3; i += 1) {
            pillars.push({
              x: Math.random() * w,
              width: Math.random() * 50 + 15,
              phase: Math.random() * Math.PI * 2,
              speed: Math.random() * 0.02 + 0.01,
              hue: Math.floor(Math.random() * 40 + bgColor.h - 20),
              drift: (Math.random() - 0.5) * 1.5 + (Math.random() > 0.5 ? 0.4 : -0.4),
            });
          }
        }

        function draw() {
          var w = canvas.width;
          var h = canvas.height;
          var time = Date.now() * 0.001;
          var i = 0;

          ctx.fillStyle = bgClearColor;
          ctx.fillRect(0, 0, w, h);

          for (i = 0; i < nebulae.length; i += 1) {
            var nebula = nebulae[i];
            nebula.x += nebula.dx;
            nebula.y += nebula.dy;
            if (nebula.x < -200) nebula.x = w + 200;
            if (nebula.x > w + 200) nebula.x = -200;
            if (nebula.y < -200) nebula.y = h + 200;
            if (nebula.y > h + 200) nebula.y = -200;
            var pulse = Math.sin(time * 1.5 + nebula.phase) * 0.4 + 0.6;
            var nebulaGradient = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.r * pulse);
            nebulaGradient.addColorStop(0, "hsla(" + nebula.hue + "," + nebula.sat + "%,40%," + 0.12 * pulse + ")");
            nebulaGradient.addColorStop(0.4, "hsla(" + nebula.hue + "," + nebula.sat + "%,25%," + 0.06 * pulse + ")");
            nebulaGradient.addColorStop(1, "hsla(" + nebula.hue + "," + nebula.sat + "%,10%,0)");
            ctx.beginPath();
            ctx.arc(nebula.x, nebula.y, nebula.r * pulse, 0, Math.PI * 2);
            ctx.fillStyle = nebulaGradient;
            ctx.fill();
          }

          for (i = 0; i < pillars.length; i += 1) {
            var pillar = pillars[i];
            pillar.x += pillar.drift + Math.sin(time * 0.8 + pillar.phase) * 1.2;
            if (pillar.x < -100) pillar.x = w + 100;
            if (pillar.x > w + 100) pillar.x = -100;
            var intensity = Math.sin(time * pillar.speed * 50 + pillar.phase) * 0.5 + 0.5;
            var pillarGradient = ctx.createLinearGradient(pillar.x - pillar.width / 2, 0, pillar.x + pillar.width / 2, 0);
            pillarGradient.addColorStop(0, "hsla(" + pillar.hue + ",60%,50%,0)");
            pillarGradient.addColorStop(0.5, "hsla(" + pillar.hue + ",60%,50%," + 0.08 * intensity + ")");
            pillarGradient.addColorStop(1, "hsla(" + pillar.hue + ",60%,50%,0)");
            ctx.fillStyle = pillarGradient;
            ctx.fillRect(pillar.x - pillar.width, 0, pillar.width * 2, h);
          }

          for (i = 0; i < streams.length; i += 1) {
            var stream = streams[i];
            var cx = stream.baseX + Math.sin(time * 0.5 + stream.phase) * 100;
            stream.trail.push({
              x: cx + Math.sin(time * stream.freq * 100 + stream.phase) * stream.amp,
              y: stream.y,
            });
            stream.y -= stream.speed;
            if (stream.y < -20) {
              stream.y = h + 20;
              stream.trail.length = 0;
            }
            if (stream.trail.length > stream.len) {
              stream.trail.shift();
            }
            if (stream.trail.length > 2) {
              ctx.beginPath();
              ctx.moveTo(stream.trail[0].x, stream.trail[0].y);
              for (var j = 1; j < stream.trail.length; j += 1) {
                var point = stream.trail[j];
                var prev = stream.trail[j - 1];
                ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + point.x) / 2, (prev.y + point.y) / 2);
              }
              ctx.strokeStyle = "hsla(" + stream.hue + ",70%,60%,0.5)";
              ctx.lineWidth = stream.width;
              ctx.shadowColor = "hsla(" + stream.hue + ",80%,50%,0.6)";
              ctx.shadowBlur = 12;
              ctx.stroke();
              ctx.shadowBlur = 0;
            }
          }

          for (i = 0; i < stars.length; i += 1) {
            var star = stars[i];
            star.x += star.vx;
            star.y += star.vy;
            if (star.x < 0) star.x = w;
            if (star.x > w) star.x = 0;
            if (star.y < 0) star.y = h;
            if (star.y > h) star.y = 0;
            var flicker = Math.sin(time * star.speed * 3 + star.phase) * 0.3 + 0.7;
            var alpha = star.brightness * flicker;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size * flicker, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(180,170,220," + alpha * 0.7 + ")";
            ctx.fill();
            if (star.size > 1.5) {
              ctx.beginPath();
              ctx.arc(star.x, star.y, star.size * 3 * flicker, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(140,130,200," + alpha * 0.12 + ")";
              ctx.fill();
            }
          }

          animId = requestAnimationFrame(draw);
        }

        initCanvas();
        initParticles();
        draw();

        window.addEventListener("resize", function () {
          initCanvas();
          initParticles();
        });

        window.addEventListener("beforeunload", function () {
          cancelAnimationFrame(animId);
        });
      })();

      (function () {
        var DESKTOP_GRID = {
          padX: 140,
          padY: 110,
          layerGap: 260,
          laneGap: 118,
          nodeWidth: 220,
          nodeHeight: 96,
        };
        var MOBILE_GRID = {
          padX: 16,
          padY: 24,
          bandGap: 48,
          bandPaddingTop: 18,
          bandPaddingBottom: 28,
          mainGap: 18,
          sideGapX: 12,
          sideGapY: 16,
          minNodeWidth: 112,
          maxNodeWidth: 220,
          nodeHeight: 96,
        };

        var KIND_LABELS = {
          root: "起点",
          route: "本線",
          rejoin: "再合流",
          branch: "分岐",
          side: "枝線",
          ending: "終点",
        };

        var REALM_LABELS = {
          kenkai: "顕界",
          genkai: "幻界",
        };

        var dateLabel = document.getElementById("date-label");
        var mapTitle = document.getElementById("map-title");
        var graphStage = document.getElementById("graph-stage");
        var graphEmpty = document.getElementById("graph-empty");
        var graphShell = document.getElementById("graph-shell");
        var graphEdges = document.getElementById("graph-edges");
        var graphEdgeLabels = document.getElementById("graph-edge-labels");
        var graphNodes = document.getElementById("graph-nodes");
        var orientationQuery = window.matchMedia("(orientation: portrait)");
        var pointerQuery = window.matchMedia("(pointer: coarse)");
        var anyPointerQuery = window.matchMedia("(any-pointer: coarse)");
        var currentGraph = null;
        var renderScheduled = false;

        function resolveDate() {
          var params = new URLSearchParams(window.location.search);
          var hash = window.location.hash.replace(/^#/, "");
          return params.get("date") || hash || null;
        }

        function resolveLayoutMode() {
          var hasTouch = typeof navigator.maxTouchPoints === "number" && navigator.maxTouchPoints > 0;
          var coarsePointer = pointerQuery.matches || anyPointerQuery.matches;
          var portrait = orientationQuery.matches;
          return hasTouch && coarsePointer && portrait ? "mobile-vertical" : "desktop-horizontal";
        }

        function applyLayoutMode(mode) {
          document.body.dataset.graphLayout = mode;
          graphShell.dataset.layoutMode = mode;
          graphStage.dataset.layoutMode = mode;
        }

        function addMediaListener(query, listener) {
          if (typeof query.addEventListener === "function") {
            query.addEventListener("change", listener);
            return function () {
              query.removeEventListener("change", listener);
            };
          }
          if (typeof query.addListener === "function") {
            query.addListener(listener);
            return function () {
              query.removeListener(listener);
            };
          }
          return function () {};
        }

        function buildScenarioUrl(scenarioName, entryLabel) {
          var url = new URL("./galge-scenario.html", window.location.href);
          url.searchParams.set("scenario", scenarioName);
          if (entryLabel) {
            url.searchParams.set("entry", entryLabel);
          }
          url.searchParams.set("mode", "immersive");
          return url.pathname + url.search;
        }

        async function fetchGraph(date) {
          var response = await fetch("./scenarios/adms/" + date + ".json");
          if (!response.ok) {
            throw new Error("graph not found");
          }
          return response.json();
        }

        function showEmpty(message) {
          graphStage.hidden = true;
          graphEmpty.hidden = false;
          graphEmpty.textContent = message;
          mapTitle.textContent = "観測されていません";
        }

        function getDesktopNodeRect(node) {
          return {
            x: DESKTOP_GRID.padX + node.layer * DESKTOP_GRID.layerGap,
            y: DESKTOP_GRID.padY + node.lane * DESKTOP_GRID.laneGap,
            width: DESKTOP_GRID.nodeWidth,
            height: DESKTOP_GRID.nodeHeight,
          };
        }

        function createNodeElement(node, rect) {
          var card = document.createElement("a");
          card.className = "scenario-card";
          card.href = buildScenarioUrl(node.scenario, node.entry);
          card.style.left = rect.x + "px";
          card.style.top = rect.y + "px";
          card.style.width = rect.width + "px";
          card.style.minHeight = rect.height + "px";
          card.dataset.graphNodeId = node.id;
          card.dataset.graphRealm = node.realm;
          card.dataset.graphKind = node.kind;
          card.dataset.graphLayer = String(node.layer);
          card.dataset.graphLane = String(node.lane);
          card.setAttribute(
            "aria-label",
            [node.title, REALM_LABELS[node.realm] || node.realm, KIND_LABELS[node.kind] || node.kind]
              .filter(Boolean)
              .join(" / ")
          );
          card.title = node.entry ? node.scenario + " / " + node.entry : node.scenario;

          var icon = document.createElement("span");
          icon.className = "card-icon";
          icon.textContent = node.icon || "•";

          var copy = document.createElement("div");
          copy.className = "card-copy";

          var heading = document.createElement("div");
          heading.className = "card-heading";

          var title = document.createElement("div");
          title.className = "card-title";
          title.textContent = node.title;

          var kind = document.createElement("span");
          kind.className = "card-kind";
          kind.textContent = KIND_LABELS[node.kind] || node.kind || "";

          var summary = document.createElement("div");
          summary.className = "card-summary";
          summary.textContent = node.summary || "";

          var meta = document.createElement("div");
          meta.className = "card-meta";
          meta.textContent = (REALM_LABELS[node.realm] || node.realm || "") + (node.entry ? " / " + node.entry : "");

          heading.appendChild(title);
          heading.appendChild(kind);
          copy.appendChild(heading);
          copy.appendChild(summary);
          copy.appendChild(meta);
          card.appendChild(icon);
          card.appendChild(copy);
          return card;
        }

        function buildEdgePathDesktop(fromRect, toRect) {
          var startX = fromRect.x + fromRect.width;
          var startY = fromRect.y + fromRect.height / 2;
          var endX = toRect.x;
          var endY = toRect.y + toRect.height / 2;
          var deltaX = Math.max(80, (endX - startX) * 0.34);
          var control1X = startX + deltaX;
          var control2X = endX - deltaX;
          return {
            d: "M " + startX + " " + startY + " C " + control1X + " " + startY + ", " + control2X + " " + endY + ", " + endX + " " + endY,
            labelX: (startX + endX) / 2,
            labelY: (startY + endY) / 2 - (startY === endY ? 18 : 0),
          };
        }

        function buildEdgePathMobile(fromRect, toRect) {
          var startX = fromRect.x + fromRect.width / 2;
          var startY = fromRect.y + fromRect.height;
          var endX = toRect.x + toRect.width / 2;
          var endY = toRect.y;
          var direction = endY >= startY ? 1 : -1;
          var deltaY = Math.max(52, Math.abs(endY - startY) * 0.38);
          var control1Y = startY + deltaY * direction;
          var control2Y = endY - deltaY * direction;
          return {
            d: "M " + startX + " " + startY + " C " + startX + " " + control1Y + ", " + endX + " " + control2Y + ", " + endX + " " + endY,
            labelX: (startX + endX) / 2,
            labelY: (startY + endY) / 2,
          };
        }

        function computeDesktopLayout(sortedNodes) {
          var rectMap = new Map();
          var maxLayer = sortedNodes.reduce(function (value, node) {
            return Math.max(value, node.layer);
          }, 0);
          var maxLane = sortedNodes.reduce(function (value, node) {
            return Math.max(value, node.lane);
          }, 0);
          var stageWidth = Math.max(graphShell.clientWidth || 0, DESKTOP_GRID.padX * 2 + maxLayer * DESKTOP_GRID.layerGap + DESKTOP_GRID.nodeWidth);
          var stageHeight = Math.max(graphShell.clientHeight || 0, DESKTOP_GRID.padY * 2 + maxLane * DESKTOP_GRID.laneGap + DESKTOP_GRID.nodeHeight);

          sortedNodes.forEach(function (node) {
            rectMap.set(node.id, getDesktopNodeRect(node));
          });

          return {
            mode: "desktop-horizontal",
            stageWidth: stageWidth,
            stageHeight: stageHeight,
            rectMap: rectMap,
            showEdgeLabels: true,
            buildEdgePath: buildEdgePathDesktop,
          };
        }

        function computeMobileLayout(sortedNodes) {
          var rectMap = new Map();
          var shellWidth = graphShell.clientWidth || window.innerWidth || 390;
          var usableWidth = Math.max(280, Math.floor(shellWidth - 8));
          var twoColumnWidth = Math.floor((usableWidth - MOBILE_GRID.padX * 2 - MOBILE_GRID.sideGapX) / 2);
          var nodeWidth = Math.max(MOBILE_GRID.minNodeWidth, Math.min(MOBILE_GRID.maxNodeWidth, twoColumnWidth));
          var leftX = MOBILE_GRID.padX;
          var rightX = usableWidth - MOBILE_GRID.padX - nodeWidth;
          var centerX = Math.max(MOBILE_GRID.padX, Math.round((usableWidth - nodeWidth) / 2));
          var layers = new Map();
          var orderedLayers = [];
          var cursorY = MOBILE_GRID.padY;
          var lastBottom = MOBILE_GRID.padY;

          sortedNodes.forEach(function (node) {
            if (!layers.has(node.layer)) {
              layers.set(node.layer, []);
              orderedLayers.push(node.layer);
            }
            layers.get(node.layer).push(node);
          });

          orderedLayers.sort(function (a, b) {
            return a - b;
          });

          orderedLayers.forEach(function (layer) {
            var layerNodes = layers.get(layer).slice().sort(function (a, b) {
              if (a.lane !== b.lane) return a.lane - b.lane;
              return a.id.localeCompare(b.id);
            });
            var mainNodes = [];
            var sideNodes = [];
            var bandTop = cursorY;
            var localCursorY = bandTop + MOBILE_GRID.bandPaddingTop;

            layerNodes.forEach(function (node) {
              if (node.kind === "side") {
                sideNodes.push(node);
              } else {
                mainNodes.push(node);
              }
            });

            mainNodes.forEach(function (node) {
              rectMap.set(node.id, {
                x: centerX,
                y: localCursorY,
                width: nodeWidth,
                height: MOBILE_GRID.nodeHeight,
              });
              localCursorY += MOBILE_GRID.nodeHeight + MOBILE_GRID.mainGap;
            });

            if (mainNodes.length > 0) {
              localCursorY -= MOBILE_GRID.mainGap;
            }

            lastBottom = localCursorY;

            if (sideNodes.length > 0) {
              var sideStartY = Math.max(localCursorY + MOBILE_GRID.sideGapY, bandTop + MOBILE_GRID.bandPaddingTop);
              sideNodes.forEach(function (node, index) {
                var column = index % 2;
                var row = Math.floor(index / 2);
                rectMap.set(node.id, {
                  x: column === 0 ? leftX : rightX,
                  y: sideStartY + row * (MOBILE_GRID.nodeHeight + MOBILE_GRID.sideGapY),
                  width: nodeWidth,
                  height: MOBILE_GRID.nodeHeight,
                });
              });
              lastBottom = sideStartY + Math.ceil(sideNodes.length / 2) * MOBILE_GRID.nodeHeight + Math.max(0, Math.ceil(sideNodes.length / 2) - 1) * MOBILE_GRID.sideGapY;
            }

            cursorY = lastBottom + MOBILE_GRID.bandPaddingBottom + MOBILE_GRID.bandGap;
          });

          return {
            mode: "mobile-vertical",
            stageWidth: usableWidth,
            stageHeight: Math.max(graphShell.clientHeight || 0, lastBottom + MOBILE_GRID.padY),
            rectMap: rectMap,
            showEdgeLabels: false,
            buildEdgePath: buildEdgePathMobile,
          };
        }

        function computeLayout(sortedNodes) {
          var mode = resolveLayoutMode();
          applyLayoutMode(mode);
          return mode === "mobile-vertical" ? computeMobileLayout(sortedNodes) : computeDesktopLayout(sortedNodes);
        }

        function scheduleRender() {
          if (!currentGraph || renderScheduled) {
            return;
          }
          renderScheduled = true;
          window.requestAnimationFrame(function () {
            renderScheduled = false;
            if (currentGraph) {
              renderGraph(currentGraph);
            }
          });
        }

        function renderGraph(graph) {
          var nodes = Array.isArray(graph.nodes) ? graph.nodes.slice() : [];
          var edges = Array.isArray(graph.edges) ? graph.edges.slice() : [];
          var sortedNodes = nodes.slice().sort(function (a, b) {
            if (a.layer !== b.layer) return a.layer - b.layer;
            return a.lane - b.lane;
          });

          dateLabel.textContent = graph.date || resolveDate() || "";
          mapTitle.textContent = graph.title || "観測された地図";
          document.title = (graph.title || "A.D.M.S.") + " | ワディーゲストハウス";

          if (sortedNodes.length === 0) {
            showEmpty("この日の世界線は観測されていません。");
            return;
          }

          if (sortedNodes.length === 1) {
            window.location.replace(buildScenarioUrl(sortedNodes[0].scenario, sortedNodes[0].entry));
            return;
          }

          currentGraph = graph;
          var nodeMap = new Map();
          for (var i = 0; i < sortedNodes.length; i += 1) {
            nodeMap.set(sortedNodes[i].id, sortedNodes[i]);
          }

          var layout = computeLayout(sortedNodes);

          graphStage.hidden = false;
          graphEmpty.hidden = true;
          graphStage.style.width = layout.stageWidth + "px";
          graphStage.style.height = layout.stageHeight + "px";
          graphEdges.setAttribute("viewBox", "0 0 " + layout.stageWidth + " " + layout.stageHeight);
          graphEdges.setAttribute("width", String(layout.stageWidth));
          graphEdges.setAttribute("height", String(layout.stageHeight));
          graphEdges.style.overflow = layout.mode === "mobile-vertical" ? "hidden" : "visible";
          graphEdges.innerHTML = "";
          graphEdgeLabels.innerHTML = "";
          graphNodes.innerHTML = "";

          for (var j = 0; j < sortedNodes.length; j += 1) {
            var node = sortedNodes[j];
            var rect = layout.rectMap.get(node.id);
            graphNodes.appendChild(createNodeElement(node, rect));
          }

          for (var k = 0; k < edges.length; k += 1) {
            var edge = edges[k];
            var fromNode = nodeMap.get(edge.from);
            var toNode = nodeMap.get(edge.to);
            if (!fromNode || !toNode) {
              continue;
            }

            var pathInfo = layout.buildEdgePath(layout.rectMap.get(fromNode.id), layout.rectMap.get(toNode.id));
            var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathInfo.d);
            path.setAttribute("class", "graph-edge");
            path.dataset.edgeStyle = edge.style || "kenkai";
            graphEdges.appendChild(path);

            if (layout.showEdgeLabels && edge.choiceText) {
              var label = document.createElement("div");
              label.className = "edge-label";
              label.textContent = edge.choiceText;
              label.style.left = pathInfo.labelX + "px";
              label.style.top = pathInfo.labelY + "px";
              graphEdgeLabels.appendChild(label);
            }
          }
        }

        async function main() {
          var date = resolveDate();
          dateLabel.textContent = date || "";
          mapTitle.textContent = "観測する日付を探索中";
          applyLayoutMode(resolveLayoutMode());

          if (!date) {
            showEmpty("日付が指定されていません。");
            return;
          }

          try {
            var graph = await fetchGraph(date);
            renderGraph(graph);
          } catch (error) {
            showEmpty("この日の世界線は観測されていません。");
          }
        }

        addMediaListener(orientationQuery, scheduleRender);
        addMediaListener(pointerQuery, scheduleRender);
        addMediaListener(anyPointerQuery, scheduleRender);
        window.addEventListener("resize", scheduleRender);

        main();
      })();
    </script>
  </body>
</html>
