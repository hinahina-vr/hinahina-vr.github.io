<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A.D.M.S. | ワディーゲストハウス</title>
    <meta name="description" content="Auto Diverge Mapping System ─ 分岐する世界線の地図。" />
    <script>
      (function () {
        var KEY = "waddy-display-mode";
        var DEFAULT_MODE = "classic";
        var FORCE_IMMERSIVE = /\/dream-select(?:\.html)?\/?$/i.test(window.location.pathname);
        var params = new URLSearchParams(window.location.search);
        var queryMode = params.get("mode");
        var mode = FORCE_IMMERSIVE ? "immersive" : (queryMode === "immersive" || queryMode === "classic" ? queryMode : null);

        if (!mode && !FORCE_IMMERSIVE) {
          try {
            var storedMode = window.localStorage.getItem(KEY);
            mode = storedMode === "immersive" || storedMode === "classic" ? storedMode : DEFAULT_MODE;
          } catch (error) {
            mode = DEFAULT_MODE;
          }
        } else if (!FORCE_IMMERSIVE) {
          try {
            window.localStorage.setItem(KEY, mode);
          } catch (error) {
            // Ignore storage failures and continue with query mode.
          }
        }

        document.documentElement.dataset.siteMode = mode;
        window.__waddyInitialSiteMode = mode;
        window.__waddyDreamSelectForceImmersive = FORCE_IMMERSIVE;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; min-height: 100vh;
        font-family: "Zen Maru Gothic", sans-serif;
        color: #ece7ff;
        background:
          radial-gradient(circle at top, rgba(88, 65, 160, 0.32), transparent 30%),
          linear-gradient(180deg, #110818 0%, #050309 52%, #110818 100%);
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 48px;
        position: relative;
        transition: background 0.3s ease, color 0.3s ease;
      }
      body.mode-classic {
        font-family: "DotGothic16", "MS Gothic", monospace;
        color: #d8e0ff;
        background:
          radial-gradient(circle at top, rgba(30, 60, 120, 0.18), transparent 25%),
          linear-gradient(180deg, #070914 0%, #02030a 100%);
      }
      body.mode-classic::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          linear-gradient(90deg, rgba(64, 96, 180, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 24px 24px, 100% 3px;
        opacity: 0.45;
      }

      #mode-toggle {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 3;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(8, 6, 18, 0.68);
        color: rgba(255,255,255,0.86);
        font: inherit;
        letter-spacing: 0.14em;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.28);
      }
      #mode-toggle:hover {
        transform: translateY(-1px);
      }
      #mode-toggle[disabled] {
        opacity: 0.8;
        cursor: default;
        transform: none;
      }
      body.mode-classic #mode-toggle {
        border-radius: 0;
        border: 2px solid #99b0ff;
        background: rgba(6, 10, 28, 0.94);
        color: #d8e0ff;
        box-shadow: 0 0 0 2px rgba(20, 40, 90, 0.8);
      }

      /* ── Particle Canvas ── */
      #particle-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      body.mode-classic #particle-canvas {
        display: none;
      }

      /* ── Header ── */
      .header {
        text-align: center;
        margin-bottom: clamp(24px, 4vh, 48px);
        animation: fade-in 0.8s ease both;
        position: relative;
        z-index: 1;
      }
      .date-label {
        font-size: clamp(11px, 1vw, 14px);
        letter-spacing: 0.3em;
        color: rgba(255,255,255,0.3);
        margin-bottom: 8px;
      }
      h1 {
        font-size: clamp(1.1rem, 2.5vw, 1.8rem);
        letter-spacing: 0.25em;
        color: #c0a0e0;
        text-shadow: 0 0 30px rgba(140,100,200,0.2);
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: clamp(10px, 0.9vw, 13px);
        letter-spacing: 0.15em;
        color: rgba(255,255,255,0.3);
      }
      body.mode-classic .header {
        width: min(760px, 100%);
        padding: 22px 18px 18px;
        border: 2px solid rgba(146, 176, 255, 0.72);
        background: rgba(4, 10, 28, 0.88);
        box-shadow: 0 0 0 2px rgba(12, 18, 40, 0.95), inset 0 0 0 1px rgba(220, 230, 255, 0.1);
      }
      body.mode-classic .date-label,
      body.mode-classic .subtitle {
        color: rgba(198, 214, 255, 0.68);
      }
      body.mode-classic h1 {
        color: #f4f0b2;
        text-shadow: none;
      }

      /* ── Timeline Container ── */
      .timeline {
        position: relative;
        width: min(720px, 100%);
        z-index: 1;
      }
      body.mode-classic .timeline {
        width: min(780px, 100%);
        padding: 18px 18px 22px;
        border: 2px solid rgba(138, 166, 242, 0.72);
        background: rgba(3, 6, 20, 0.82);
        box-shadow: 0 0 0 2px rgba(10, 16, 34, 0.94);
      }

      /* ── Main trunk line ── */
      .trunk-line {
        position: absolute;
        left: 28px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: linear-gradient(180deg,
          rgba(200,170,100,0.5) 0%,
          rgba(160,130,80,0.35) 30%,
          rgba(100,80,160,0.3) 60%,
          rgba(80,50,140,0.2) 100%);
      }
      body.mode-classic .trunk-line,
      body.mode-classic .branches::before {
        background: linear-gradient(180deg, rgba(132, 160, 236, 0.82), rgba(76, 102, 170, 0.35));
      }

      /* ── Location Node ── */
      .location-group {
        position: relative;
        margin-bottom: 0;
        animation: fade-in 0.6s ease both;
      }
      .location-group:last-child { margin-bottom: 0; }

      .location-node {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 0;
        position: relative;
        z-index: 2;
      }

      /* ── Node Dots ── */
      .node-dot {
        width: 16px;
        height: 16px;
        min-width: 16px;
        border-radius: 50%;
        background: radial-gradient(circle, #8070a0, #403060);
        border: 2px solid rgba(120,100,160,0.4);
        box-shadow: 0 0 8px rgba(100,70,140,0.3);
        position: relative;
        left: 21px;
      }
      .node-dot.kenkai {
        background: radial-gradient(circle, #f0d888, #c09030);
        border: 2px solid rgba(240,200,100,0.6);
        box-shadow: 0 0 16px rgba(220,170,60,0.5), 0 0 32px rgba(200,150,40,0.2);
        width: 20px;
        height: 20px;
        min-width: 20px;
        left: 19px;
      }

      .location-label {
        font-size: clamp(11px, 1vw, 13px);
        letter-spacing: 0.15em;
        color: rgba(255,255,255,0.4);
        padding-left: 24px;
      }
      body.mode-classic .location-label {
        color: rgba(220, 230, 255, 0.82);
      }
      .location-label .time {
        color: rgba(255,255,255,0.25);
        margin-right: 8px;
      }

      /* ── Branch Lines (kenkai) ── */
      .branches {
        padding-left: 60px;
        position: relative;
      }
      .branches::before {
        content: "";
        position: absolute;
        left: 29px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: rgba(160,130,60,0.2);
      }

      /* ── Genkai parallel track ── */
      .genkai-track {
        position: relative;
        margin-left: 60px;
        margin-top: 4px;
        padding: 12px 0 12px 36px;
        border-left: 2px solid rgba(40,100,180,0.25);
        box-shadow: -4px 0 16px rgba(30,80,160,0.06);
      }
      body.mode-classic .genkai-track {
        border-left-color: rgba(126, 168, 255, 0.48);
        box-shadow: none;
      }
      .genkai-track::before {
        content: "⟡ 並行世界線";
        position: absolute;
        top: -2px;
        left: 12px;
        font-size: 9px;
        letter-spacing: 0.25em;
        color: rgba(80,150,220,0.45);
        white-space: nowrap;
      }
      .genkai-track .scenario-card {
        margin: 4px 0;
      }
      .genkai-track .scenario-card::before {
        content: "";
        position: absolute;
        left: -37px;
        top: 50%;
        width: 34px;
        height: 2px;
        background: linear-gradient(90deg, rgba(40,100,180,0.35), rgba(30,80,150,0.15));
      }

      /* ── Scenario Card ── */
      .scenario-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        margin: 4px 0;
        border-radius: 12px;
        text-decoration: none;
        transition: all 0.3s ease;
        position: relative;
      }
      body.mode-classic .scenario-card {
        border-radius: 0;
      }

      /* Branch connector line */
      .scenario-card::before {
        content: "";
        position: absolute;
        left: -31px;
        top: 50%;
        width: 28px;
        height: 2px;
      }

      /* ── Kenkai (顕界) = Warm Gold ── */
      .scenario-card.kenkai {
        background: linear-gradient(135deg, rgba(60,45,15,0.5), rgba(35,25,8,0.6));
        border: 1px solid rgba(220,180,80,0.3);
      }
      body.mode-classic .scenario-card.kenkai {
        background: rgba(28, 28, 8, 0.95);
        border: 1px solid rgba(250, 234, 144, 0.74);
        box-shadow: inset 0 0 0 1px rgba(255, 244, 184, 0.08);
      }
      .scenario-card.kenkai::before {
        background: linear-gradient(90deg, rgba(200,160,60,0.5), rgba(220,180,80,0.3));
      }
      .scenario-card.kenkai:hover {
        background: linear-gradient(135deg, rgba(75,55,18,0.6), rgba(45,32,10,0.7));
        border-color: rgba(255,210,100,0.5);
        transform: translateX(4px);
        box-shadow: 0 4px 24px rgba(200,150,40,0.2);
      }

      /* ── Genkai (幻界) = Cherenkov Blue ── */
      .scenario-card.genkai {
        background: linear-gradient(135deg, rgba(8,15,35,0.7), rgba(5,10,25,0.8));
        border: 1px solid rgba(40,100,180,0.25);
        border-left: 3px solid rgba(60,140,220,0.4);
        box-shadow: 0 0 12px rgba(30,80,160,0.1);
      }
      body.mode-classic .scenario-card.genkai {
        background: rgba(8, 14, 34, 0.96);
        border: 1px solid rgba(136, 180, 255, 0.78);
        border-left: 3px solid rgba(176, 208, 255, 0.92);
        box-shadow: inset 0 0 0 1px rgba(214, 232, 255, 0.08);
      }
      .scenario-card.genkai::before {
        background: linear-gradient(90deg, rgba(40,100,180,0.3), rgba(30,80,150,0.15));
      }
      .scenario-card.genkai:hover {
        background: linear-gradient(135deg, rgba(12,20,50,0.8), rgba(8,14,35,0.85));
        border-color: rgba(60,140,220,0.5);
        border-left-color: rgba(80,170,255,0.6);
        transform: translateX(4px);
        box-shadow: 0 4px 24px rgba(30,80,180,0.2), 0 0 16px rgba(40,120,220,0.15);
      }

      .card-icon {
        font-size: 16px;
        min-width: 20px;
        text-align: center;
      }

      .card-body { flex: 1; min-width: 0; }

      .card-title {
        font-size: clamp(13px, 1.3vw, 16px);
        font-weight: 700;
        letter-spacing: 0.1em;
        margin-bottom: 2px;
      }
      .kenkai .card-title { color: #e8c868; }
      .genkai .card-title {
        color: #80b8e0;
        text-shadow: 0 0 8px rgba(60,140,220,0.3);
      }

      .card-desc {
        font-size: clamp(10px, 0.9vw, 12px);
        letter-spacing: 0.05em;
        line-height: 1.5;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .kenkai .card-desc { color: rgba(220,190,120,0.5); }
      .genkai .card-desc { color: rgba(100,150,200,0.5); }

      /* Character name emphasis */
      .card-chars {
        font-weight: 700;
        font-size: clamp(11px, 1vw, 13px);
        letter-spacing: 0.08em;
        margin-bottom: 1px;
        display: block;
      }
      .kenkai .card-chars {
        color: rgba(230,200,100,0.85);
      }
      .genkai .card-chars {
        color: rgba(120,190,255,0.85);
        text-shadow: 0 0 6px rgba(60,140,220,0.25);
      }

      /* Kenkai passthrough marker */
      .kenkai-passthrough {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        margin: 2px 0 6px;
        font-size: 10px;
        letter-spacing: 0.15em;
        color: rgba(200,170,80,0.4);
        border-left: 2px solid rgba(200,170,80,0.15);
      }
      .kenkai-passthrough a {
        color: rgba(220,190,100,0.5);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .kenkai-passthrough a:hover {
        color: rgba(230,200,100,0.8);
      }

      .card-tag {
        font-size: 9px;
        letter-spacing: 0.2em;
        padding: 2px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .kenkai .card-tag {
        background: rgba(200,160,40,0.15);
        color: rgba(230,190,80,0.7);
        border: 1px solid rgba(200,160,40,0.25);
      }
      .genkai .card-tag {
        background: rgba(20,60,120,0.2);
        color: rgba(100,180,255,0.8);
        border: 1px solid rgba(60,140,220,0.35);
        box-shadow: 0 0 8px rgba(40,120,220,0.3), 0 0 20px rgba(30,100,200,0.1);
        text-shadow: 0 0 6px rgba(80,160,255,0.5);
      }



      /* ── Terminal node ── */
      .terminal-node {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 0;
        position: relative;
        z-index: 2;
      }
      .terminal-dot {
        width: 8px;
        height: 8px;
        min-width: 8px;
        border-radius: 50%;
        background: rgba(100,70,150,0.3);
        border: 1px solid rgba(100,70,150,0.2);
        position: relative;
        left: 25px;
      }
      .terminal-label {
        font-size: 11px;
        letter-spacing: 0.1em;
        color: rgba(255,255,255,0.2);
        padding-left: 24px;
      }

      /* ── Back link ── */
      .back-link {
        display: inline-block;
        margin-top: clamp(28px, 4vh, 48px);
        color: rgba(255,255,255,0.3);
        text-decoration: none;
        font-size: clamp(12px, 1vw, 14px);
        letter-spacing: 0.15em;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
      }
      .back-link:hover { color: rgba(255,255,255,0.6); }
      body.mode-classic .back-link {
        color: rgba(214, 228, 255, 0.76);
      }

      .no-dreams {
        color: rgba(255,255,255,0.35);
        font-size: 14px;
        letter-spacing: 0.1em;
        padding: 40px 0;
        text-align: center;
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Staggered animation */
      .location-group:nth-child(1) { animation-delay: 0s; }
      .location-group:nth-child(2) { animation-delay: 0.1s; }
      .location-group:nth-child(3) { animation-delay: 0.2s; }
      .location-group:nth-child(4) { animation-delay: 0.3s; }
      .location-group:nth-child(5) { animation-delay: 0.4s; }
      .location-group:nth-child(6) { animation-delay: 0.5s; }
      .location-group:nth-child(7) { animation-delay: 0.6s; }
      .location-group:nth-child(8) { animation-delay: 0.7s; }
      .location-group:nth-child(n+9) { animation-delay: 0.8s; }

      /* ── Pulse on kenkai dot ── */
      @keyframes pulse-kenkai {
        0%, 100% { box-shadow: 0 0 16px rgba(220,170,60,0.5); }
        50% { box-shadow: 0 0 28px rgba(240,190,80,0.7), 0 0 48px rgba(200,150,40,0.2); }
      }
      .node-dot.kenkai { animation: pulse-kenkai 3s ease-in-out infinite; }
    </style>
  </head>
  <body class="mode-immersive">
    <script>
      document.body.classList.remove("mode-immersive", "mode-classic");
      document.body.classList.add("mode-" + (window.__waddyInitialSiteMode || "immersive"));
    </script>
    <button id="mode-toggle" type="button" aria-label="表示モード切替" title="表示モード切替">◆ IMMERSIVE</button>
    <canvas id="particle-canvas"></canvas>

    <div class="header">
      <p class="date-label" id="date-label"></p>
      <h1>A.D.M.S.</h1>
      <p class="subtitle">Auto Diverge Mapping System ─ 分岐する世界線の地図</p>
    </div>

    <div class="timeline" id="timeline"></div>

    <a class="back-link" href="./diary.html">◁ 日記に戻る</a>

    <script>
      const SITE_MODE_STORAGE_KEY = "waddy-display-mode";
      const SITE_MODE_DEFAULT = "classic";
      const SITE_MODE_VALUES = new Set(["immersive", "classic"]);
      const DREAM_SELECT_FORCE_IMMERSIVE = Boolean(window.__waddyDreamSelectForceImmersive);

      function getModeFromQuery() {
        if (DREAM_SELECT_FORCE_IMMERSIVE) {
          return "immersive";
        }
        const params = new URLSearchParams(window.location.search);
        const mode = params.get("mode");
        return SITE_MODE_VALUES.has(mode) ? mode : null;
      }

      function getStoredMode() {
        try {
          const stored = window.localStorage.getItem(SITE_MODE_STORAGE_KEY);
          return SITE_MODE_VALUES.has(stored) ? stored : null;
        } catch (error) {
          return null;
        }
      }

      function setStoredMode(mode) {
        try {
          window.localStorage.setItem(SITE_MODE_STORAGE_KEY, mode);
        } catch (error) {
          // Ignore storage failures and keep the current in-memory mode.
        }
      }

      function resolveInitialMode() {
        if (DREAM_SELECT_FORCE_IMMERSIVE) {
          return "immersive";
        }
        return getModeFromQuery() || getStoredMode() || SITE_MODE_DEFAULT;
      }

      function updateModeUrl(mode) {
        const url = new URL(window.location.href);
        url.searchParams.set("mode", mode);
        window.history.replaceState({}, "", url);
      }

      function updateModeToggle(mode) {
        const toggle = document.getElementById("mode-toggle");
        if (!toggle) {
          return;
        }
        if (DREAM_SELECT_FORCE_IMMERSIVE) {
          toggle.textContent = "◆ IMMERSIVE ONLY";
          toggle.disabled = true;
          toggle.setAttribute("aria-disabled", "true");
          return;
        }
        toggle.disabled = false;
        toggle.removeAttribute("aria-disabled");
        toggle.textContent = mode === "immersive" ? "◆ IMMERSIVE" : "▦ CLASSIC";
      }

      function applyMode(mode, options = {}) {
        const resolvedMode = DREAM_SELECT_FORCE_IMMERSIVE ? "immersive" : (SITE_MODE_VALUES.has(mode) ? mode : SITE_MODE_DEFAULT);
        document.documentElement.dataset.siteMode = resolvedMode;
        document.body.classList.remove("mode-immersive", "mode-classic");
        document.body.classList.add("mode-" + resolvedMode);
        updateModeToggle(resolvedMode);
        syncScenarioLinks(resolvedMode);

        if (!DREAM_SELECT_FORCE_IMMERSIVE && options.persist !== false) {
          setStoredMode(resolvedMode);
        }
        if (!DREAM_SELECT_FORCE_IMMERSIVE && options.updateUrl !== false) {
          updateModeUrl(resolvedMode);
        }
        return resolvedMode;
      }

      function getCurrentMode() {
        if (DREAM_SELECT_FORCE_IMMERSIVE) {
          return "immersive";
        }
        return document.body.classList.contains("mode-classic") ? "classic" : "immersive";
      }

      function buildScenarioUrl(scenario) {
        const params = new URLSearchParams();
        params.set("scenario", scenario);
        params.set("mode", getCurrentMode());
        return "./galge-scenario?" + params.toString();
      }

      function syncScenarioLinks(mode) {
        document.querySelectorAll('a[href*="galge-scenario"]').forEach(function (link) {
          const rawHref = link.getAttribute("href");
          if (!rawHref) {
            return;
          }
          const url = new URL(rawHref, window.location.href);
          if (!url.pathname.endsWith("/galge-scenario") && !url.pathname.endsWith("/galge-scenario.html")) {
            return;
          }
          url.searchParams.set("mode", mode);
          link.setAttribute("href", "./galge-scenario.html?" + url.searchParams.toString());
        });
      }

      applyMode(window.__waddyInitialSiteMode || resolveInitialMode(), {
        persist: true,
        updateUrl: Boolean(getModeFromQuery()),
      });

      if (!DREAM_SELECT_FORCE_IMMERSIVE) {
        document.getElementById("mode-toggle").addEventListener("click", function (event) {
          event.preventDefault();
          event.stopPropagation();
          applyMode(getCurrentMode() === "immersive" ? "classic" : "immersive");
        });
      }

      // ── Kongou Particle System (shared with galge-scenario) ──
      (function () {
        const canvas = document.getElementById("particle-canvas");
        const ctx = canvas.getContext("2d");
        const bgColor = { h: 270, s: 40, l: 8 };
        const bgClearColor = "rgba(12,5,24,0.15)";
        let streams = [], stars = [], nebulae = [], pillars = [];
        let animId = 0;

        function initCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        function initParticles() {
          streams = []; stars = []; nebulae = []; pillars = [];
          const w = canvas.width, h = canvas.height;

          for (let i = 0; i < 6; i++) {
            streams.push({
              y: Math.random() * h,
              baseX: Math.random() * w,
              amp: Math.random() * 120 + 60,
              freq: Math.random() * 0.008 + 0.003,
              speed: Math.random() * 1.5 + 1,
              phase: Math.random() * Math.PI * 2,
              width: Math.random() * 2.5 + 0.8,
              hue: Math.floor(Math.random() * 60 + bgColor.h - 30),
              len: Math.floor(Math.random() * 80 + 60),
              trail: []
            });
          }

          for (let i = 0; i < 80; i++) {
            stars.push({
              x: Math.random() * w,
              y: Math.random() * h,
              vx: (Math.random() - 0.3) * 2,
              vy: (Math.random() - 0.5) * 1,
              size: Math.random() * 2 + 0.4,
              brightness: Math.random(),
              phase: Math.random() * Math.PI * 2,
              speed: Math.random() * 2.5 + 0.8
            });
          }

          for (let i = 0; i < 5; i++) {
            nebulae.push({
              x: Math.random() * w,
              y: Math.random() * h,
              r: Math.random() * 180 + 80,
              dx: (Math.random() - 0.5) * 0.3,
              dy: (Math.random() - 0.5) * 0.2,
              phase: Math.random() * Math.PI * 2,
              hue: Math.floor(Math.random() * 80 + bgColor.h - 40),
              sat: Math.floor(Math.random() * 40 + 50)
            });
          }

          for (let i = 0; i < 3; i++) {
            pillars.push({
              x: Math.random() * w,
              width: Math.random() * 50 + 15,
              phase: Math.random() * Math.PI * 2,
              speed: Math.random() * 0.02 + 0.01,
              hue: Math.floor(Math.random() * 40 + bgColor.h - 20),
              drift: (Math.random() - 0.5) * 1.5 + (Math.random() > 0.5 ? 0.4 : -0.4)
            });
          }
        }

        function draw() {
          const w = canvas.width, h = canvas.height;
          const time = Date.now() * 0.001;
          ctx.fillStyle = bgClearColor;
          ctx.fillRect(0, 0, w, h);

          for (const n of nebulae) {
            n.x += n.dx; n.y += n.dy;
            if (n.x < -200) n.x = w + 200;
            if (n.x > w + 200) n.x = -200;
            if (n.y < -200) n.y = h + 200;
            if (n.y > h + 200) n.y = -200;
            const pulse = Math.sin(time * 1.5 + n.phase) * 0.4 + 0.6;
            const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * pulse);
            grad.addColorStop(0, `hsla(${n.hue},${n.sat}%,40%,${0.12 * pulse})`);
            grad.addColorStop(0.4, `hsla(${n.hue},${n.sat}%,25%,${0.06 * pulse})`);
            grad.addColorStop(1, `hsla(${n.hue},${n.sat}%,10%,0)`);
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r * pulse, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
          }

          for (const p of pillars) {
            p.x += p.drift + Math.sin(time * 0.8 + p.phase) * 1.2;
            if (p.x < -100) p.x = w + 100;
            if (p.x > w + 100) p.x = -100;
            const intensity = Math.sin(time * p.speed * 50 + p.phase) * 0.5 + 0.5;
            const grad = ctx.createLinearGradient(p.x - p.width / 2, 0, p.x + p.width / 2, 0);
            grad.addColorStop(0, `hsla(${p.hue},60%,50%,0)`);
            grad.addColorStop(0.5, `hsla(${p.hue},60%,50%,${0.08 * intensity})`);
            grad.addColorStop(1, `hsla(${p.hue},60%,50%,0)`);
            ctx.fillStyle = grad;
            ctx.fillRect(p.x - p.width, 0, p.width * 2, h);
          }

          for (const s of streams) {
            const cx = s.baseX + Math.sin(time * 0.5 + s.phase) * 100;
            s.trail.push({
              x: cx + Math.sin(time * s.freq * 100 + s.phase) * s.amp,
              y: s.y
            });
            s.y -= s.speed;
            if (s.y < -20) { s.y = h + 20; s.trail.length = 0; }
            if (s.trail.length > s.len) s.trail.shift();
            if (s.trail.length > 2) {
              ctx.beginPath();
              ctx.moveTo(s.trail[0].x, s.trail[0].y);
              for (let i = 1; i < s.trail.length; i++) {
                const pt = s.trail[i], prev = s.trail[i - 1];
                ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + pt.x) / 2, (prev.y + pt.y) / 2);
              }
              ctx.strokeStyle = `hsla(${s.hue},70%,60%,0.5)`;
              ctx.lineWidth = s.width;
              ctx.shadowColor = `hsla(${s.hue},80%,50%,0.6)`;
              ctx.shadowBlur = 12;
              ctx.stroke();
              ctx.shadowBlur = 0;
            }
          }

          for (const star of stars) {
            star.x += star.vx; star.y += star.vy;
            if (star.x < 0) star.x = w;
            if (star.x > w) star.x = 0;
            if (star.y < 0) star.y = h;
            if (star.y > h) star.y = 0;
            const flicker = Math.sin(time * star.speed * 3 + star.phase) * 0.3 + 0.7;
            const alpha = star.brightness * flicker;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size * flicker, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180,170,220,${alpha * 0.7})`;
            ctx.fill();
            if (star.size > 1.5) {
              ctx.beginPath();
              ctx.arc(star.x, star.y, star.size * 3 * flicker, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(140,130,200,${alpha * 0.12})`;
              ctx.fill();
            }
          }

          animId = requestAnimationFrame(draw);
        }

        initCanvas();
        initParticles();
        draw();

        window.addEventListener("resize", function () {
          initCanvas();
          initParticles();
        });
      })();

      /**
       * DREAM REGISTRY
       * location: 時系列順の場所。同じlocationのシナリオは同じノードに束ねられる。
       * order: location内の表示順（小さい方が上）
       */
      const DREAM_REGISTRY = {
        "2026-03-18": [
          {
            scenario: "2026-03-18_声の座標",
            realm: "kenkai", icon: "🌕",
            title: "声の座標",
            desc: "選ばれた世界線の記録",
            tag: "顕界",
            location: "神話製作機械", order: 0
          }
        ],
        "2026-03-19": [
          {
            scenario: "2026-03-19_影の踊り子",
            realm: "kenkai", icon: "🌕",
            title: "影の踊り子",
            desc: "ワディー×ひなひな ─ 選ばれた世界線の記録",
            tag: "顕界",
            location: "VRChat ─ 深夜のラウンジ", order: 0
          },
          {
            scenario: "2026-03-19_出口のない建物",
            realm: "genkai", icon: "🌘",
            title: "出口のない建物",
            desc: "選択肢を入れなかった建物の記録",
            tag: "幻界",
            location: "VRChat ─ 深夜のラウンジ", order: 1
          }
        ],
        "2026-03-20": [
          {
            scenario: "2026-03-20_各駅停車の形而上学",
            realm: "kenkai", icon: "🌕",
            title: "各駅停車の形而上学",
            desc: "ことみ×でじこ×マルチ ─ フラグ蓄積型マルチエンディング",
            tag: "顕界",
            location: "各駅停車 ─ 全行程", order: 0
          },
          {
            scenario: "2026-03-20_急行の形而上学",
            realm: "genkai", icon: "🌘",
            title: "急行の形而上学",
            desc: "ことみの声が届かなかった12分",
            tag: "幻界",
            location: "総武線 ─ 選択肢①", order: 1,
            route: "中央線で急いでいく → 確定"
          },
          {
            scenario: "2026-03-20_黄色い箱の独白",
            realm: "genkai", icon: "🌘",
            title: "黄色い箱の独白",
            desc: "瑠璃子×ワディー ─ 電車は棺か揺りかごか",
            tag: "幻界",
            location: "総武線 ─ 選択肢①-b", order: 2,
            route: "車内で黙る → silent_trainフラグ"
          },
          {
            scenario: "2026-03-20_二百円の祈り",
            realm: "genkai", icon: "🌘",
            title: "二百円の祈り",
            desc: "あゆ×ワディー ─ 瓶の底に沈んでいるもの",
            tag: "幻界",
            location: "ミルクスタンド ─ 選択肢②", order: 0,
            route: "先を急ぐ → skipped_milkstandフラグ"
          },
          {
            scenario: "2026-03-20_煮込みの時間論",
            realm: "genkai", icon: "🌘",
            title: "煮込みの時間論",
            desc: "物理おじ×ワディー ─ もつ煮込みとPID制御",
            tag: "幻界",
            location: "金子屋 ─ 選択肢③-b", order: 0,
            route: "一人で飲む → solo_kanekoyaフラグ"
          },
          {
            scenario: "2026-03-20_16小節の輪廻",
            realm: "genkai", icon: "🌘",
            title: "16小節の輪廻",
            desc: "フェイリス×ワディー ─ DJとタイムリープ",
            tag: "幻界",
            location: "Iv Akihabara ─ 選択肢④-b", order: 0,
            route: "先に出る → left_iv_earlyフラグ"
          },
          {
            scenario: "2026-03-20_包むということ",
            realm: "genkai", icon: "🌘",
            title: "包むということ",
            desc: "マルチ×ワディー ─ 餃子の皮と心のガワ",
            tag: "幻界",
            location: "大阪王将 ─ 選択肢⑤", order: 0,
            route: "外に出る → マルチと二人"
          }
        ]
      };

      // ── Render ──
      const params = new URLSearchParams(window.location.search);
      const hash = window.location.hash.replace(/^#/, "");
      const date = params.get("date") || hash || null;
      const dreams = DREAM_REGISTRY[date];

      document.getElementById("date-label").textContent = date || "";

      const timeline = document.getElementById("timeline");

      if (!dreams || dreams.length === 0) {
        timeline.innerHTML = '<p class="no-dreams">この日の世界線は観測されていません。</p>';
      } else if (dreams.length === 1) {
        // 1つだけなら直接遷移
        window.location.href = buildScenarioUrl(dreams[0].scenario);
      } else {
        // Group by location, preserving insertion order
        const locationOrder = [];
        const locationMap = new Map();
        for (const d of dreams) {
          const loc = d.location || "不明";
          if (!locationMap.has(loc)) {
            locationOrder.push(loc);
            locationMap.set(loc, []);
          }
          locationMap.get(loc).push(d);
        }
        // Sort within each location
        for (const [, arr] of locationMap) {
          arr.sort((a, b) => (a.order || 0) - (b.order || 0));
        }

        // Add trunk line
        timeline.innerHTML = '<div class="trunk-line"></div>';

        for (const loc of locationOrder) {
          const items = locationMap.get(loc);
          const hasKenkai = items.some(d => d.realm === "kenkai");

          const group = document.createElement("div");
          group.className = "location-group";

          // Location node
          group.innerHTML += `
            <div class="location-node">
              <div class="node-dot ${hasKenkai ? 'kenkai' : ''}"></div>
              <span class="location-label">${loc}</span>
            </div>
          `;

          // Split items into kenkai and genkai
          const kenkaiItems = items.filter(d => d.realm === 'kenkai');
          const genkaiItems = items.filter(d => d.realm === 'genkai');

          // Helper: parse desc into chars + rest
          function renderDesc(desc) {
            const match = desc.match(/^(.+?)\s*─\s*(.+)$/);
            if (match) {
              return `<span class="card-chars">${match[1]}</span><span class="card-desc-rest">${match[2]}</span>`;
            }
            return `<span class="card-desc-rest">${desc}</span>`;
          }

          // Kenkai branch (main timeline)
          if (kenkaiItems.length > 0) {
            const branchDiv = document.createElement('div');
            branchDiv.className = 'branches';
            for (const d of kenkaiItems) {
              const card = document.createElement('a');
              card.className = `scenario-card ${d.realm}`;
              card.href = buildScenarioUrl(d.scenario);
              card.innerHTML = `
                <span class="card-icon">${d.icon}</span>
                <div class="card-body">
                  <div class="card-title">${d.title}</div>
                  <div class="card-desc">${renderDesc(d.desc)}</div>
                </div>
                <span class="card-tag">${d.tag}</span>
              `;
              branchDiv.appendChild(card);
            }
            group.appendChild(branchDiv);
          }

          // Genkai parallel track
          if (genkaiItems.length > 0) {
            const trackDiv = document.createElement('div');
            trackDiv.className = 'genkai-track';

            // If this location has no kenkai card, add a passthrough marker
            if (kenkaiItems.length === 0) {
              // Find the kenkai scenario for this date
              const kenkaiRef = dreams.find(d => d.realm === 'kenkai');
              if (kenkaiRef) {
                const marker = document.createElement('div');
                marker.className = 'kenkai-passthrough';
                marker.innerHTML = `🌕 <a href="${buildScenarioUrl(kenkaiRef.scenario)}">顕界: ${kenkaiRef.title}</a> ─ ルート通過`;
                group.appendChild(marker);
              }
            }

            for (const d of genkaiItems) {
              const card = document.createElement('a');
              card.className = `scenario-card ${d.realm}`;
              card.href = buildScenarioUrl(d.scenario);
              card.innerHTML = `
                <span class="card-icon">${d.icon}</span>
                <div class="card-body">
                  <div class="card-title">${d.title}</div>
                  <div class="card-desc">${renderDesc(d.desc)}</div>
                </div>
                <span class="card-tag">${d.tag}</span>
              `;
              trackDiv.appendChild(card);
            }
            group.appendChild(trackDiv);
          }
          timeline.appendChild(group);
        }

        // Terminal node
        const terminal = document.createElement("div");
        terminal.className = "location-group";
        terminal.innerHTML = `
          <div class="terminal-node">
            <div class="terminal-dot"></div>
            <span class="terminal-label">── 世界線の末端 ──</span>
          </div>
        `;
        timeline.appendChild(terminal);
      }
    </script>
  </body>
