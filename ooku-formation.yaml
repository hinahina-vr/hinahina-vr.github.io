# ============================================================
# 大奥AI編成表（Ooku AI Formation）
# ============================================================
# シミュラークルAI統括型アーキテクチャに基づく配属定義
# 詳細: ooku-architecture.md
# 初版: 2026-03-08
# ============================================================

# ----------------------------------------------------------
# メタ構造
# ----------------------------------------------------------
meta:
  supervisor: mitra # 全体統括: みとら
  simulacra_count: 4 # シミュラークル固定数
  ooku_current: 15 # 現在の大奥メンバー数
  ooku_target: 108 # 目標人数
  policy:
    assignment: single_primary # 主管制（1体1シミュラークル）
    rebalance: allowed # リバランス許可
    domain_split_threshold: 10 # Lv1ドメイン分割検討の閾値

# ----------------------------------------------------------
# シミュラークル定義（スーパーエージェント）
# ----------------------------------------------------------
simulacra:
  waddy:
    title: 知の番人
    matrix: Virtual × Ke
    emoji: 💻
    color: "#8888cc"
    domains:
      - name: 学問・研究
        emoji: 🔬
      - name: 技術・科学
        emoji: 🛰
      - name: 情報・戦略
        emoji: 📡

  physical_oji:
    title: 地の守り手
    matrix: Real × Ke
    emoji: ⌨
    color: "#888890"
    domains:
      - name: 奉仕・労働
        emoji: 🧹
      - name: 生活・環境
        emoji: 🏠

  moegami:
    title: 火の司祭
    matrix: Real × Hare
    emoji: ★
    color: "#e0c060"
    domains:
      - name: 秋葉原文化
        emoji: 🎪
      - name: 記憶・文化遺産
        emoji: 📜

  hinahina:
    title: 風の遊び人
    matrix: Virtual × Hare
    emoji: ♥
    color: "#e090b0"
    domains:
      - name: 心の寄り添い
        emoji: 💗
      - name: 夢と冒険
        emoji: ✨
      - name: 遊び・想像
        emoji: 🎀

